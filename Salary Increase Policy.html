<!doctype html>
<html lang="ar" dir="rtl">
<head>
<script src="guard.js"></script>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>MSGA — سياسة زيادة الرواتب</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* MSGA — Meeting Minutes Design System */

:root {
  /* Brand */
  --navy: #10375C;
  --navy-deep: #0A2540;
  --navy-tint: #E8EEF5;
  --orange: #FF7E2A;
  --orange-soft: #FFE4D2;
  --gold: #F2C523;
  --gold-soft: #FCEFB4;

  /* Mono neutrals */
  --ink: #1E1E1E;
  --ink-2: #3A3A3A;
  --ink-3: #6B6B6B;
  --ink-4: #9CA3AF;
  --paper: #FFFFFF;
  --paper-2: #F7F7F7;
  --paper-3: #EFEFEC;
  --line: #DCDFE4;
  --line-2: #E8EAEE;

  /* A4 sizing */
  --page-w: 210mm;
  --page-h: 297mm;
  --margin-x: 14mm;
  --margin-y: 14mm;

  /* Type */
  --ar: "IBM Plex Sans Arabic", system-ui, sans-serif;
  --mono: "IBM Plex Mono", "JetBrains Mono", ui-monospace, monospace;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--paper-3);
  font-family: var(--ar);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "kern", "liga", "ss01";
}

body { direction: rtl; }

/* Stage holds vertical page stack */
.stage {
  min-height: 100vh;
  padding: 24px 16px 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
}

/* A4 Page */
.page {
  width: var(--page-w);
  height: var(--page-h);
  background: var(--paper);
  position: relative;
  overflow: hidden;
  box-shadow: 0 1px 2px rgba(16,55,92,.04), 0 8px 24px rgba(16,55,92,.08);
  page-break-after: always;
  break-after: page;
  display: flex;
  flex-direction: column;
}

.page:last-of-type { page-break-after: auto; }

/* Watermark — subtle bird silhouette + dot grid */
.watermark {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background-image:
    radial-gradient(circle at 1px 1px, rgba(16,55,92,.045) 1px, transparent 1px);
  background-size: 14px 14px;
  background-position: 0 0;
}
.watermark::after {
  content: "";
  position: absolute;
  inset: 0;
  background-image: url("assets/msga-logo.png");
  background-repeat: no-repeat;
  background-position: center 60%;
  background-size: 60% auto;
  opacity: .025;
  filter: grayscale(1);
}

/* Page chrome inside content area */
.page-inner {
  position: relative;
  z-index: 1;
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: var(--margin-y) var(--margin-x);
  gap: 0;
}

/* Header strip */
.head {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 14px;
  padding-bottom: 10px;
  border-bottom: 1.5px solid var(--ink);
  margin-bottom: 12px;
}
.head .logo {
  height: 44px;
  width: auto;
  display: block;
}
.head .titles {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.head .eyebrow {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.14em;
  color: var(--ink-3);
  text-transform: uppercase;
}
.head .doctitle {
  font-size: 14px;
  font-weight: 600;
  color: var(--navy);
  letter-spacing: -0.01em;
}
.head .doc-meta {
  text-align: left;
  font-family: var(--mono);
  font-size: 9.5px;
  color: var(--ink-3);
  line-height: 1.55;
  direction: ltr;
}
.head .doc-meta b {
  color: var(--ink);
  font-weight: 600;
}

/* Footer */
.foot {
  position: absolute;
  bottom: 8mm;
  inset-inline: var(--margin-x);
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-family: var(--mono);
  font-size: 9px;
  color: var(--ink-3);
  letter-spacing: 0.08em;
  border-top: 1px solid var(--line);
  padding-top: 6px;
  z-index: 2;
}
.foot .brand-mark {
  display: flex;
  align-items: center;
  gap: 6px;
}
.foot .brand-mark::before {
  content: "";
  display: inline-block;
  width: 6px; height: 6px;
  background: var(--orange);
}
.foot .pagenum b { color: var(--ink); font-weight: 600; }

/* Section header w/ icon + numeric chip */
.sec-head {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 16px 0 10px;
}
.sec-head .num {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  background: var(--navy);
  color: #fff;
  padding: 3px 7px;
  letter-spacing: 0.08em;
}
.sec-head .icon {
  width: 22px; height: 22px;
  display: grid; place-items: center;
  background: var(--navy-tint);
  color: var(--navy);
  border-radius: 2px;
}
.sec-head .icon svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.6; }
.sec-head h2 {
  margin: 0;
  font-size: 15px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -0.01em;
}
.sec-head .en {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--ink-4);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin-inline-start: auto;
}
.sec-head .rule {
  flex: 1;
  height: 1px;
  background: var(--line);
  margin-inline-start: 8px;
}

/* PAGE 1 — Hero */
.hero {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 14px;
  align-items: end;
  border-bottom: 1px solid var(--line);
  padding-bottom: 12px;
  margin-top: 4px;
}
.hero .kicker {
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: 0.22em;
  color: var(--orange);
  text-transform: uppercase;
  margin-bottom: 6px;
}
.hero h1 {
  margin: 0;
  font-size: 38px;
  font-weight: 700;
  line-height: 1.05;
  color: var(--navy);
  letter-spacing: -0.02em;
}
.hero h1 .arrow { color: var(--orange); font-weight: 600; }
.hero .subtitle {
  margin-top: 8px;
  font-size: 13px;
  color: var(--ink-3);
  max-width: 70%;
  line-height: 1.55;
}
.hero .stamp {
  font-family: var(--mono);
  font-size: 9px;
  border: 1px solid var(--navy);
  color: var(--navy);
  padding: 6px 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  direction: ltr;
  line-height: 1.4;
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.hero .stamp b { font-weight: 600; font-size: 11px; }

/* KPI strip (data feel) */
.kpis {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  margin-top: 14px;
  border: 1px solid var(--line);
  background: var(--paper-2);
}
.kpi {
  padding: 12px 12px 10px;
  border-inline-end: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.kpi:last-child { border-inline-end: none; }
.kpi .label {
  font-family: var(--mono);
  font-size: 8.5px;
  letter-spacing: 0.16em;
  color: var(--ink-3);
  text-transform: uppercase;
}
.kpi .val {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 600;
  color: var(--navy);
  line-height: 1;
  direction: ltr;
  text-align: start;
}
.kpi .val.ar { font-family: var(--ar); font-size: 16px; direction: rtl; padding-top: 4px;}
.kpi .sub {
  font-size: 10px;
  color: var(--ink-3);
}

/* Meeting info grid (page 1) */
.info-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0;
  border: 1px solid var(--line);
  margin-top: 4px;
}
.info-row {
  display: grid;
  grid-template-columns: 130px 1fr;
  border-bottom: 1px solid var(--line);
  border-inline-end: 1px solid var(--line);
  min-height: 38px;
}
.info-row:nth-child(2n) { border-inline-end: none; }
.info-row:nth-last-child(-n+2) { border-bottom: none; }
.info-row .k {
  background: var(--paper-2);
  padding: 8px 10px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: var(--ink-2);
  font-weight: 500;
  border-inline-end: 1px solid var(--line);
}
.info-row .k svg { width: 12px; height: 12px; color: var(--navy); }
.info-row .v {
  padding: 8px 10px;
  display: flex;
  align-items: center;
  font-size: 12px;
  color: var(--ink);
}

/* Fillable text input */
.fill {
  border: none;
  outline: none;
  background: transparent;
  width: 100%;
  font: inherit;
  color: inherit;
  padding: 2px 0;
  border-bottom: 1px dashed transparent;
  transition: border .15s, background .15s;
}
.fill:hover { border-bottom-color: var(--line); }
.fill:focus {
  border-bottom-color: var(--orange);
  background: linear-gradient(to top, rgba(255,126,42,.06), transparent);
}
.fill::placeholder { color: var(--ink-4); font-weight: 300; }

.fill-mono { font-family: var(--mono); }
.fill-num { font-family: var(--mono); direction: ltr; text-align: start; }

/* Attendees block */
.attendees {
  margin-top: 14px;
  border: 1px solid var(--line);
}
.attendees-head {
  display: grid;
  grid-template-columns: 28px 1fr 140px 90px 60px;
  background: var(--navy);
  color: #fff;
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.attendees-head > div { padding: 7px 10px; border-inline-end: 1px solid rgba(255,255,255,.15); }
.attendees-head > div:last-child { border-inline-end: none; }

.attendee-row {
  display: grid;
  grid-template-columns: 28px 1fr 140px 90px 60px;
  border-bottom: 1px solid var(--line);
  font-size: 11.5px;
  min-height: 32px;
}
.attendee-row:last-child { border-bottom: none; }
.attendee-row > div {
  padding: 6px 10px;
  border-inline-end: 1px solid var(--line);
  display: flex;
  align-items: center;
}
.attendee-row > div:last-child { border-inline-end: none; justify-content: center; }
.attendee-row .idx { font-family: var(--mono); font-size: 10px; color: var(--ink-4); justify-content: center; padding: 6px 0; }

/* Status pills */
.pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 8px;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border: 1px solid currentColor;
  border-radius: 999px;
  white-space: nowrap;
}
.pill::before {
  content: "";
  width: 5px; height: 5px;
  border-radius: 50%;
  background: currentColor;
}
.pill.present { color: var(--navy); background: var(--navy-tint); }
.pill.absent { color: #B23A1F; background: #FCE5DE; }
.pill.remote { color: #8B5E00; background: var(--gold-soft); }
.pill.done { color: #1F6B3E; background: #DCEFE2; }
.pill.progress { color: #8B5E00; background: var(--gold-soft); }
.pill.todo { color: var(--orange); background: var(--orange-soft); }
.pill.blocked { color: #B23A1F; background: #FCE5DE; }

.pill-select {
  border: none;
  background: transparent;
  font: inherit;
  cursor: pointer;
  outline: none;
  appearance: none;
}

/* Agenda table */
.agenda {
  margin-top: 4px;
  border: 1px solid var(--line);
}
.agenda-head, .agenda-row {
  display: grid;
  grid-template-columns: 40px 70px 1fr 90px 110px 28px;
}
.agenda-head {
  background: var(--navy);
  color: #fff;
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.agenda-head > div { padding: 7px 10px; border-inline-end: 1px solid rgba(255,255,255,.15); }
.agenda-row {
  border-bottom: 1px solid var(--line);
  font-size: 12px;
  min-height: 38px;
}
.agenda-row:last-child { border-bottom: none; }
.agenda-row > div {
  padding: 8px 10px;
  border-inline-end: 1px solid var(--line);
  display: flex;
  align-items: center;
}
.agenda-row > div:last-child { border-inline-end: none; }
.agenda-row .num { font-family: var(--mono); font-size: 11px; color: var(--ink-3); justify-content: center; }
.agenda-row .time { font-family: var(--mono); font-size: 11px; color: var(--ink); direction: ltr; }
.agenda-row .topic { font-weight: 500; }
.agenda-row .topic .desc { display: block; font-size: 10.5px; color: var(--ink-3); font-weight: 400; margin-top: 2px; }
.agenda-row .own { font-size: 11px; color: var(--ink-2); }
.agenda-row .del {
  justify-content: center;
  color: var(--ink-4);
  cursor: pointer;
  opacity: 0;
}
.agenda-row:hover .del { opacity: 1; }
.agenda-row .del:hover { color: var(--orange); }

/* Timeline bar visual */
.timeline {
  margin-top: 10px;
  border: 1px solid var(--line);
  padding: 10px 12px 12px;
  background: var(--paper-2);
}
.timeline .tl-head {
  display: flex;
  justify-content: space-between;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-bottom: 8px;
  direction: ltr;
}
.timeline .tl-bar {
  height: 22px;
  background: #fff;
  border: 1px solid var(--line);
  position: relative;
  display: flex;
  direction: ltr;
  overflow: hidden;
}
.tl-seg {
  position: relative;
  border-inline-end: 1px solid #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 9px;
  color: rgba(255,255,255,.95);
  font-weight: 600;
}
.tl-seg:last-child { border-inline-end: none; }
.tl-labels {
  display: flex;
  direction: ltr;
  font-family: var(--mono);
  font-size: 8.5px;
  color: var(--ink-3);
  margin-top: 6px;
}
.tl-label { flex: 1; text-align: center; }

/* Discussion / points (page 3) */
.points {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 4px;
}
.point {
  display: grid;
  grid-template-columns: 38px 1fr;
  border: 1px solid var(--line);
  border-inline-start: 3px solid var(--navy);
  background: #fff;
}
.point.accent-orange { border-inline-start-color: var(--orange); }
.point.accent-gold { border-inline-start-color: var(--gold); }
.point .p-num {
  background: var(--paper-2);
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
  color: var(--navy);
  display: flex;
  align-items: center;
  justify-content: center;
  border-inline-end: 1px solid var(--line);
}
.point .p-body { padding: 9px 12px 11px; }
.point .p-top {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}
.point .p-title {
  font-size: 12.5px;
  font-weight: 600;
  color: var(--ink);
  flex: 1;
}
.point .tag {
  font-family: var(--mono);
  font-size: 8.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 2px 6px;
  background: var(--navy-tint);
  color: var(--navy);
}
.point .tag.dec { background: var(--orange-soft); color: #B33D00; }
.point .tag.info { background: var(--gold-soft); color: #8B5E00; }
.point .p-text {
  font-size: 11.5px;
  color: var(--ink-2);
  line-height: 1.65;
}
.point .p-meta {
  margin-top: 6px;
  display: flex;
  gap: 14px;
  font-family: var(--mono);
  font-size: 9px;
  color: var(--ink-3);
  letter-spacing: 0.06em;
}
.point .p-meta b { color: var(--ink); font-weight: 600; }

/* Actions table (page 4) */
.actions {
  margin-top: 4px;
  border: 1px solid var(--line);
}
.actions-head, .action-row {
  display: grid;
  grid-template-columns: 32px 32px 1fr 110px 80px 90px 24px;
}
.actions-head {
  background: var(--navy);
  color: #fff;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.actions-head > div { padding: 7px 8px; border-inline-end: 1px solid rgba(255,255,255,.15); }
.action-row {
  border-bottom: 1px solid var(--line);
  font-size: 11.5px;
  min-height: 42px;
  background: #fff;
}
.action-row:last-child { border-bottom: none; }
.action-row > div {
  padding: 8px;
  border-inline-end: 1px solid var(--line);
  display: flex;
  align-items: center;
}
.action-row > div:last-child { border-inline-end: none; }
.action-row .a-num { font-family: var(--mono); font-size: 10.5px; color: var(--ink-3); justify-content: center; }
.action-row .chk-cell { justify-content: center; }
.action-row .a-task { font-weight: 500; }
.action-row .a-task .sub { display: block; font-size: 10px; color: var(--ink-3); margin-top: 2px; font-weight: 400; }
.action-row.done .a-task { color: var(--ink-3); text-decoration: line-through; }
.action-row .a-date { font-family: var(--mono); font-size: 10.5px; direction: ltr; }
.action-row .a-prio { justify-content: center; }
.action-row .del { color: var(--ink-4); cursor: pointer; justify-content: center; opacity: 0; }
.action-row:hover .del { opacity: 1; }

/* Checkbox */
.chk {
  width: 16px; height: 16px;
  border: 1.5px solid var(--ink);
  display: grid;
  place-items: center;
  cursor: pointer;
  background: #fff;
}
.chk.checked {
  background: var(--navy);
  border-color: var(--navy);
}
.chk.checked::after {
  content: "✓";
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  line-height: 1;
}

/* Priority dot */
.prio { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 10px; }
.prio::before { content: ""; width: 8px; height: 8px; border-radius: 50%; }
.prio.high::before { background: var(--orange); }
.prio.med::before { background: var(--gold); }
.prio.low::before { background: var(--ink-4); }

/* Summary bar (page 4) */
.summary {
  margin-top: 12px;
  border: 1px solid var(--navy);
  background: var(--navy);
  color: #fff;
  padding: 12px 14px;
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 14px;
}
.summary .s-left {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.summary .s-eyebrow {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.18em;
  color: var(--gold);
  text-transform: uppercase;
}
.summary .s-title { font-size: 14px; font-weight: 600; }
.summary .s-stats {
  display: flex;
  gap: 18px;
  font-family: var(--mono);
}
.summary .s-stat .n { font-size: 22px; font-weight: 600; line-height: 1; }
.summary .s-stat .l { font-size: 8.5px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,.7); margin-top: 4px; }

/* Sign-off */
.signoff {
  margin-top: 14px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
.sign {
  padding: 14px 14px 10px;
  border: 1px solid var(--line);
  background: var(--paper-2);
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 110px;
}
.sign .label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-3);
}
.sign .name {
  font-size: 12px;
  font-weight: 600;
  color: var(--ink);
  border-bottom: 1px dashed var(--line);
  padding-bottom: 4px;
}
.sign .role { font-size: 10.5px; color: var(--ink-3); }
.sign .sig-line {
  margin-top: auto;
  border-bottom: 1.5px solid var(--ink);
  height: 32px;
}
.sign .sig-cap {
  font-family: var(--mono);
  font-size: 8.5px;
  letter-spacing: 0.12em;
  color: var(--ink-4);
  text-transform: uppercase;
}

/* Add-row button */
.add-row {
  display: flex;
  align-items: center;
  gap: 6px;
  background: transparent;
  border: 1px dashed var(--line);
  color: var(--ink-3);

/* ─────────── Store ─────────── */
function usePolicyStore() {
  const [state, setState] = useState(() => {
    const loaded = polLoad();
    if (loaded && Array.isArray(loaded.tiers)) {
      // one-time fix: drop stale persisted tiers so the corrected defaults show
      if (!loaded._tiersV2) { loaded.tiers = POL_DEFAULT.tiers; loaded._tiersV2 = true; }
    }
    return loaded || POL_DEFAULT;
  });
  useEffect(() => { polSave(state); }, [state]);
  const u = (path, val) => {
    setState(s => {
      const copy = JSON.parse(JSON.stringify(s));
      const parts = path.split(".");
      let cur = copy;
      for (let i = 0; i < parts.length - 1; i++) {
        const k = parts[i];
        cur = cur[k.match(/^\d+$/) ? Number(k) : k];
      }
      const last = parts[parts.length - 1];
      cur[last.match(/^\d+$/) ? Number(last) : last] = val;
      return copy;
    });
  };
  const reset = () => { localStorage.removeItem(POL_KEY); setState(POL_DEFAULT); };
  const clear = () => {
    const b = JSON.parse(JSON.stringify(POL_DEFAULT));
    b.meta = Object.fromEntries(Object.keys(b.meta).map(k => [k, ""]));
    b.purpose = ""; b.scopeText = "";
    b.objectives = ["", "", ""];
    b.eligibility = b.eligibility.map(() => ({ cond: "", value: "" }));
    b.kpis = b.kpis.map(() => ({ kpi: "", weight: "", desc: "" }));
    b.tiers = b.tiers.map(t => ({ ...t, range: "", increase: "" }));
    b.flow = b.flow.map(() => ({ role: "", title: "", desc: "" }));
    b.authority = b.authority.map(() => ({ entity: "", power: "" }));
    b.cycle = b.cycle.map(() => ({ period: "", label: "", desc: "" }));
    b.exceptions = b.exceptions.map(() => ({ tag: "استثناء", title: "", text: "" }));
    b.req = Object.fromEntries(Object.keys(b.req).map(k => [k, ""]));
    b.signatures = { direct: "", hr: "", ceo: "" };
    setState(b);
  };
  return { state, setState, u, reset, clear };
}

/* ─────────── Fillable inputs ─────────── */
function Fill({ value, onChange, placeholder, className = "", mono = false, num = false, multi = false, ...rest }) {
  const ref = useRef(null);
  useEffect(() => {
    if (multi && ref.current) { ref.current.style.height = "auto"; ref.current.style.height = ref.current.scrollHeight + "px"; }
  }, [value, multi]);
  if (multi) {
    return <textarea ref={ref} className={`fill fill-multi ${mono ? "fill-mono" : ""} ${className}`}
      value={value || ""} onChange={e => onChange(e.target.value)} placeholder={placeholder} rows={1} {...rest}/>;
  }
  return <input className={`fill ${mono ? "fill-mono" : ""} ${num ? "fill-num" : ""} ${className}`}
    value={value || ""} onChange={e => onChange(e.target.value)} placeholder={placeholder} {...rest}/>;
}

/* ─────────── PAGE 3 — Tiers + Approval flow ─────────── */
function Page3({ st, u, setState }) {
  const m = st.meta;
  return (
    <div className="page" data-screen-label="03 Tiers & Approval">
      <div className="watermark"></div>
      <div className="page-inner">
        <Header docId={m.docId} title={m.title} date={m.effective} page={3} total={TOTAL}/>

        <SecHead num="04" label="نسب وشرائح الزيادة" en="INCREASE TIERS" icon={PIcon.layers}/>
        <SecNote left="// نسبة الزيادة وفق تقدير الأداء السنوي" right={`${String(st.tiers.length).padStart(2, "0")} TIERS`}/>

        <div className="ptable">
          <div className="pt-head cols-tier"><div>تقدير الأداء</div><div className="center">نطاق النتيجة</div><div>التوصيف</div><div className="center">نسبة الزيادة</div></div>
          {st.tiers.map((t, i) => (
            <div className="pt-row cols-tier" key={i}>
              <div><span className={`rating ${t.cls}`}>{t.rating}</span></div>
              <div className="center mono-val"><Fill value={t.range} onChange={v => u(`tiers.${i}.range`, v)} placeholder="—" num style={{ textAlign: "center" }}/></div>
              <div style={{ fontSize: 11, color: "var(--ink-3)" }}>{t.rating === "ضعيف" || t.rating === "أقل من المتوقع" ? "تُحفظ النسبة وتُعاد المراجعة العام القادم" : "يُمنح ضمن النطاق وفق توصية المدير المباشر"}</div>
              <div className="center"><span className={`vchip ${t.chip || ""}`}><Fill value={t.increase} onChange={v => u(`tiers.${i}.increase`, v)} placeholder="—" style={{ textAlign: "center", background: "transparent", width: "100%" }}/></span></div>
            </div>
          ))}
        </div>

        <SecHead num="05" label="آلية الاعتماد والصلاحيات" en="APPROVAL WORKFLOW" icon={PIcon.flow}/>

        <div className="flow">
          {st.flow.map((f, i) => (
            <div className="flow-step" key={i}>
              <div className="fnum">{i + 1}</div>
              <div className="fbody">
                <Fill className="frole" value={f.role} onChange={v => u(`flow.${i}.role`, v)} placeholder="الجهة" style={{ color: "var(--orange)", fontFamily: "var(--mono)", textTransform: "uppercase", fontSize: 8.5 }}/>
                <Fill className="ftitle" value={f.title} onChange={v => u(`flow.${i}.title`, v)} placeholder="الإجراء" style={{ fontWeight: 600, fontSize: 12.5 }}/>
                <Fill className="fdesc" value={f.desc} onChange={v => u(`flow.${i}.desc`, v)} placeholder="وصف الإجراء" style={{ fontSize: 11, color: "var(--ink-3)" }}/>
              </div>
            </div>
          ))}
        </div>

        <div className="authority ptable">
          <div className="pt-head cols-auth"><div>الجهة</div><div>الصلاحية</div></div>
          {st.authority.map((a, i) => (
            <div className="pt-row cols-auth" key={i}>
              <div style={{ fontWeight: 500 }}><Fill value={a.entity} onChange={v => u(`authority.${i}.entity`, v)} placeholder="الجهة"/></div>
              <div style={{ color: "var(--ink-2)" }}><Fill value={a.power} onChange={v => u(`authority.${i}.power`, v)} placeholder="الصلاحية"/></div>
            </div>
          ))}
        </div>

        <Footer page={3} total={TOTAL} docId={m.docId} version={m.version}/>
      </div>
    </div>
  );
}

/* ─────────── PAGE 4 — Annual cycle + Exceptions ─────────── */
function Page4({ st, u, setState }) {
  const m = st.meta;
  return (
    <div className="page" data-screen-label="04 Cycle & Exceptions">
      <div className="watermark"></div>
      <div className="page-inner">
        <Header docId={m.docId} title={m.title} date={m.effective} page={4} total={TOTAL}/>

        <SecHead num="06" label="الجدول الزمني للمراجعة السنوية" en="ANNUAL REVIEW CYCLE" icon={PIcon.cal}/>
        <SecNote left="// دورة المراجعة السنوية للرواتب" right="ANNUAL · 4 STAGES"/>

        <div className="cycle">
          <div className="cycle-track">
            {st.cycle.map((c, i) => (
              <div className={`cycle-node ${i === st.cycle.length - 1 ? "accent" : ""}`} key={i}>
                <div className="dot">{String(i + 1).padStart(2, "0")}</div>
                <Fill className="period" value={c.period} onChange={v => u(`cycle.${i}.period`, v)} placeholder="الشهر" style={{ color: "var(--orange)", fontFamily: "var(--mono)", textAlign: "center", fontSize: 9 }}/>
                <Fill className="clabel" value={c.label} onChange={v => u(`cycle.${i}.label`, v)} placeholder="المرحلة" style={{ textAlign: "center", fontWeight: 600, fontSize: 11 }}/>
                <Fill multi className="cdesc" value={c.desc} onChange={v => u(`cycle.${i}.desc`, v)} placeholder="وصف" style={{ textAlign: "center", fontSize: 9.5, color: "var(--ink-3)" }}/>
              </div>
            ))}
          </div>
        </div>

        <SecHead num="07" label="الاستثناءات والترقيات" en="EXCEPTIONS & PROMOTIONS" icon={PIcon.branch}/>

        <div className="points">
          {st.exceptions.map((p, i) => {
            const accent = p.tag === "ترقية" ? "accent-orange" : p.tag === "تعديل" ? "accent-gold" : "";
            const tagCls = p.tag === "ترقية" ? "dec" : p.tag === "تعديل" ? "info" : "";
            return (
              <div className={`point ${accent}`} key={i}>
                <div className="p-num">{String(i + 1).padStart(2, "0")}</div>
                <div className="p-body">
                  <div className="p-top">
                    <span className={`tag ${tagCls}`} style={{ cursor: "pointer" }}
                      onClick={() => { const o = ["ترقية", "استثناء", "تعديل"]; u(`exceptions.${i}.tag`, o[(o.indexOf(p.tag) + 1) % o.length]); }}>{p.tag}</span>
                    <Fill className="p-title" value={p.title} onChange={v => u(`exceptions.${i}.title`, v)} placeholder="عنوان الحالة"/>
                    <span style={{ cursor: "pointer", color: "var(--ink-4)", fontFamily: "var(--mono)" }}
                      onClick={() => setState(s => ({ ...s, exceptions: s.exceptions.filter((_, j) => j !== i) }))}>×</span>
                  </div>
                  <textarea className="p-text" value={p.text} onChange={e => u(`exceptions.${i}.text`, e.target.value)}
                    placeholder="تفاصيل الحالة الاستثنائية..." rows={2}
                    style={{ width: "100%", border: "none", outline: "none", background: "transparent", resize: "none", fontFamily: "var(--ar)", lineHeight: 1.65, minHeight: 40 }}
                    ref={el => { if (el) { el.style.height = "auto"; el.style.height = el.scrollHeight + "px"; } }}/>
                </div>
              </div>
            );
          })}
        </div>
        <button className="add-row" onClick={() => setState(s => ({ ...s, exceptions: [...s.exceptions, { tag: "استثناء", title: "", text: "" }] }))}>إضافة حالة</button>

        <Footer page={4} total={TOTAL} docId={m.docId} version={m.version}/>
      </div>
    </div>
  );
}

/* ─────────── PAGE 5 — Request form + Sign-off ─────────── */
function Page5({ st, u }) {
  const m = st.meta;
  const r = st.req;
  return (
    <div className="page" data-screen-label="05 Request Form">
      <div className="watermark"></div>
      <div className="page-inner">
        <Header docId={m.docId} title={m.title} date={m.effective} page={5} total={TOTAL}/>

        <SecHead num="08" label="نموذج طلب / توصية زيادة" en="INCREASE REQUEST FORM" icon={PIcon.edit}/>
        <SecNote left="// يُعبأ من المدير المباشر ويُرفق بتقييم الأداء" right={`REF · ${m.docId}`}/>

        <div className="reqform">
          <div className="rf-grid">
            <RfCell k="اسم الموظف" v={r.empName} on={v => u("req.empName", v)}/>
            <RfCell k="الرقم الوظيفي" v={r.empNo} on={v => u("req.empNo", v)} mono/>
            <RfCell k="الإدارة" v={r.dept} on={v => u("req.dept", v)}/>
            <RfCell k="المسمى الحالي" v={r.currentTitle} on={v => u("req.currentTitle", v)}/>
            <RfCell k="الراتب الحالي" v={r.currentSalary} on={v => u("req.currentSalary", v)} mono/>
            <RfCell k="تقدير الأداء" v={r.rating} on={v => u("req.rating", v)}/>
            <RfCell k="نسبة الزيادة المقترحة" v={r.proposedPct} on={v => u("req.proposedPct", v)} mono/>
            <RfCell k="الراتب الجديد" v={r.newSalary} on={v => u("req.newSalary", v)} mono calc/>
          </div>
          <div className="rf-justify">
            <div className="lbl">// مبرر التوصية — JUSTIFICATION</div>
            <textarea value={r.justify} onChange={e => u("req.justify", e.target.value)} placeholder="اذكر مبررات التوصية بالزيادة استناداً إلى الأداء والمعايير..."
              ref={el => { if (el) { el.style.height = "auto"; el.style.height = el.scrollHeight + "px"; } }}/>
          </div>
        </div>

        <SecNote left="// الاعتمادات والتوقيعات — APPROVALS" right={`DATE · ${r.reqDate || "——"}`}/>
        <div className="signoff-triple">
          <div className="sign">
            <div className="label">// المدير المباشر</div>
            <Fill className="name" value={st.signatures.direct} onChange={v => u("signatures.direct", v)} placeholder="الاسم"/>
            <div className="role">التوصية والترشيح</div>
            <div className="sig-line"></div>
            <div className="sig-cap">SIGNATURE / DATE</div>
          </div>
          <div className="sign">
            <div className="label">// مدير الموارد البشرية</div>
            <Fill className="name" value={st.signatures.hr} onChange={v => u("signatures.hr", v)} placeholder="الاسم"/>
            <div className="role">المراجعة والتحقق</div>
            <div className="sig-line"></div>
            <div className="sig-cap">SIGNATURE / DATE</div>
          </div>
          <div className="sign">
            <div className="label">// المدير التنفيذي</div>
            <Fill className="name" value={st.signatures.ceo} onChange={v => u("signatures.ceo", v)} placeholder="الاسم"/>
            <div className="role">الاعتماد النهائي</div>
            <div className="sig-line"></div>
            <div className="sig-cap">SIGNATURE / DATE</div>
          </div>
        </div>

        <div className="next-bar" style={{ marginTop: 12 }}>
          <div>
            <div className="eyebrow">// DOCUMENT CONTROL · ضبط الوثيقة</div>
            <div className="val" style={{ fontSize: 13, fontWeight: 600 }}>الإصدار v{m.version} · يسري من {m.effective}</div>
          </div>
          <div></div>
          <div className="right">المراجعة القادمة · {m.review}</div>
        </div>

        <Footer page={5} total={TOTAL} docId={m.docId} version={m.version}/>
      </div>
    </div>
  );
}
function RfCell({ k, v, on, mono, calc, full }) {
  return (
    <div className={`rf-cell ${calc ? "calc" : ""} ${full ? "full" : ""}`}>
      <div className="rk">{k}</div>
      <div className="rv"><Fill value={v} onChange={on} placeholder="—" mono={mono} num={mono}/></div>
    </div>
  );
}

/* ─────────── Toolbar ─────────── */
function Toolbar({ onPrint, onReset, onClear }) {
  return (
    <div className="toolbar">
      <div className="brand">MSGA · POLICY</div>
      <button onClick={onPrint}>⎙ PRINT / PDF</button>
      <div className="sep"></div>
      <button onClick={onClear}>○ EMPTY FORM</button>
      <button onClick={onReset}>↺ SAMPLE DATA</button>
    </div>
  );
}

/* ─────────── App ─────────── */
function App() {
  const { state, setState, u, reset, clear } = usePolicyStore();
  return (
    <>
      <Toolbar onPrint={() => window.print()} onReset={reset} onClear={clear}/>
      <div className="stage">
        <Page1 st={state} u={u} setState={setState}/>
        <Page2 st={state} u={u} setState={setState}/>
        <Page3 st={state} u={u} setState={setState}/>
        <Page4 st={state} u={u} setState={setState}/>
        <Page5 st={state} u={u}/>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
