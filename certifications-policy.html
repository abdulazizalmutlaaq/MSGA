<!doctype html>
<html lang="ar" dir="rtl">
<head>
<script src="guard.js"></script>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>MSGA — لائحة الشهادات الاحترافية والمهنية للموظفين</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Saira:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* MSGA — Salary Structure Policy · "MSGA REPORT" HOUSE STYLE
   Matches the April-2026 commercial-sector report exactly:
   navy full-bleed cover + top orange hairline · white content pages ·
   lavender rounded section bars with orange circle number + orange right accent ·
   grey table header with orange underline · colored status pills · rounded cards.
   Self-contained — does NOT depend on sample-base.css. */
:root {
  --navy:#1F3A57; --navy-2:#16304B; --navy-3:#102539; --navy-deep:#0D2034;
  --navy-card:#27425E; --navy-line:#33506C;
  --orange:#E5811F; --orange-2:#C96B12; --orange-soft:#FBEEDD;
  --ink:#1E2B38; --ink-2:#41505F; --ink-3:#76828F; --ink-4:#A7B0BA;
  --paper:#FFFFFF; --paper-2:#F7F8FB; --lav:#EEF0F7; --lav-2:#F4F5FA;
  --line:#E5E8EE; --line-2:#EEF0F4;
  --th:#F4F5F8;
  --ok:#2F8559; --ok-bg:#E6F4EC; --ok-bd:#CBE8D6;
  --prog:#2B5180; --prog-bg:#E9EFF7; --prog-bd:#D2DEEE;
  --hold:#B0831F; --hold-bg:#FAF2DA; --hold-bd:#ECDBA9;
  --red:#B0432C; --red-bg:#F8E9E4; --red-bd:#ECCDC2;
  --l1:#BBC6D2; --l2:#9DACBC; --l3:#7E91A6; --l4:#5F7790; --l5:#46617C; --l6:#2F4D69; --l7:#E5811F;
  --ar:"Tajawal", system-ui, sans-serif;
  --ar-head:"Tajawal", system-ui, sans-serif;
  --latin:"Saira", "Tajawal", system-ui, sans-serif;
  --page-w:210mm; --page-h:297mm; --mx:15mm; --my:14mm;
}
* { box-sizing:border-box; }
html, body { margin:0; padding:0; background:#DDE2E8; font-family:var(--ar); color:var(--ink); -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
body { direction:rtl; }
.stage { min-height:100vh; padding:30px 16px 90px; display:flex; flex-direction:column; align-items:center; gap:28px; }
.page { width:var(--page-w); height:var(--page-h); background:var(--paper); position:relative; overflow:hidden; box-shadow:0 1px 2px rgba(20,30,45,.05), 0 16px 44px rgba(20,30,45,.14); page-break-after:always; break-after:page; display:flex; flex-direction:column; }
.page:last-of-type { page-break-after:auto; }
.watermark { position:absolute; inset:0; pointer-events:none; z-index:0; }
.page-inner { position:relative; z-index:1; flex:1; display:flex; flex-direction:column; padding:var(--my) var(--mx) 0; }

/* numbers latin font */
.latin, .doc-meta, .foot, .lcode, .scale-num, .vchip, .kpi .val, .ti-num, .cnum, .nb, .sec-no, .head .eyebrow, .cap .ref, .prose .lead, .cover-top .brandline, .hero .kicker, .classline, .kpi .label, .toc-head, .cover-meta .k, .dept2-head .code, .dept2-head .cnt { font-family:var(--latin); }

/* ─── Content header ─── */
.head { display:grid; grid-template-columns:auto 1fr auto; align-items:center; gap:16px; padding-bottom:11px; margin-bottom:6px; border-bottom:2px solid var(--orange); }
.head .logo { height:34px; width:auto; display:block; }
.head .titles { display:flex; flex-direction:column; gap:1px; }
.head .eyebrow { font-size:8.5px; font-weight:600; letter-spacing:0.18em; color:var(--orange-2); text-transform:uppercase; direction:ltr; }
.head .doctitle { font-family:var(--ar-head); font-size:13.5px; font-weight:700; color:var(--navy); }
.head .doc-meta { text-align:left; direction:ltr; font-size:9px; font-weight:500; color:var(--ink-3); line-height:1.65; letter-spacing:0.03em; }
.head .doc-meta div { white-space:nowrap; }
.head .doc-meta b { color:var(--navy); font-weight:700; letter-spacing:0.08em; }

/* ─── Footer ─── */
.foot { position:absolute; bottom:8mm; inset-inline:var(--mx); display:flex; align-items:center; justify-content:space-between; font-size:8.5px; font-weight:500; color:var(--ink-3); letter-spacing:0.08em; text-transform:uppercase; border-top:1px solid var(--line); padding-top:7px; z-index:2; direction:ltr; }
.foot .brand-mark { display:flex; align-items:center; gap:7px; }
.foot .brand-mark::before { content:""; width:5px; height:5px; background:var(--orange); border-radius:50%; }
.foot .pagenum b { color:var(--navy); font-weight:700; }

/* ─── Section bar (signature element) ─── */
.sec-head { position:relative; display:flex; align-items:center; gap:11px; flex-direction:row-reverse; justify-content:flex-start; background:var(--lav); border-radius:9px; padding:9px 16px 9px 14px; margin:16px 0 11px; overflow:hidden; }
.sec-head.first { margin-top:4px; }
.sec-head::after { content:""; position:absolute; top:0; bottom:0; right:0; width:5px; background:var(--orange); }
.sec-head .sec-no { width:24px; height:24px; border-radius:50%; background:var(--orange); color:#fff; display:grid; place-items:center; font-size:11px; font-weight:700; flex-shrink:0; }
.sec-head h2 { margin:0; font-family:var(--ar-head); font-size:16px; font-weight:700; color:var(--navy); flex:1; }
.sec-head .en { font-size:9px; font-weight:600; color:var(--ink-3); letter-spacing:0.16em; text-transform:uppercase; white-space:nowrap; direction:ltr; }

/* caption */
.cap { display:flex; align-items:center; gap:11px; margin:2px 2px 8px; }
.cap .lbl { font-size:10px; font-weight:500; color:var(--ink-3); white-space:nowrap; }
.cap .dots { flex:1; height:1px; background:var(--line); }
.cap .ref { font-size:9px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:var(--orange-2); white-space:nowrap; direction:ltr; }

/* prose */
.prose { padding:2px 14px 2px 0; margin-top:4px; border-inline-start:3px solid var(--orange); }
.prose.alt { border-inline-start-color:var(--navy); }
.prose .lead { font-size:9px; font-weight:700; letter-spacing:0.16em; text-transform:uppercase; color:var(--orange-2); margin-bottom:5px; direction:ltr; text-align:start; }
.prose.alt .lead { color:var(--navy); }
.prose p { margin:0; font-size:11.5px; color:var(--ink-2); line-height:1.85; text-wrap:pretty; }
.prose p + p { margin-top:7px; }

/* numbered list */
.nlist { display:grid; grid-template-columns:1fr; margin-top:6px; }
.nlist.two { grid-template-columns:1fr 1fr; column-gap:22px; }
.nitem { display:grid; grid-template-columns:24px 1fr; align-items:start; gap:10px; padding:7px 0; border-bottom:1px solid var(--line-2); }
.nitem .nb { font-size:11px; font-weight:700; color:#fff; background:var(--navy); width:20px; height:20px; border-radius:6px; display:grid; place-items:center; line-height:1; }
.nitem.alt .nb { background:var(--orange); }
.nitem .nt { font-size:11px; line-height:1.6; color:var(--ink-2); padding-top:2px; text-wrap:pretty; }

/* chips */
.chips { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:4px; }
.chip-tag { display:flex; align-items:center; gap:9px; border:1px solid var(--line); background:var(--paper-2); border-radius:8px; padding:9px 12px; font-size:10.5px; color:var(--ink-2); min-height:36px; }
.chip-tag .cnum { font-size:10px; font-weight:700; color:#fff; background:var(--navy); width:18px; height:18px; border-radius:5px; display:grid; place-items:center; flex-shrink:0; }

/* note */
.note { margin-top:10px; padding:11px 14px; background:var(--orange-soft); border-radius:8px; border-inline-start:3px solid var(--orange); font-size:10.5px; color:#7A5417; line-height:1.7; display:flex; gap:10px; align-items:flex-start; text-wrap:pretty; }
.note .x { font-weight:700; font-size:13px; color:var(--orange-2); line-height:1.3; }
.note.alt { background:var(--lav); border-inline-start-color:var(--navy); color:var(--ink-2); }
.note.alt .x { color:var(--navy); }

/* ─── tables ─── */
.ptable { margin-top:6px; border:1px solid var(--line); border-radius:9px; overflow:hidden; }
.pt-head { display:grid; background:var(--th); border-bottom:2px solid var(--orange); font-family:var(--ar-head); font-size:10px; font-weight:700; color:var(--navy); }
.pt-head > div { padding:8px 12px; }
.pt-head > div.center { text-align:center; }
.pt-row { display:grid; border-bottom:1px solid var(--line-2); font-size:11px; min-height:34px; align-items:stretch; background:var(--paper); }
.pt-row:last-child { border-bottom:none; }
.pt-row:nth-child(even) { background:var(--lav-2); }
.pt-row > div { padding:8px 12px; display:flex; align-items:center; }
.pt-row .center { justify-content:center; }
.pt-row .strong { font-weight:700; color:var(--navy); }
.pt-row .muted { color:var(--ink-3); font-size:10px; }
.lcode { font-size:10px; color:var(--ink-3); direction:ltr; }
.cols-level { grid-template-columns:120px 150px 1fr; }
.cols-scale { grid-template-columns:128px 60px 1fr 1fr 1fr; }
.cols-grade { grid-template-columns:170px 1fr; }
.cols-rate  { grid-template-columns:1fr 190px; }
.cols-auth  { grid-template-columns:220px 1fr; }

/* level badge */
.lvl-badge { display:inline-flex; align-items:center; gap:8px; font-size:11px; font-weight:500; color:var(--ink); }
.lvl-badge .ln { font-size:9.5px; font-weight:700; color:#fff; width:19px; height:19px; border-radius:50%; display:grid; place-items:center; flex-shrink:0; }
.lvl-mini { font-size:9px; font-weight:700; color:#fff; width:17px; height:17px; border-radius:50%; display:grid; place-items:center; flex-shrink:0; }
.lvl-1{background:var(--l1)} .lvl-2{background:var(--l2)} .lvl-3{background:var(--l3)} .lvl-4{background:var(--l4)} .lvl-5{background:var(--l5)} .lvl-6{background:var(--l6)} .lvl-7{background:var(--l7)}

/* salary numbers */
.scale-num { font-size:12px; direction:ltr; font-weight:500; color:var(--ink-2); }
.scale-num.mid { color:var(--orange-2); font-weight:700; }
.scale-num.hi { color:var(--navy); font-weight:700; }

/* status-style pill (for grades / values) */
.pill { display:inline-flex; align-items:center; gap:7px; font-family:var(--ar-head); font-size:11px; font-weight:700; padding:4px 11px; border-radius:999px; border:1px solid transparent; white-space:nowrap; }
.pill::before { content:""; width:6px; height:6px; border-radius:50%; background:currentColor; }
.pill.ok   { color:var(--ok);   background:var(--ok-bg);   border-color:var(--ok-bd); }
.pill.prog { color:var(--prog); background:var(--prog-bg); border-color:var(--prog-bd); }
.pill.hold { color:var(--hold); background:var(--hold-bg); border-color:var(--hold-bd); }
.pill.red  { color:var(--red);  background:var(--red-bg);  border-color:var(--red-bd); }
.pill.plain{ color:var(--ink-3); background:var(--paper-2); border-color:var(--line); }

.vchip { font-size:13px; font-weight:700; direction:ltr; white-space:nowrap; }
.vchip.pos{color:var(--ok)} .vchip.warn{color:var(--hold)} .vchip.none{color:var(--ink-4)} .vchip.nav{color:var(--navy)}
.vchip.ar{direction:rtl; font-family:var(--ar-head); font-size:11.5px}

/* rating -> use pill look */
.rating { display:inline-flex; align-items:center; gap:7px; font-family:var(--ar-head); font-size:11px; font-weight:700; padding:4px 12px; border-radius:999px; border:1px solid; }
.rating::before { content:""; width:6px; height:6px; border-radius:50%; background:currentColor; }
.rating.r-excep { color:var(--ok);   background:var(--ok-bg);   border-color:var(--ok-bd); }
.rating.r-exc   { color:var(--prog); background:var(--prog-bg); border-color:var(--prog-bd); }
.rating.r-vg    { color:var(--hold); background:var(--hold-bg); border-color:var(--hold-bd); }
.rating.r-good  { color:var(--orange-2); background:var(--orange-soft); border-color:#EFD9B6; }
.rating.r-below { color:var(--red);  background:var(--red-bg);  border-color:var(--red-bd); }
.grade-desc { font-size:10.5px; color:var(--ink-3); line-height:1.6; text-wrap:pretty; }

/* band chart */
.bandchart { margin-top:8px; padding:11px 14px; border:1px solid var(--line); border-radius:9px; background:var(--paper-2); }
.bc-head { display:flex; justify-content:space-between; align-items:baseline; font-size:9px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-3); margin-bottom:11px; }
.bc-head .axis { direction:ltr; color:var(--orange-2); font-family:var(--latin); }
.bc-row { display:grid; grid-template-columns:92px 1fr; align-items:center; gap:13px; margin-bottom:7px; }
.bc-row:last-child { margin-bottom:0; }
.bc-row .bc-label { font-size:10px; font-weight:500; color:var(--ink-2); text-align:start; }
.bc-track { position:relative; height:14px; direction:ltr; }
.bc-track .grid-line { position:absolute; top:-4px; bottom:-4px; width:1px; background:var(--line); }
.bc-bar { position:absolute; top:4px; height:7px; border-radius:4px; display:flex; align-items:center; }
.bc-bar.lvl-1{background:var(--l1);color:var(--l1)} .bc-bar.lvl-2{background:var(--l2);color:var(--l2)} .bc-bar.lvl-3{background:var(--l3);color:var(--l3)} .bc-bar.lvl-4{background:var(--l4);color:var(--l4)} .bc-bar.lvl-5{background:var(--l5);color:var(--l5)} .bc-bar.lvl-6{background:var(--l6);color:var(--l6)} .bc-bar.lvl-7{background:var(--l7);color:var(--l7)}
.bc-bar .mid-dot { position:absolute; width:9px; height:9px; border-radius:50%; background:var(--paper); box-shadow:0 0 0 2px currentColor; transform:translateX(-50%); }
.bc-axis-labels { display:flex; justify-content:space-between; direction:ltr; font-family:var(--latin); font-size:9px; font-weight:600; color:var(--ink-4); margin:6px 0 0; padding-inline-start:105px; }

/* department cards */
.depttitles { display:grid; grid-template-columns:1fr 1fr; gap:13px; margin-top:6px; }
.dept2 { border:1px solid var(--line); border-radius:9px; background:var(--paper); display:flex; flex-direction:column; break-inside:avoid; overflow:hidden; }
.dept2-head { display:grid; grid-template-columns:1fr auto; align-items:center; gap:8px; padding:8px 13px; background:var(--th); border-bottom:2px solid var(--orange); }
.dept2-head .dn { font-family:var(--ar-head); font-size:12px; font-weight:700; color:var(--navy); }
.dept2-head .meta { display:flex; align-items:center; gap:8px; }
.dept2-head .code { font-size:9px; font-weight:700; letter-spacing:0.08em; color:var(--orange-2); direction:ltr; }
.dept2-head .cnt { font-size:9px; color:var(--ink-3); direction:ltr; }
.dt-row { display:grid; grid-template-columns:20px 88px 1fr; align-items:center; gap:9px; padding:6px 13px; border-bottom:1px solid var(--line-2); font-size:10.5px; min-height:30px; }
.dt-row:last-child { border-bottom:none; }
.dt-row .dt-lvl { font-size:9px; color:var(--ink-3); }
.dt-row .dt-title { font-weight:500; color:var(--ink); }

/* steps */
.steps { display:grid; margin-top:6px; border:1px solid var(--line); border-radius:9px; overflow:hidden; }
.step { display:grid; grid-template-columns:42px 1fr; border-bottom:1px solid var(--line-2); align-items:stretch; }
.step:last-child { border-bottom:none; }
.step:nth-child(even) { background:var(--lav-2); }
.step .snum { background:var(--navy); color:#fff; display:grid; place-items:center; font-size:13px; font-weight:700; }
.step .stext { padding:10px 13px; font-size:11px; line-height:1.6; color:var(--ink-2); display:flex; align-items:center; text-wrap:pretty; }

/* annual cycle */
.cycle { margin-top:6px; padding:16px 10px 6px; }
.cycle-track { display:grid; grid-template-columns:repeat(4,1fr); position:relative; direction:rtl; }
.cycle-track::before { content:""; position:absolute; top:16px; inset-inline:12%; height:2px; background:var(--line); z-index:0; }
.cycle-node { display:flex; flex-direction:column; align-items:center; gap:8px; position:relative; z-index:1; text-align:center; padding:0 8px; }
.cycle-node .dot { width:32px; height:32px; border-radius:50%; background:var(--paper); color:var(--navy); display:grid; place-items:center; font-family:var(--latin); font-size:13px; font-weight:700; border:2px solid var(--navy); }
.cycle-node.accent .dot { background:var(--orange); color:#fff; border-color:var(--orange); }
.cycle-node .period { font-family:var(--ar-head); font-size:11.5px; font-weight:700; color:var(--orange-2); }
.cycle-node .clabel { font-size:11px; font-weight:700; color:var(--navy); line-height:1.35; }
.cycle-node .cdesc { font-size:9.5px; color:var(--ink-3); line-height:1.5; max-width:140px; }

/* sign-off */
.signoff-triple { margin-top:12px; display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
.signoff-triple .sign { padding:13px; border:1px solid var(--line); border-radius:9px; background:var(--paper-2); display:flex; flex-direction:column; gap:5px; min-height:92px; }
.signoff-triple .sign .label { font-size:9px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; color:var(--orange-2); direction:ltr; text-align:start; }
.signoff-triple .sign .nm { font-size:11.5px; font-weight:700; color:var(--ink); min-height:16px; }
.signoff-triple .sign .role { font-size:10px; color:var(--ink-3); }
.signoff-triple .sign .sig-line { margin-top:auto; border-bottom:1px dashed var(--ink-4); height:24px; }
.signoff-triple .sign .sig-cap { font-size:8.5px; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-4); direction:ltr; text-align:start; }

/* doc control */
.docctrl { margin-top:14px; background:var(--navy); border-radius:9px; padding:14px 18px; display:grid; grid-template-columns:1fr auto; align-items:center; gap:16px; color:#fff; }
.docctrl .eyebrow { font-size:9px; letter-spacing:0.16em; color:#F0B978; text-transform:uppercase; margin-bottom:4px; direction:ltr; text-align:start; }
.docctrl .val { font-family:var(--ar-head); font-size:13px; font-weight:700; color:#fff; }
.docctrl .right { font-size:9.5px; color:#AEBCCC; letter-spacing:0.1em; text-transform:uppercase; text-align:left; direction:ltr; }

/* ═══════ COVER (navy full-bleed) ═══════ */
.page.cover { background:var(--navy); }
.page.cover::before { content:""; position:absolute; top:0; inset-inline:0; height:5px; background:var(--orange); z-index:3; }
.page.cover .watermark::after { content:""; position:absolute; inset:0; background:url("assets/msga-logo.png") no-repeat center 60%; background-size:62% auto; opacity:.04; filter:brightness(0) invert(1); }
.cover-inner { padding:0 !important; }
.cover-top { display:grid; grid-template-columns:auto 1fr auto; align-items:center; gap:16px; padding:13mm var(--mx) 0; }
.cover-top .co { font-family:var(--ar-head); font-size:12px; font-weight:700; color:#fff; }
.cover-top .brandline { font-size:9.5px; font-weight:600; letter-spacing:0.18em; text-transform:uppercase; color:var(--orange); text-align:left; direction:ltr; }
.cover-hero { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0 var(--mx); text-align:center; }
.cover-hero .logo-w { height:64px; width:auto; filter:brightness(0) invert(1); margin-bottom:30px; }
.cover-hero h1 { margin:0; font-family:var(--ar-head); font-size:50px; font-weight:800; line-height:1.12; color:#fff; letter-spacing:-0.01em; }
.cover-hero .subtitle { margin-top:14px; font-size:13px; font-weight:500; color:var(--orange); letter-spacing:0.02em; }
.cover-hero .period-pill { margin-top:20px; border:1.5px solid rgba(255,255,255,.4); border-radius:999px; padding:8px 24px; font-size:12px; font-weight:600; color:#fff; direction:ltr; white-space:nowrap; letter-spacing:0.04em; }
.cover-desc { margin:20px auto 0; max-width:74%; font-size:12px; color:#C5D0DC; line-height:1.85; text-wrap:pretty; }
.cover-cards { display:grid; grid-template-columns:repeat(3,1fr); gap:13px; margin:0 var(--mx) 8mm; }
.cover-cards.four { grid-template-columns:repeat(4,1fr); }
.ccard { background:var(--navy-card); border:1px solid var(--navy-line); border-radius:10px; padding:13px 15px; text-align:center; display:flex; flex-direction:column; gap:5px; }
.ccard .k { font-size:9px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:var(--orange); direction:ltr; }
.ccard .v { font-family:var(--ar-head); font-size:14px; font-weight:700; color:#fff; }
.ccard .v.num { font-family:var(--latin); font-size:26px; line-height:1; direction:ltr; }
.ccard .s { font-size:9px; color:#9FB0C0; }

/* cover TOC strip */
.cover-toc { margin:0 var(--mx) 7mm; padding-top:14px; border-top:1px solid var(--navy-line); }
.cover-toc .th { font-size:9px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:#8FA2B4; margin-bottom:9px; direction:ltr; }
.cover-toc .tg { display:grid; grid-template-columns:repeat(4,1fr); gap:5px 18px; }

      <NList items={C.eligibility} two/>

/* ── P4 · Department ↔ Certificate matrix (Article 04 cont.) ── */
function PageDept() {
  return (

      <div className="deptmtx">

          <div className="dmx" key={i}>

          </div>
        ))}
      </div>
      <Note tight>{C.deptCertsNote}</Note>

}

function Page5() {

      </div>

/* ── P16 · General · Approval ── */
function Page16() {
  const m = C.meta;
  return (
    <Page label="17 أحكام عامة والاعتماد" page={17}>
      <Sec no="26" label="أحكام عامة" en="General Provisions" first/>
      <Cap lbl="الأحكام الختامية لتطبيق اللائحة" tag="05 Provisions"/>
      <NList items={C.general} two/>
      <Sec no="27" label="الاعتماد" en="Approval & Sign-off"/>
      <Prose lead="Effective"><p>{C.approvalText}</p></Prose>
      <Cap lbl="الاعتمادات والتوقيعات" tag={`Approvals · ${m.docId}`}/>
      <div className="signoff-quad">
        {C.signatures.map((s, i) => (
          <div className="sign" key={i}>
            <div className="label">{s.label.replace(/^\/\/\s*/, "")}</div>
            <div className="role">{s.role}</div>
            <div className="nm">{s.who || "\u00A0"}</div>
            <div className="sig-line"></div>
            <div className="sig-cap">Signature / Date</div>
          </div>
        ))}
      </div>
      <div className="docctrl">
        <div><div className="eyebrow">Document Control · ضبط الوثيقة</div><div className="val">الإصدار v{m.version} · الجهة المالكة: {m.owner}</div></div>
        <div className="right">Effective {m.effective}</div>
      </div>
    </Page>
  );
}

function Toolbar() {
  return <div className="toolbar"><div className="brand">MSGA · Regulation</div><button onClick={() => window.print()}>Print / PDF</button></div>;
}
function App() {
  return (
    <>
      <Toolbar/>
      <div className="stage">
        <PageCover/><Page2/><Page3/><PageDept/><Page4/><Page5/><Page6/><Page7/><Page8/>
        <Page9/><Page10/><Page11/><Page12/><Page13/><Page14/><Page15/><Page16/>
      </div>
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
