<!doctype html>
<html lang="ar" dir="rtl">
<head>
<script src="guard.js"></script>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>MSGA — محضر اجتماع</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* MSGA — Meeting Minutes Design System */

:root {
  /* Brand */
  --navy: #10375C;
  --navy-deep: #0A2540;
  --navy-tint: #E8EEF5;
  --orange: #FF7E2A;
  --orange-soft: #FFE4D2;
  --gold: #F2C523;
  --gold-soft: #FCEFB4;

  /* Mono neutrals */
  --ink: #1E1E1E;
  --ink-2: #3A3A3A;
  --ink-3: #6B6B6B;
  --ink-4: #9CA3AF;
  --paper: #FFFFFF;
  --paper-2: #F7F7F7;
  --paper-3: #EFEFEC;
  --line: #DCDFE4;
  --line-2: #E8EAEE;

  /* A4 sizing */
  --page-w: 210mm;
  --page-h: 297mm;
  --margin-x: 14mm;
  --margin-y: 14mm;

  /* Type */
  --ar: "IBM Plex Sans Arabic", system-ui, sans-serif;
  --mono: "IBM Plex Mono", "JetBrains Mono", ui-monospace, monospace;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--paper-3);
  font-family: var(--ar);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "kern", "liga", "ss01";
}

body { direction: rtl; }

.stage {
  min-height: 100vh;
  padding: 24px 16px 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
}

.page {
  width: var(--page-w);
  height: var(--page-h);
  background: var(--paper);
  position: relative;
  overflow: hidden;
  box-shadow: 0 1px 2px rgba(16,55,92,.04), 0 8px 24px rgba(16,55,92,.08);
  page-break-after: always;
  break-after: page;
  display: flex;
  flex-direction: column;
}

.page:last-of-type { page-break-after: auto; }

.watermark {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background-image:
    radial-gradient(circle at 1px 1px, rgba(16,55,92,.045) 1px, transparent 1px);
  background-size: 14px 14px;
  background-position: 0 0;
}
.watermark::after {
  content: "";
  position: absolute;
  inset: 0;
  background-image: url("assets/msga-logo.png");
  background-repeat: no-repeat;
  background-position: center 60%;
  background-size: 60% auto;
  opacity: .025;
  filter: grayscale(1);
}

.page-inner {
  position: relative;
  z-index: 1;
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: var(--margin-y) var(--margin-x);
  gap: 0;
}

.head {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 14px;
  padding-bottom: 10px;
  border-bottom: 1.5px solid var(--ink);
  margin-bottom: 12px;
}
.head .logo {
  height: 44px;
  width: auto;
  display: block;
}
.head .titles {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.head .eyebrow {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.14em;
  color: var(--ink-3);
  text-transform: uppercase;
}
.head .doctitle {
  font-size: 14px;
  font-weight: 600;
  color: var(--navy);
  letter-spacing: -0.01em;
}
.head .doc-meta {
  text-align: left;
  font-family: var(--mono);
  font-size: 9.5px;
  color: var(--ink-3);
  line-height: 1.55;
  direction: ltr;
}
.head .doc-meta b {
  color: var(--ink);
  font-weight: 600;
}

.foot {
  position: absolute;
  bottom: 8mm;
  inset-inline: var(--margin-x);
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-family: var(--mono);
  font-size: 9px;
  color: var(--ink-3);
  letter-spacing: 0.08em;
  border-top: 1px solid var(--line);
  padding-top: 6px;
  z-index: 2;
}
.foot .brand-mark {
  display: flex;
  align-items: center;
  gap: 6px;
}
.foot .brand-mark::before {
  content: "";
  display: inline-block;
  width: 6px; height: 6px;
  background: var(--orange);
}
.foot .pagenum b { color: var(--ink); font-weight: 600; }

.sec-head {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 16px 0 10px;
}
.sec-head .num {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  background: var(--navy);
  color: #fff;
  padding: 3px 7px;
  letter-spacing: 0.08em;
}
.sec-head .icon {
  width: 22px; height: 22px;
  display: grid; place-items: center;
  background: var(--navy-tint);
  color: var(--navy);
  border-radius: 2px;
}
.sec-head .icon svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.6; }
.sec-head h2 {
  margin: 0;
  font-size: 15px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -0.01em;
}
.sec-head .en {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--ink-4);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin-inline-start: auto;
}
.sec-head .rule {
  flex: 1;
  height: 1px;
  background: var(--line);
  margin-inline-start: 8px;
}

.hero {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 14px;
  align-items: end;
  border-bottom: 1px solid var(--line);
  padding-bottom: 12px;
  margin-top: 4px;
}
.hero .kicker {
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: 0.22em;
  color: var(--orange);
  text-transform: uppercase;
  margin-bottom: 6px;
}
.hero h1 {
  margin: 0;
  font-size: 38px;
  font-weight: 700;
  line-height: 1.05;
  color: var(--navy);
  letter-spacing: -0.02em;
}
.hero h1 .arrow { color: var(--orange); font-weight: 600; }
.hero .subtitle {
  margin-top: 8px;
  font-size: 13px;
  color: var(--ink-3);
  max-width: 70%;
  line-height: 1.55;
}
.hero .stamp {
  font-family: var(--mono);
  font-size: 9px;
  border: 1px solid var(--navy);
  color: var(--navy);
  padding: 6px 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  direction: ltr;
  line-height: 1.4;
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.hero .stamp b { font-weight: 600; font-size: 11px; }

.kpis {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  margin-top: 14px;
  border: 1px solid var(--line);
  background: var(--paper-2);
}
.kpi {
  padding: 12px 12px 10px;
  border-inline-end: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.kpi:last-child { border-inline-end: none; }
.kpi .label {
  font-family: var(--mono);
  font-size: 8.5px;
  letter-spacing: 0.16em;
  color: var(--ink-3);
  text-transform: uppercase;
}
.kpi .val {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 600;
  color: var(--navy);
  line-height: 1;
  direction: ltr;
  text-align: start;
}
.kpi .val.ar { font-family: var(--ar); font-size: 16px; direction: rtl; padding-top: 4px;}
.kpi .sub {
  font-size: 10px;
  color: var(--ink-3);
}

.info-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0;
  border: 1px solid var(--line);
  margin-top: 4px;
}
.info-row {
  display: grid;
  grid-template-columns: 130px 1fr;
  border-bottom: 1px solid var(--line);
  border-inline-end: 1px solid var(--line);
  min-height: 38px;
}
.info-row:nth-child(2n) { border-inline-end: none; }
.info-row:nth-last-child(-n+2) { border-bottom: none; }
.info-row .k {
  background: var(--paper-2);
  padding: 8px 10px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: var(--ink-2);
  font-weight: 500;
  border-inline-end: 1px solid var(--line);
}
.info-row .k svg { width: 12px; height: 12px; color: var(--navy); }
.info-row .v {
  padding: 8px 10px;
  display: flex;
  align-items: center;
  font-size: 12px;
  color: var(--ink);
}

.fill {
  border: none;
  outline: none;
  background: transparent;
  width: 100%;
  font: inherit;
  color: inherit;
  padding: 2px 0;
  border-bottom: 1px dashed transparent;
  transition: border .15s, background .15s;
}
.fill:hover { border-bottom-color: var(--line); }
.fill:focus {
  border-bottom-color: var(--orange);
  background: linear-gradient(to top, rgba(255,126,42,.06), transparent);
}
.fill::placeholder { color: var(--ink-4); font-weight: 300; }

.fill-mono { font-family: var(--mono); }
.fill-num { font-family: var(--mono); direction: ltr; text-align: start; }

.attendees {
  margin-top: 14px;
  border: 1px solid var(--line);
}
.attendees-head {
  display: grid;
  grid-template-columns: 28px 1fr 140px 90px 60px;
  background: var(--navy);
  color: #fff;
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.attendees-head > div { padding: 7px 10px; border-inline-end: 1px solid rgba(255,255,255,.15); }
.attendees-head > div:last-child { border-inline-end: none; }

.attendee-row {
  display: grid;
  grid-template-columns: 28px 1fr 140px 90px 60px;
  border-bottom: 1px solid var(--line);
  font-size: 11.5px;
  min-height: 32px;
}
.attendee-row:last-child { border-bottom: none; }
.attendee-row > div {
  padding: 6px 10px;
  border-inline-end: 1px solid var(--line);
  display: flex;
  align-items: center;
}
.attendee-row > div:last-child { border-inline-end: none; justify-content: center; }
.attendee-row .idx { font-family: var(--mono); font-size: 10px; color: var(--ink-4); justify-content: center; padding: 6px 0; }

.pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 8px;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border: 1px solid currentColor;
  border-radius: 999px;
  white-space: nowrap;
}
.pill::before {
  content: "";
  width: 5px; height: 5px;
  border-radius: 50%;
  background: currentColor;
}
.pill.present { color: var(--navy); background: var(--navy-tint); }
.pill.absent { color: #B23A1F; background: #FCE5DE; }
.pill.remote { color: #8B5E00; background: var(--gold-soft); }
.pill.done { color: #1F6B3E; background: #DCEFE2; }
.pill.progress { color: #8B5E00; background: var(--gold-soft); }
.pill.todo { color: var(--orange); background: var(--orange-soft); }
.pill.blocked { color: #B23A1F; background: #FCE5DE; }

.pill-select {
  border: none;
  background: transparent;
  font: inherit;
  cursor: pointer;
  outline: none;
  appearance: none;
}

.agenda {
  margin-top: 4px;
  border: 1px solid var(--line);
}
.agenda-head, .agenda-row {
  display: grid;
  grid-template-columns: 40px 70px 1fr 90px 110px 28px;
}
.agenda-head {
  background: var(--navy);
  color: #fff;
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.agenda-head > div { padding: 7px 10px; border-inline-end: 1px solid rgba(255,255,255,.15); }
.agenda-row {
  border-bottom: 1px solid var(--line);
  font-size: 12px;
  min-height: 38px;
}
.agenda-row:last-child { border-bottom: none; }
.agenda-row > div {
  padding: 8px 10px;
  border-inline-end: 1px solid var(--line);
  display: flex;
  align-items: center;
}
.agenda-row > div:last-child { border-inline-end: none; }
.agenda-row .num { font-family: var(--mono); font-size: 11px; color: var(--ink-3); justify-content: center; }
.agenda-row .time { font-family: var(--mono); font-size: 11px; color: var(--ink); direction: ltr; }
.agenda-row .topic { font-weight: 500; }
.agenda-row .topic .desc { display: block; font-size: 10.5px; color: var(--ink-3); font-weight: 400; margin-top: 2px; }
.agenda-row .own { font-size: 11px; color: var(--ink-2); }
.agenda-row .del {
  justify-content: center;
  color: var(--ink-4);
  cursor: pointer;
  opacity: 0;
}
.agenda-row:hover .del { opacity: 1; }
.agenda-row .del:hover { color: var(--orange); }

.timeline {
  margin-top: 10px;
  border: 1px solid var(--line);
  padding: 10px 12px 12px;
  background: var(--paper-2);
}
.timeline .tl-head {
  display: flex;
  justify-content: space-between;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-bottom: 8px;
  direction: ltr;
}
.timeline .tl-bar {
  height: 22px;
  background: #fff;
  border: 1px solid var(--line);
  position: relative;
  display: flex;
  direction: ltr;
  overflow: hidden;
}
.tl-seg {
  position: relative;
  border-inline-end: 1px solid #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 9px;
  color: rgba(255,255,255,.95);
  font-weight: 600;
}
.tl-seg:last-child { border-inline-end: none; }
.tl-labels {
  display: flex;
  direction: ltr;
  font-family: var(--mono);
  font-size: 8.5px;
  color: var(--ink-3);
  margin-top: 6px;
}
.tl-label { flex: 1; text-align: center; }

.points {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 4px;
}
.point {
  display: grid;
  grid-template-columns: 38px 1fr;
  border: 1px solid var(--line);
  border-inline-start: 3px solid var(--navy);
  background: #fff;
}
.point.accent-orange { border-inline-start-color: var(--orange); }
.point.accent-gold { border-inline-start-color: var(--gold); }
.point .p-num {
  background: var(--paper-2);
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
  color: var(--navy);
  display: flex;
  align-items: center;
  justify-content: center;
  border-inline-end: 1px solid var(--line);
}
.point .p-body { padding: 9px 12px 11px; }
.point .p-top {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}
.point .p-title {
  font-size: 12.5px;
  font-weight: 600;
  color: var(--ink);
  flex: 1;
}
.point .tag {
  font-family: var(--mono);
  font-size: 8.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 2px 6px;
  background: var(--navy-tint);
  color: var(--navy);
}
.point .tag.dec { background: var(--orange-soft); color: #B33D00; }
.point .tag.info { background: var(--gold-soft); color: #8B5E00; }
.point .p-text {
  font-size: 11.5px;
  color: var(--ink-2);
  line-height: 1.65;
}
.point .p-meta {
  margin-top: 6px;
  display: flex;
  gap: 14px;
  font-family: var(--mono);
  font-size: 9px;
  color: var(--ink-3);
  letter-spacing: 0.06em;
}
.point .p-meta b { color: var(--ink); font-weight: 600; }

.actions {
  margin-top: 4px;
  border: 1px solid var(--line);
}
.actions-head, .action-row {
  display: grid;
  grid-template-columns: 32px 32px 1fr 110px 80px 90px 24px;
}
.actions-head {
  background: var(--navy);
  color: #fff;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.actions-head > div { padding: 7px 8px; border-inline-end: 1px solid rgba(255,255,255,.15); }
.action-row {
  border-bottom: 1px solid var(--line);
  font-size: 11.5px;
  min-height: 42px;
  background: #fff;
}
.action-row:last-child { border-bottom: none; }
.action-row > div {
  padding: 8px;
  border-inline-end: 1px solid var(--line);
  display: flex;
  align-items: center;
}
.action-row > div:last-child { border-inline-end: none; }
.action-row .a-num { font-family: var(--mono); font-size: 10.5px; color: var(--ink-3); justify-content: center; }
.action-row .chk-cell { justify-content: center; }
.action-row .a-task { font-weight: 500; }
.action-row .a-task .sub { display: block; font-size: 10px; color: var(--ink-3); margin-top: 2px; font-weight: 400; }
.action-row.done .a-task { color: var(--ink-3); text-decoration: line-through; }
.action-row .a-date { font-family: var(--mono); font-size: 10.5px; direction: ltr; }
.action-row .a-prio { justify-content: center; }
.action-row .del { color: var(--ink-4); cursor: pointer; justify-content: center; opacity: 0; }
.action-row:hover .del { opacity: 1; }

.chk {
  width: 16px; height: 16px;
  border: 1.5px solid var(--ink);
  display: grid;
  place-items: center;
  cursor: pointer;
  background: #fff;
}
.chk.checked {
  background: var(--navy);
  border-color: var(--navy);
}
.chk.checked::after {
  content: "✓";
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  line-height: 1;
}

.prio { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 10px; }
.prio::before { content: ""; width: 8px; height: 8px; border-radius: 50%; }
.prio.high::before { background: var(--orange); }
.prio.med::before { background: var(--gold); }
.prio.low::before { background: var(--ink-4); }

.summary {
  margin-top: 12px;
  border: 1px solid var(--navy);
  background: var(--navy);
  color: #fff;
  padding: 12px 14px;
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 14px;
}
.summary .s-left {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.summary .s-eyebrow {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.18em;
  color: var(--gold);
  text-transform: uppercase;
}
.summary .s-title { font-size: 14px; font-weight: 600; }
.summary .s-stats {
  display: flex;
  gap: 18px;
  font-family: var(--mono);
}
.summary .s-stat .n { font-size: 22px; font-weight: 600; line-height: 1; }
.summary .s-stat .l { font-size: 8.5px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,.7); margin-top: 4px; }

.signoff {
  margin-top: 14px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
.sign {
  padding: 14px 14px 10px;
  border: 1px solid var(--line);
  background: var(--paper-2);
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 110px;
}
.sign .label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-3);
}
.sign .name {
  font-size: 12px;
  font-weight: 600;
  color: var(--ink);
  border-bottom: 1px dashed var(--line);
  padding-bottom: 4px;
}
.sign .role { font-size: 10.5px; color: var(--ink-3); }
.sign .sig-line {
  margin-top: auto;
  border-bottom: 1.5px solid var(--ink);
  height: 32px;
}
.sign .sig-cap {
  font-family: var(--mono);
  font-size: 8.5px;
  letter-spacing: 0.12em;
  color: var(--ink-4);
  text-transform: uppercase;
}

.add-row {
  display: flex;
  align-items: center;
  gap: 6px;
  background: transparent;
  border: 1px dashed var(--line);
  color: var(--ink-3);
  font-family: var(--ar);
  font-size: 11px;
  padding: 6px 10px;
  cursor: pointer;
  width: 100%;
  justify-content: center;
  transition: all .15s;
}
.add-row:hover {
  border-color: var(--orange);
  color: var(--orange);
  background: var(--orange-soft);
}
.add-row::before { content: "+"; font-family: var(--mono); font-weight: 700; }

.toolbar {
  position: fixed;
  top: 16px;
  inset-inline-start: 16px;
  z-index: 100;
  background: var(--ink);
  color: #fff;

/* Store hook */
function useStore() {
  const [state, setState] = useState(() => loadState() || DEFAULT_STATE);
  useEffect(() => { saveState(state); }, [state]);
  const update = (path, val) => {
    setState(s => {
      const copy = JSON.parse(JSON.stringify(s));
      const parts = path.split(".");
      let cur = copy;
      for (let i = 0; i < parts.length - 1; i++) {
        const k = parts[i];
        cur = cur[k.match(/^\d+$/) ? Number(k) : k];
      }
      const last = parts[parts.length - 1];
      cur[last.match(/^\d+$/) ? Number(last) : last] = val;
      return copy;
    });
  };
  const reset = () => { localStorage.removeItem(STORAGE_KEY); setState(DEFAULT_STATE); };
  const clear = () => {
    const blank = JSON.parse(JSON.stringify(DEFAULT_STATE));
    blank.meta = Object.fromEntries(Object.keys(blank.meta).map(k => [k, ""]));
    blank.attendees = blank.attendees.map(a => ({ ...a, status: "present" }));
    blank.agenda = Array(5).fill(0).map(() => ({ time: "", dur: "", topic: "", desc: "", owner: "", type: "نقاش" }));
    blank.points = Array(3).fill(0).map(() => ({ tag: "نقاش", title: "", text: "", meta: { vote: "", impact: "" } }));
    blank.departments = blank.departments.map(d => ({ ...d, tasks: Array(3).fill(0).map(() => ({ task: "", due: "", status: "progress" })) }));
    blank.notes = "";
    blank.nextMeeting = "";
    setState(blank);
  };
  return { state, setState, update, reset, clear };
}

/* Fillable input */
function Fill({ value, onChange, placeholder, className = "", mono = false, num = false, multi = false, ...rest }) {
  const ref = useRef(null);
  useEffect(() => {
    if (multi && ref.current) {
      ref.current.style.height = "auto";
      ref.current.style.height = ref.current.scrollHeight + "px";
    }
  }, [value, multi]);
  if (multi) {
    return (
      <textarea
        ref={ref}
        className={`fill fill-multi ${mono ? "fill-mono" : ""} ${className}`}
        value={value || ""}
        onChange={e => onChange(e.target.value)}
        placeholder={placeholder}
        rows={1}
        {...rest}
      />
    );
  }
  return (
    <input
      className={`fill ${mono ? "fill-mono" : ""} ${num ? "fill-num" : ""} ${className}`}
      value={value || ""}
      onChange={e => onChange(e.target.value)}
      placeholder={placeholder}
      {...rest}
    />
  );
}

  const pct = total ? Math.round(done/total*100) : 0;

  return (
    <div className="page" data-screen-label={`0${pageNum} Dept Tasks ${partLabel || ""}`}>
      <div className="watermark"></div>
      <div className="page-inner">
        <Header docId={m.docId} title={m.title} date={m.date} page={pageNum} total={totalPages}/>

        <SecHead num={secNum} label="مهام الإدارات والمتابعة الأسبوعية" en={`DEPT TASKS · ${partLabel || ""}`} icon={Icon.check}/>

        {showLegend ? <StatusLegend st={st} marker={partLabel}/> : (
          <div className="meta-strip" style={{marginBottom: 8, marginTop: 2}}>
            <span>// CONTINUED · {partLabel}</span>
            <div className="dots"></div>
            <span>{m.docId} · {m.date}</span>
          </div>
        )}

        <div className="depts">
          {deptIndices.map(di => <DeptCard key={di} st={st} u={u} setState={setState} di={di}/>)}
        </div>

        {showSignoff ? (
          <>
            <div className="next-bar">
              <div>
                <div className="eyebrow">// NEXT MEETING · الاجتماع القادم</div>
                <Fill className="val" value={st.nextMeeting} onChange={v => u("nextMeeting", v)} placeholder="التاريخ والوقت" style={{color:"#fff", fontSize:13, fontWeight:600}}/>
              </div>
              <div></div>
              <div className="right">إنجاز الأسبوع · {pct}%</div>
            </div>

            <div className="signoff-compact" style={{gridTemplateColumns: "1fr"}}>
              <div className="sign">
                <div className="label">// CHAIR · رئيس الاجتماع</div>
                <div className="name">{m.chair || "—"}</div>
                <div className="role">المدير التنفيذي · MSGA Investment</div>
                <div className="sig-line"></div>
              </div>
            </div>
          </>
        ) : null}

        <Footer page={pageNum} total={totalPages} docId={m.docId}/>
      </div>
    </div>
  );
}

/* Toolbar */
function Toolbar({ onPrint, onReset, onClear }) {
  return (
    <div className="toolbar">
      <div className="brand">MSGA · MoM</div>
      <button onClick={onPrint}>&#9113; PRINT / PDF</button>
      <div className="sep"></div>
      <button onClick={onClear}>&#9675; EMPTY FORM</button>
      <button onClick={onReset}>&#8635; SAMPLE DATA</button>
    </div>
  );
}

/* App */
function App() {
  const { state, setState, update, reset, clear } = useStore();
  return (
    <>
      <Toolbar
        onPrint={() => window.print()}
        onReset={reset}
        onClear={clear}
      />
      <div className="stage">
        <Page1 st={state} u={update}/>
        <TasksPage st={state} u={update} setState={setState} deptIndices={[0,1]} pageNum={2} totalPages={4} showLegend secNum="02" partLabel="جزء 1/3"/>
        <TasksPage st={state} u={update} setState={setState} deptIndices={[2]} pageNum={3} totalPages={4} secNum="03" partLabel="جزء 2/3"/>
        <TasksPage st={state} u={update} setState={setState} deptIndices={[3,4]} pageNum={4} totalPages={4} showSignoff secNum="04" partLabel="جزء 3/3"/>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
