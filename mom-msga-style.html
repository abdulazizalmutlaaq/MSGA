<!doctype html>
<html lang="ar" dir="rtl">
<head>
<script src="guard.js"></script>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>MSGA — محضر اجتماع · بنمط التقرير</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Saira:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* MSGA — Salary Structure Policy · "MSGA REPORT" HOUSE STYLE
   Matches the April-2026 commercial-sector report exactly:
   navy full-bleed cover + top orange hairline · white content pages ·
   lavender rounded section bars with orange circle number + orange right accent ·
   grey table header with orange underline · colored status pills · rounded cards.
   Self-contained — does NOT depend on sample-base.css. */
:root {
  --navy:#1F3A57; --navy-2:#16304B; --navy-3:#102539; --navy-deep:#0D2034;
  --navy-card:#27425E; --navy-line:#33506C;
  --orange:#E5811F; --orange-2:#C96B12; --orange-soft:#FBEEDD;
  --ink:#1E2B38; --ink-2:#41505F; --ink-3:#76828F; --ink-4:#A7B0BA;
  --paper:#FFFFFF; --paper-2:#F7F8FB; --lav:#EEF0F7; --lav-2:#F4F5FA;
  --line:#E5E8EE; --line-2:#EEF0F4;
  --th:#F4F5F8;
  --ok:#2F8559; --ok-bg:#E6F4EC; --ok-bd:#CBE8D6;
  --prog:#2B5180; --prog-bg:#E9EFF7; --prog-bd:#D2DEEE;
  --hold:#B0831F; --hold-bg:#FAF2DA; --hold-bd:#ECDBA9;
  --red:#B0432C; --red-bg:#F8E9E4; --red-bd:#ECCDC2;
  --l1:#BBC6D2; --l2:#9DACBC; --l3:#7E91A6; --l4:#5F7790; --l5:#46617C; --l6:#2F4D69; --l7:#E5811F;
  --ar:"Tajawal", system-ui, sans-serif;
  --ar-head:"Tajawal", system-ui, sans-serif;
  --latin:"Saira", "Tajawal", system-ui, sans-serif;
  --page-w:210mm; --page-h:297mm; --mx:15mm; --my:14mm;
}
* { box-sizing:border-box; }
html, body { margin:0; padding:0; background:#DDE2E8; font-family:var(--ar); color:var(--ink); -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
body { direction:rtl; }
.stage { min-height:100vh; padding:30px 16px 90px; display:flex; flex-direction:column; align-items:center; gap:28px; }
.page { width:var(--page-w); height:var(--page-h); background:var(--paper); position:relative; overflow:hidden; box-shadow:0 1px 2px rgba(20,30,45,.05), 0 16px 44px rgba(20,30,45,.14); page-break-after:always; break-after:page; display:flex; flex-direction:column; }
.page:last-of-type { page-break-after:auto; }
.watermark { position:absolute; inset:0; pointer-events:none; z-index:0; }
.page-inner { position:relative; z-index:1; flex:1; display:flex; flex-direction:column; padding:var(--my) var(--mx) 0; }

/* numbers latin font */
.latin, .doc-meta, .foot, .lcode, .scale-num, .vchip, .kpi .val, .ti-num, .cnum, .nb, .sec-no, .head .eyebrow, .cap .ref, .prose .lead, .cover-top .brandline, .hero .kicker, .classline, .kpi .label, .toc-head, .cover-meta .k, .dept2-head .code, .dept2-head .cnt { font-family:var(--latin); }

/* ─── Content header ─── */
.head { display:grid; grid-template-columns:auto 1fr auto; align-items:center; gap:16px; padding-bottom:11px; margin-bottom:6px; border-bottom:2px solid var(--orange); }
.head .logo { height:34px; width:auto; display:block; }
.head .titles { display:flex; flex-direction:column; gap:1px; }
.head .eyebrow { font-size:8.5px; font-weight:600; letter-spacing:0.18em; color:var(--orange-2); text-transform:uppercase; direction:ltr; }
.head .doctitle { font-family:var(--ar-head); font-size:13.5px; font-weight:700; color:var(--navy); }
.head .doc-meta { text-align:left; direction:ltr; font-size:9px; font-weight:500; color:var(--ink-3); line-height:1.65; letter-spacing:0.03em; }
.head .doc-meta div { white-space:nowrap; }
.head .doc-meta b { color:var(--navy); font-weight:700; letter-spacing:0.08em; }

/* ─── Footer ─── */
.foot { position:absolute; bottom:8mm; inset-inline:var(--mx); display:flex; align-items:center; justify-content:space-between; font-size:8.5px; font-weight:500; color:var(--ink-3); letter-spacing:0.08em; text-transform:uppercase; border-top:1px solid var(--line); padding-top:7px; z-index:2; direction:ltr; }
.foot .brand-mark { display:flex; align-items:center; gap:7px; }
.foot .brand-mark::before { content:""; width:5px; height:5px; background:var(--orange); border-radius:50%; }
.foot .pagenum b { color:var(--navy); font-weight:700; }

/* ─── Section bar (signature element) ─── */
.sec-head { position:relative; display:flex; align-items:center; gap:11px; flex-direction:row-reverse; justify-content:flex-start; background:var(--lav); border-radius:9px; padding:9px 16px 9px 14px; margin:16px 0 11px; overflow:hidden; }
.sec-head.first { margin-top:4px; }
.sec-head::after { content:""; position:absolute; top:0; bottom:0; right:0; width:5px; background:var(--orange); }
.sec-head .sec-no { width:24px; height:24px; border-radius:50%; background:var(--orange); color:#fff; display:grid; place-items:center; font-size:11px; font-weight:700; flex-shrink:0; }
.sec-head h2 { margin:0; font-family:var(--ar-head); font-size:16px; font-weight:700; color:var(--navy); flex:1; }
.sec-head .en { font-size:9px; font-weight:600; color:var(--ink-3); letter-spacing:0.16em; text-transform:uppercase; white-space:nowrap; direction:ltr; }

/* caption */
.cap { display:flex; align-items:center; gap:11px; margin:2px 2px 8px; }
.cap .lbl { font-size:10px; font-weight:500; color:var(--ink-3); white-space:nowrap; }
.cap .dots { flex:1; height:1px; background:var(--line); }
.cap .ref { font-size:9px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:var(--orange-2); white-space:nowrap; direction:ltr; }

/* prose */
.prose { padding:2px 14px 2px 0; margin-top:4px; border-inline-start:3px solid var(--orange); }
.prose.alt { border-inline-start-color:var(--navy); }
.prose .lead { font-size:9px; font-weight:700; letter-spacing:0.16em; text-transform:uppercase; color:var(--orange-2); margin-bottom:5px; direction:ltr; text-align:start; }
.prose.alt .lead { color:var(--navy); }
.prose p { margin:0; font-size:11.5px; color:var(--ink-2); line-height:1.85; text-wrap:pretty; }
.prose p + p { margin-top:7px; }

/* numbered list */
.nlist { display:grid; grid-template-columns:1fr; margin-top:6px; }
.nlist.two { grid-template-columns:1fr 1fr; column-gap:22px; }
.nitem { display:grid; grid-template-columns:24px 1fr; align-items:start; gap:10px; padding:7px 0; border-bottom:1px solid var(--line-2); }
.nitem .nb { font-size:11px; font-weight:700; color:#fff; background:var(--navy); width:20px; height:20px; border-radius:6px; display:grid; place-items:center; line-height:1; }
.nitem.alt .nb { background:var(--orange); }
.nitem .nt { font-size:11px; line-height:1.6; color:var(--ink-2); padding-top:2px; text-wrap:pretty; }

/* chips */
.chips { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:4px; }
.chip-tag { display:flex; align-items:center; gap:9px; border:1px solid var(--line); background:var(--paper-2); border-radius:8px; padding:9px 12px; font-size:10.5px; color:var(--ink-2); min-height:36px; }
.chip-tag .cnum { font-size:10px; font-weight:700; color:#fff; background:var(--navy); width:18px; height:18px; border-radius:5px; display:grid; place-items:center; flex-shrink:0; }

/* note */
.note { margin-top:10px; padding:11px 14px; background:var(--orange-soft); border-radius:8px; border-inline-start:3px solid var(--orange); font-size:10.5px; color:#7A5417; line-height:1.7; display:flex; gap:10px; align-items:flex-start; text-wrap:pretty; }
.note .x { font-weight:700; font-size:13px; color:var(--orange-2); line-height:1.3; }
.note.alt { background:var(--lav); border-inline-start-color:var(--navy); color:var(--ink-2); }
.note.alt .x { color:var(--navy); }

/* ─── tables ─── */
.ptable { margin-top:6px; border:1px solid var(--line); border-radius:9px; overflow:hidden; }
.pt-head { display:grid; background:var(--th); border-bottom:2px solid var(--orange); font-family:var(--ar-head); font-size:10px; font-weight:700; color:var(--navy); }
.pt-head > div { padding:8px 12px; }
.pt-head > div.center { text-align:center; }
.pt-row { display:grid; border-bottom:1px solid var(--line-2); font-size:11px; min-height:34px; align-items:stretch; background:var(--paper); }
.pt-row:last-child { border-bottom:none; }
.pt-row:nth-child(even) { background:var(--lav-2); }
.pt-row > div { padding:8px 12px; display:flex; align-items:center; }
.pt-row .center { justify-content:center; }
.pt-row .strong { font-weight:700; color:var(--navy); }
.pt-row .muted { color:var(--ink-3); font-size:10px; }
.lcode { font-size:10px; color:var(--ink-3); direction:ltr; }
.cols-level { grid-template-columns:120px 150px 1fr; }
.cols-scale { grid-template-columns:128px 60px 1fr 1fr 1fr; }
.cols-grade { grid-template-columns:170px 1fr; }
.cols-rate  { grid-template-columns:1fr 190px; }
.cols-auth  { grid-template-columns:220px 1fr; }

/* level badge */
.lvl-badge { display:inline-flex; align-items:center; gap:8px; font-size:11px; font-weight:500; color:var(--ink); }
.lvl-badge .ln { font-size:9.5px; font-weight:700; color:#fff; width:19px; height:19px; border-radius:50%; display:grid; place-items:center; flex-shrink:0; }
.lvl-mini { font-size:9px; font-weight:700; color:#fff; width:17px; height:17px; border-radius:50%; display:grid; place-items:center; flex-shrink:0; }
.lvl-1{background:var(--l1)} .lvl-2{background:var(--l2)} .lvl-3{background:var(--l3)} .lvl-4{background:var(--l4)} .lvl-5{background:var(--l5)} .lvl-6{background:var(--l6)} .lvl-7{background:var(--l7)}

/* salary numbers */
.scale-num { font-size:12px; direction:ltr; font-weight:500; color:var(--ink-2); }
.scale-num.mid { color:var(--orange-2); font-weight:700; }
.scale-num.hi { color:var(--navy); font-weight:700; }

/* status-style pill (for grades / values) */
.pill { display:inline-flex; align-items:center; gap:7px; font-family:var(--ar-head); font-size:11px; font-weight:700; padding:4px 11px; border-radius:999px; border:1px solid transparent; white-space:nowrap; }
.pill::before { content:""; width:6px; height:6px; border-radius:50%; background:currentColor; }
.pill.ok   { color:var(--ok);   background:var(--ok-bg);   border-color:var(--ok-bd); }
.pill.prog { color:var(--prog); background:var(--prog-bg); border-color:var(--prog-bd); }
.pill.hold { color:var(--hold); background:var(--hold-bg); border-color:var(--hold-bd); }
.pill.red  { color:var(--red);  background:var(--red-bg);  border-color:var(--red-bd); }
.pill.plain{ color:var(--ink-3); background:var(--paper-2); border-color:var(--line); }

.vchip { font-size:13px; font-weight:700; direction:ltr; white-space:nowrap; }
.vchip.pos{color:var(--ok)} .vchip.warn{color:var(--hold)} .vchip.none{color:var(--ink-4)} .vchip.nav{color:var(--navy)}
.vchip.ar{direction:rtl; font-family:var(--ar-head); font-size:11.5px}

/* rating -> use pill look */
.rating { display:inline-flex; align-items:center; gap:7px; font-family:var(--ar-head); font-size:11px; font-weight:700; padding:4px 12px; border-radius:999px; border:1px solid; }
.rating::before { content:""; width:6px; height:6px; border-radius:50%; background:currentColor; }
.rating.r-excep { color:var(--ok);   background:var(--ok-bg);   border-color:var(--ok-bd); }
.rating.r-exc   { color:var(--prog); background:var(--prog-bg); border-color:var(--prog-bd); }
.rating.r-vg    { color:var(--hold); background:var(--hold-bg); border-color:var(--hold-bd); }
.rating.r-good  { color:var(--orange-2); background:var(--orange-soft); border-color:#EFD9B6; }
.rating.r-below { color:var(--red);  background:var(--red-bg);  border-color:var(--red-bd); }
.grade-desc { font-size:10.5px; color:var(--ink-3); line-height:1.6; text-wrap:pretty; }

/* band chart */
.bandchart { margin-top:8px; padding:11px 14px; border:1px solid var(--line); border-radius:9px; background:var(--paper-2); }
.bc-head { display:flex; justify-content:space-between; align-items:baseline; font-size:9px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-3); margin-bottom:11px; }
.bc-head .axis { direction:ltr; color:var(--orange-2); font-family:var(--latin); }
.bc-row { display:grid; grid-template-columns:92px 1fr; align-items:center; gap:13px; margin-bottom:7px; }
.bc-row:last-child { margin-bottom:0; }
.bc-row .bc-label { font-size:10px; font-weight:500; color:var(--ink-2); text-align:start; }
.bc-track { position:relative; height:14px; direction:ltr; }
.bc-track .grid-line { position:absolute; top:-4px; bottom:-4px; width:1px; background:var(--line); }
.bc-bar { position:absolute; top:4px; height:7px; border-radius:4px; display:flex; align-items:center; }
.bc-bar.lvl-1{background:var(--l1);color:var(--l1)} .bc-bar.lvl-2{background:var(--l2);color:var(--l2)} .bc-bar.lvl-3{background:var(--l3);color:var(--l3)} .bc-bar.lvl-4{background:var(--l4);color:var(--l4)} .bc-bar.lvl-5{background:var(--l5);color:var(--l5)} .bc-bar.lvl-6{background:var(--l6);color:var(--l6)} .bc-bar.lvl-7{background:var(--l7);color:var(--l7)}
.bc-bar .mid-dot { position:absolute; width:9px; height:9px; border-radius:50%; background:var(--paper); box-shadow:0 0 0 2px currentColor; transform:translateX(-50%); }
.bc-axis-labels { display:flex; justify-content:space-between; direction:ltr; font-family:var(--latin); font-size:9px; font-weight:600; color:var(--ink-4); margin:6px 0 0; padding-inline-start:105px; }

/* department cards */
.depttitles { display:grid; grid-template-columns:1fr 1fr; gap:13px; margin-top:6px; }
.dept2 { border:1px solid var(--line); border-radius:9px; background:var(--paper); display:flex; flex-direction:column; break-inside:avoid; overflow:hidden; }
.dept2-head { display:grid; grid-template-columns:1fr auto; align-items:center; gap:8px; padding:8px 13px; background:var(--th); border-bottom:2px solid var(--orange); }
.dept2-head .dn { font-family:var(--ar-head); font-size:12px; font-weight:700; color:var(--navy); }
.dept2-head .meta { display:flex; align-items:center; gap:8px; }
.dept2-head .code { font-size:9px; font-weight:700; letter-spacing:0.08em; color:var(--orange-2); direction:ltr; }
.dept2-head .cnt { font-size:9px; color:var(--ink-3); direction:ltr; }
.dt-row { display:grid; grid-template-columns:20px 88px 1fr; align-items:center; gap:9px; padding:6px 13px; border-bottom:1px solid var(--line-2); font-size:10.5px; min-height:30px; }
.dt-row:last-child { border-bottom:none; }
.dt-row .dt-lvl { font-size:9px; color:var(--ink-3); }
.dt-row .dt-title { font-weight:500; color:var(--ink); }

/* steps */
.steps { display:grid; margin-top:6px; border:1px solid var(--line); border-radius:9px; overflow:hidden; }
.step { display:grid; grid-template-columns:42px 1fr; border-bottom:1px solid var(--line-2); align-items:stretch; }
.step:last-child { border-bottom:none; }
.step:nth-child(even) { background:var(--lav-2); }
.step .snum { background:var(--navy); color:#fff; display:grid; place-items:center; font-size:13px; font-weight:700; }
.step .stext { padding:10px 13px; font-size:11px; line-height:1.6; color:var(--ink-2); display:flex; align-items:center; text-wrap:pretty; }

/* annual cycle */
.cycle { margin-top:6px; padding:16px 10px 6px; }
.cycle-track { display:grid; grid-template-columns:repeat(4,1fr); position:relative; direction:rtl; }
.cycle-track::before { content:""; position:absolute; top:16px; inset-inline:12%; height:2px; background:var(--line); z-index:0; }
.cycle-node { display:flex; flex-direction:column; align-items:center; gap:8px; position:relative; z-index:1; text-align:center; padding:0 8px; }
.cycle-node .dot { width:32px; height:32px; border-radius:50%; background:var(--paper); color:var(--navy); display:grid; place-items:center; font-family:var(--latin); font-size:13px; font-weight:700; border:2px solid var(--navy); }
.cycle-node.accent .dot { background:var(--orange); color:#fff; border-color:var(--orange); }
.cycle-node .period { font-family:var(--ar-head); font-size:11.5px; font-weight:700; color:var(--orange-2); }
.cycle-node .clabel { font-size:11px; font-weight:700; color:var(--navy); line-height:1.35; }
.cycle-node .cdesc { font-size:9.5px; color:var(--ink-3); line-height:1.5; max-width:140px; }

/* sign-off */
.signoff-triple { margin-top:12px; display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
.signoff-triple .sign { padding:13px; border:1px solid var(--line); border-radius:9px; background:var(--paper-2); display:flex; flex-direction:column; gap:5px; min-height:92px; }
.signoff-triple .sign .label { font-size:9px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; color:var(--orange-2); direction:ltr; text-align:start; }
.signoff-triple .sign .nm { font-size:11.5px; font-weight:700; color:var(--ink); min-height:16px; }
.signoff-triple .sign .role { font-size:10px; color:var(--ink-3); }
.signoff-triple .sign .sig-line { margin-top:auto; border-bottom:1px dashed var(--ink-4); height:24px; }
.signoff-triple .sign .sig-cap { font-size:8.5px; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-4); direction:ltr; text-align:start; }

/* doc control */
.docctrl { margin-top:14px; background:var(--navy); border-radius:9px; padding:14px 18px; display:grid; grid-template-columns:1fr auto; align-items:center; gap:16px; color:#fff; }
.docctrl .eyebrow { font-size:9px; letter-spacing:0.16em; color:#F0B978; text-transform:uppercase; margin-bottom:4px; direction:ltr; text-align:start; }
.docctrl .val { font-family:var(--ar-head); font-size:13px; font-weight:700; color:#fff; }
.docctrl .right { font-size:9.5px; color:#AEBCCC; letter-spacing:0.1em; text-transform:uppercase; text-align:left; direction:ltr; }

/* ═══════ COVER (navy full-bleed) ═══════ */
.page.cover { background:var(--navy); }
.page.cover::before { content:""; position:absolute; top:0; inset-inline:0; height:5px; background:var(--orange); z-index:3; }
.page.cover .watermark::after { content:""; position:absolute; inset:0; background:url("assets/msga-logo.png") no-repeat center 60%; background-size:62% auto; opacity:.04; filter:brightness(0) invert(1); }
.cover-inner { padding:0 !important; }
.cover-top { display:grid; grid-template-columns:auto 1fr auto; align-items:center; gap:16px; padding:13mm var(--mx) 0; }
.cover-top .co { font-family:var(--ar-head); font-size:12px; font-weight:700; color:#fff; }
.cover-top .brandline { font-size:9.5px; font-weight:600; letter-spacing:0.18em; text-transform:uppercase; color:var(--orange); text-align:left; direction:ltr; }
.cover-hero { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0 var(--mx); text-align:center; }
.cover-hero .logo-w { height:64px; width:auto; filter:brightness(0) invert(1); margin-bottom:30px; }
.cover-hero h1 { margin:0; font-family:var(--ar-head); font-size:50px; font-weight:800; line-height:1.12; color:#fff; letter-spacing:-0.01em; }
.cover-hero .subtitle { margin-top:14px; font-size:13px; font-weight:500; color:var(--orange); letter-spacing:0.02em; }
.cover-hero .period-pill { margin-top:20px; border:1.5px solid rgba(255,255,255,.4); border-radius:999px; padding:8px 24px; font-size:12px; font-weight:600; color:#fff; direction:ltr; white-space:nowrap; letter-spacing:0.04em; }
.cover-desc { margin:20px auto 0; max-width:74%; font-size:12px; color:#C5D0DC; line-height:1.85; text-wrap:pretty; }
.cover-cards { display:grid; grid-template-columns:repeat(3,1fr); gap:13px; margin:0 var(--mx) 8mm; }
.cover-cards.four { grid-template-columns:repeat(4,1fr); }
.ccard { background:var(--navy-card); border:1px solid var(--navy-line); border-radius:10px; padding:13px 15px; text-align:center; display:flex; flex-direction:column; gap:5px; }
.ccard .k { font-size:9px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:var(--orange); direction:ltr; }
.ccard .v { font-family:var(--ar-head); font-size:14px; font-weight:700; color:#fff; }
.ccard .v.num { font-family:var(--latin); font-size:26px; line-height:1; direction:ltr; }
.ccard .s { font-size:9px; color:#9FB0C0; }

/* cover TOC strip */
.cover-toc { margin:0 var(--mx) 7mm; padding-top:14px; border-top:1px solid var(--navy-line); }
.cover-toc .th { font-size:9px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:#8FA2B4; margin-bottom:9px; direction:ltr; }
.cover-toc .tg { display:grid; grid-template-columns:repeat(4,1fr); gap:5px 18px; }
.cover-toc .ti { display:grid; grid-template-columns:20px 1fr; gap:8px; align-items:baseline; font-size:9.5px; color:#C5D0DC; padding:3px 0; }
.cover-toc .ti .n { font-family:var(--latin); font-size:9.5px; font-weight:700; color:var(--orange); }

/* toolbar */
.toolbar { position:fixed; top:16px; inset-inline-start:16px; z-index:100; background:var(--navy); color:#fff; display:flex; align-items:center; gap:4px; padding:7px 8px; border-radius:8px; box-shadow:0 10px 30px rgba(20,30,45,.25); font-size:11px; direction:ltr; }
.toolbar .brand { font-family:var(--ar-head); padding:4px 12px 4px 6px; display:flex; align-items:center; gap:9px; border-inline-end:1px solid rgba(255,255,255,.18); font-weight:700; letter-spacing:0.06em; text-transform:uppercase; }
.toolbar .brand::before { content:""; width:7px; height:7px; background:var(--orange); border-radius:50%; }
.toolbar button { background:transparent; color:#fff; border:none; font:inherit; padding:6px 12px; cursor:pointer; letter-spacing:0.04em; text-transform:uppercase; font-weight:600; border-radius:5px; }
.toolbar button:hover { background:rgba(255,255,255,.12); }

/* page 3 packs 14 table rows + band chart — tighten to clear footer */
.stage .page:nth-of-type(3) .pt-row { min-height:31px; }
.stage .page:nth-of-type(3) .pt-row > div { padding-top:6px; padding-bottom:6px; }
.stage .page:nth-of-type(3) .bandchart { margin-top:6px; padding:10px 14px; }
.stage .page:nth-of-type(3) .bc-row { margin-bottom:5px; }

/* ═══════════════════════════════════════════════════════════
   MEETING-MINUTES COMPONENTS (report house style)
   ═══════════════════════════════════════════════════════════ */

/* ── Fillable inputs ── */
.fill { border:none; outline:none; background:transparent; width:100%; font:inherit; color:inherit; padding:2px 0; border-bottom:1px dashed transparent; transition:border .15s, background .15s; }
.fill:hover { border-bottom-color:var(--line); }
.fill:focus { border-bottom-color:var(--orange); background:linear-gradient(to top, rgba(229,129,31,.07), transparent); }
.fill::placeholder { color:var(--ink-4); font-weight:400; }
.fill-latin { font-family:var(--latin); direction:ltr; text-align:start; }
.fill-num { font-family:var(--latin); direction:ltr; text-align:start; font-weight:500; }
.fill-multi { resize:none; overflow:hidden; display:block; font-family:inherit; line-height:1.6; min-height:18px; border-bottom:1px dashed transparent; }
.fill-multi:hover { border-bottom-color:var(--line); }
.fill-multi:focus { border-bottom-color:var(--orange); background:linear-gradient(to top, rgba(229,129,31,.07), transparent); }

/* ── Cover hero subtitle as fill ── */
.cover-hero .fill { text-align:center; color:#C5D0DC; }
.cover-hero .fill::placeholder { color:rgba(197,208,220,.5); }
.cover-hero .fill:focus { background:rgba(255,255,255,.06); border-bottom-color:var(--orange); }

/* ── KPI strip (page-level, white) ── */
.kpis { display:grid; grid-template-columns:repeat(4,1fr); gap:11px; margin-top:4px; }
.kpi { border:1px solid var(--line); border-radius:9px; background:var(--paper-2); padding:12px 14px; display:flex; flex-direction:column; gap:5px; position:relative; overflow:hidden; }
.kpi::after { content:""; position:absolute; top:0; bottom:0; right:0; width:4px; background:var(--orange); }
.kpi .label { font-family:var(--latin); font-size:8.5px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--ink-3); direction:ltr; }
.kpi .val { font-family:var(--latin); font-size:24px; font-weight:700; color:var(--navy); line-height:1; direction:ltr; }
.kpi .sub { font-size:9.5px; color:var(--ink-3); }

/* ── Meeting metadata grid ── */
.info-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:0; border:1px solid var(--line); border-radius:9px; overflow:hidden; margin-top:6px; }
.info-row { display:grid; grid-template-columns:130px 1fr; border-bottom:1px solid var(--line-2); border-inline-end:1px solid var(--line-2); min-height:40px; }
.info-row:nth-child(2n) { border-inline-end:none; }
.info-row:nth-last-child(-n+2) { border-bottom:none; }
.info-row .k { background:var(--th); padding:9px 12px; display:flex; align-items:center; gap:8px; font-size:10.5px; color:var(--navy); font-weight:600; border-inline-end:1px solid var(--line-2); }
.info-row .k svg { width:13px; height:13px; color:var(--orange-2); stroke-width:1.7; }
.info-row .v { padding:8px 12px; display:flex; align-items:center; font-size:11.5px; color:var(--ink); }

/* ── Generic data tables (attendees / agenda) ── */
.dtable { margin-top:6px; border:1px solid var(--line); border-radius:9px; overflow:hidden; }
.dt-head { display:grid; background:var(--th); border-bottom:2px solid var(--orange); font-family:var(--ar-head); font-size:9.5px; font-weight:700; color:var(--navy); }
.dt-head > div { padding:8px 11px; }
.dt-head > div.center { text-align:center; }
.drow { display:grid; border-bottom:1px solid var(--line-2); font-size:11px; min-height:36px; background:var(--paper); align-items:stretch; }
.drow:last-child { border-bottom:none; }
.drow:nth-child(even) { background:var(--lav-2); }
.drow > div { padding:6px 11px; display:flex; align-items:center; }
.drow .idx, .drow .num { font-family:var(--latin); font-size:10px; color:var(--ink-4); justify-content:center; }
.drow .sig-cell { border-bottom:none; }

.cols-att { grid-template-columns:34px 1fr 150px 96px 70px; }
.cols-agenda { grid-template-columns:34px 64px 1fr 110px 96px 26px; }
.drow .time { font-family:var(--latin); font-size:11px; color:var(--navy); direction:ltr; font-weight:500; }
.drow .topic { flex-direction:column; align-items:stretch; gap:1px; padding-top:7px; padding-bottom:7px; }
.drow .topic .desc { font-size:9.5px; color:var(--ink-3); }
.drow .own { font-size:10.5px; color:var(--ink-2); }
.drow .del { justify-content:center; color:var(--ink-4); cursor:pointer; opacity:0; font-family:var(--latin); transition:opacity .15s, color .15s; }
.drow:hover .del { opacity:1; }
.drow .del:hover { color:var(--orange); }
.sig-dash { flex:1; border-bottom:1px dashed var(--ink-4); margin:0 4px 4px; min-height:16px; align-self:flex-end; }

/* status / type pills (editable, cycle on click) */
.mpill { display:inline-flex; align-items:center; gap:6px; font-family:var(--ar-head); font-size:9.5px; font-weight:700; padding:3px 10px; border-radius:999px; border:1px solid transparent; white-space:nowrap; cursor:pointer; user-select:none; }
.mpill::before { content:""; width:5px; height:5px; border-radius:50%; background:currentColor; }
.mpill.present { color:var(--prog); background:var(--prog-bg); border-color:var(--prog-bd); }
.mpill.remote  { color:var(--hold); background:var(--hold-bg); border-color:var(--hold-bd); }
.mpill.absent  { color:var(--red); background:var(--red-bg); border-color:var(--red-bd); }
.mpill.done    { color:var(--ok); background:var(--ok-bg); border-color:var(--ok-bd); }
.mpill.progress{ color:var(--prog); background:var(--prog-bg); border-color:var(--prog-bd); }
.mpill.review  { color:var(--hold); background:var(--hold-bg); border-color:var(--hold-bd); }
.mpill.deferred{ color:var(--ink-3); background:var(--paper-2); border-color:var(--line); }
.mpill.t-proc  { color:var(--prog); background:var(--prog-bg); border-color:var(--prog-bd); }
.mpill.t-show  { color:var(--orange-2); background:var(--orange-soft); border-color:#EFD9B6; }
.mpill.t-disc  { color:var(--hold); background:var(--hold-bg); border-color:var(--hold-bd); }
.mpill.t-dec   { color:var(--ok); background:var(--ok-bg); border-color:var(--ok-bd); }
.mpill.compact { font-size:9px; padding:3px 9px; }

/* ── Timeline visual ── */
.timeline { margin-top:10px; border:1px solid var(--line); border-radius:9px; padding:11px 14px 13px; background:var(--paper-2); }
.timeline .tl-head { display:flex; justify-content:space-between; font-family:var(--latin); font-size:9px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-3); margin-bottom:9px; direction:ltr; }
.timeline .tl-bar { height:22px; background:#fff; border:1px solid var(--line); border-radius:6px; position:relative; display:flex; direction:ltr; overflow:hidden; }
.tl-seg { position:relative; border-inline-end:1.5px solid #fff; display:flex; align-items:center; justify-content:center; font-family:var(--latin); font-size:9px; color:#fff; font-weight:700; }
.tl-seg:last-child { border-inline-end:none; }
.tl-labels { display:flex; direction:ltr; font-family:var(--latin); font-size:8.5px; color:var(--ink-3); margin-top:7px; }
.tl-label { flex:1; text-align:center; }

/* ── Discussions / points ── */
.points { display:flex; flex-direction:column; gap:9px; margin-top:6px; }
.point { display:grid; grid-template-columns:38px 1fr; border:1px solid var(--line); border-radius:9px; overflow:hidden; background:#fff; position:relative; }
.point::after { content:""; position:absolute; top:0; bottom:0; right:0; width:4px; background:var(--navy); }
.point.accent-dec::after { background:var(--ok); }
.point.accent-info::after { background:var(--orange); }
.point .p-num { background:var(--th); font-family:var(--latin); font-size:14px; font-weight:700; color:var(--navy); display:flex; align-items:center; justify-content:center; border-inline-end:1px solid var(--line); }
.point .p-body { padding:10px 14px 12px; }
.point .p-top { display:flex; align-items:center; gap:9px; margin-bottom:5px; }
.point .p-title { font-family:var(--ar-head); font-size:12px; font-weight:700; color:var(--navy); flex:1; }
.point .p-tag { font-family:var(--ar-head); font-size:9px; font-weight:700; padding:2px 9px; border-radius:999px; cursor:pointer; user-select:none; white-space:nowrap; }
.point .p-tag.dec { background:var(--ok-bg); color:var(--ok); border:1px solid var(--ok-bd); }
.point .p-tag.info { background:var(--orange-soft); color:var(--orange-2); border:1px solid #EFD9B6; }
.point .p-tag.disc { background:var(--prog-bg); color:var(--prog); border:1px solid var(--prog-bd); }
.point .p-text { font-size:11px; color:var(--ink-2); line-height:1.8; width:100%; border:none; outline:none; background:transparent; resize:none; font-family:var(--ar); }
.point .p-meta { margin-top:7px; display:flex; gap:16px; font-family:var(--latin); font-size:9px; color:var(--ink-3); letter-spacing:0.04em; align-items:center; }
.point .p-meta b { color:var(--navy); font-weight:700; }
.point .p-del { cursor:pointer; color:var(--ink-4); font-family:var(--latin); }
.point .p-del:hover { color:var(--orange); }

/* ── Department task cards ── */
.depts { display:flex; flex-direction:column; gap:11px; margin-top:6px; }
.dcard { border:1px solid var(--line); border-radius:9px; background:#fff; overflow:hidden; break-inside:avoid; }
.dcard-head { display:grid; grid-template-columns:auto 1fr auto; align-items:center; gap:10px; padding:8px 13px; background:var(--th); border-bottom:2px solid var(--orange); }
.dcard-head .code { font-family:var(--latin); font-size:8.5px; font-weight:700; letter-spacing:0.08em; background:var(--orange); color:#fff; padding:3px 8px; border-radius:5px; direction:ltr; }
.dcard-head .dname { display:flex; align-items:baseline; gap:9px; line-height:1.2; }
.dcard-head .dname .n { font-family:var(--ar-head); font-size:12px; font-weight:700; color:var(--navy); }
.dcard-head .dname .director { font-size:9.5px; font-weight:500; color:var(--ink-3); }
.dcard-head .dname .director::before { content:"•"; margin-inline-end:6px; color:var(--ink-4); }
.dcard-head .progress { font-family:var(--latin); font-size:11px; font-weight:700; color:var(--orange-2); direction:ltr; }
.dtasks { display:flex; flex-direction:column; }
.dtask { display:grid; grid-template-columns:28px 1fr 130px 18px; gap:10px; align-items:start; padding:8px 13px; border-bottom:1px solid var(--line-2); font-size:11px; min-height:34px; }
.dtask:nth-child(even) { background:var(--lav-2); }
.dtask:last-of-type { border-bottom:none; }
.dtask .tnum { font-family:var(--latin); font-size:10px; color:var(--ink-4); padding-top:4px; text-align:center; }
.dtask .tbody { min-width:0; padding-top:1px; }
.dtask .tbody .fill { font-size:11px; line-height:1.65; padding:1px 0; }
.dtask .tmeta { display:flex; align-items:center; justify-content:flex-end; gap:4px; padding-top:2px; }
.dtask .tdel { cursor:pointer; color:var(--ink-4); font-family:var(--latin); font-size:13px; width:18px; text-align:center; padding-top:3px; opacity:0; transition:opacity .15s, color .15s; }
.dtask:hover .tdel { opacity:1; }
.dtask .tdel:hover { color:var(--orange); }
.dtask.st-done .tbody .fill { color:var(--ink-3); text-decoration:line-through; }
.dcard-add { display:flex; align-items:center; justify-content:center; gap:5px; background:var(--paper-2); border:none; border-top:1px dashed var(--line); color:var(--ink-3); font-family:var(--ar); font-size:10px; padding:6px 8px; cursor:pointer; width:100%; }
.dcard-add:hover { color:var(--orange-2); background:var(--orange-soft); }

/* ── Status legend ── */
.status-legend { display:flex; align-items:center; gap:16px; margin:4px 0 10px; padding:9px 14px; background:var(--lav); border-radius:9px; font-family:var(--latin); font-size:9.5px; letter-spacing:0.04em; text-transform:uppercase; color:var(--ink-3); }
.status-legend .leg { display:flex; align-items:center; gap:7px; }
.status-legend .leg .dot { width:8px; height:8px; border-radius:50%; }
.status-legend .leg b { color:var(--navy); font-weight:700; font-size:11px; margin:0 2px; }
.status-legend .leg.done .dot { background:var(--ok); }
.status-legend .leg.progress .dot { background:var(--prog); }
.status-legend .leg.review .dot { background:var(--hold); }
.status-legend .leg.deferred .dot { background:var(--ink-4); }
.status-legend .total { margin-inline-end:auto; color:var(--navy); font-weight:700; }
.status-legend .total b { font-size:13px; }

/* ── Next-meeting bar ── */
.next-bar { margin-top:12px; background:var(--navy); border-radius:9px; padding:13px 18px; display:grid; grid-template-columns:1fr auto; align-items:center; gap:16px; color:#fff; }

.next-bar .val { font-family:var(--ar-head); font-size:14px; font-weight:700; color:#fff; }
.next-bar .right { font-family:var(--latin); font-size:9.5px; color:#AEBCCC; letter-spacing:0.1em; text-transform:uppercase; text-align:left; direction:ltr; }

/* ── Notes block ── */
.notes-block { margin-top:11px; border:1px solid var(--line); border-radius:9px; padding:12px 14px; background:var(--paper-2); }
.notes-block .nb-head { display:flex; align-items:center; gap:8px; margin-bottom:7px; }
.notes-block .nb-head .dot { width:6px; height:6px; border-radius:50%; background:var(--orange); }
.notes-block .nb-head .lbl { font-family:var(--latin); font-size:9px; letter-spacing:0.14em; text-transform:uppercase; color:var(--ink-3); direction:ltr; }
.notes-block textarea { width:100%; border:none; outline:none; background:transparent; resize:none; font-family:var(--ar); font-size:11px; color:var(--ink); line-height:1.8; min-height:46px; }

/* ── Add-row button ── */
.add-row { display:flex; align-items:center; justify-content:center; gap:6px; background:transparent; border:1px dashed var(--line); border-radius:8px; color:var(--ink-3); font-family:var(--ar); font-size:10.5px; padding:7px 10px; cursor:pointer; width:100%; margin-top:7px; transition:all .15s; }
.add-row:hover { border-color:var(--orange); color:var(--orange-2); background:var(--orange-soft); }
.add-row::before { content:"+"; font-family:var(--latin); font-weight:700; }

/* ── meta strip ── */
.meta-strip { display:flex; justify-content:space-between; align-items:center; margin-top:6px; font-family:var(--latin); font-size:9px; letter-spacing:0.1em; color:var(--ink-3); text-transform:uppercase; direction:ltr; }
.meta-strip .dots { flex:1; border-bottom:1px dotted var(--line); margin:0 12px; }

/* ── compact signoff ── */
.signoff-mom { margin-top:10px; }
.signoff-mom .sign { padding:13px; border:1px solid var(--line); border-radius:9px; background:var(--paper-2); display:flex; flex-direction:column; gap:5px; min-height:92px; }
.signoff-mom .sign .label { font-family:var(--latin); font-size:9px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; color:var(--orange-2); direction:ltr; text-align:start; }
.signoff-mom .sign .name { font-family:var(--ar-head); font-size:13px; font-weight:700; color:var(--navy); }
.signoff-mom .sign .role { font-size:10px; color:var(--ink-3); }
.signoff-mom .sign .sig-line { margin-top:auto; border-bottom:1px dashed var(--ink-4); height:26px; }

@page { size:A4 portrait; margin:0; }
@media print {
  html,body{background:#fff} .stage{padding:0;gap:0} .page{box-shadow:none;margin:0}
  .toolbar{display:none!important}
  .add-row, .drow .del, .dtask .tdel, .point .p-del{display:none!important}
  .fill:focus, .fill-multi:focus{background:transparent;border-bottom-color:transparent}
}

</style>

<script type="text/babel">
/* MSGA Meeting Minutes — REPORT HOUSE STYLE renderer (editable)
   Navy/orange · Tajawal/Saira · lavender section bars · rounded cards.
   Same content model + editing behaviour as the original, new skin. */
const { useState, useEffect, useRef } = React;
const TOTAL = 5;

/* ── Icons (small, for info rows) ── */
const Icon = {
  cal:  <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="1"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>,
  clock:<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>,
  pin:  <svg viewBox="0 0 24 24"><path d="M12 21s7-6.5 7-12a7 7 0 1 0-14 0c0 5.5 7 12 7 12z"/><circle cx="12" cy="9" r="2.5"/></svg>,
  hash: <svg viewBox="0 0 24 24"><path d="M4 9h16M4 15h16M10 4l-2 16M16 4l-2 16"/></svg>,
  user: <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg>,
  type: <svg viewBox="0 0 24 24"><path d="M4 7V5h16v2M9 5v14M15 19h-12"/></svg>,
};

/* ── Persistence ── */
const STORAGE_KEY = "msga-mom-report-2026-06-08";
const loadState = () => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || null; } catch { return null; } };
const saveState = (s) => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {} };

function useStore() {
  const [state, setState] = useState(() => loadState() || window.MOM_DEFAULT);
  useEffect(() => { saveState(state); }, [state]);
  const update = (path, val) => {
    setState(s => {
      const copy = JSON.parse(JSON.stringify(s));
      const parts = path.split(".");
      let cur = copy;
      for (let i = 0; i < parts.length - 1; i++) { const k = parts[i]; cur = cur[k.match(/^\d+$/) ? Number(k) : k]; }
      const last = parts[parts.length - 1];
      cur[last.match(/^\d+$/) ? Number(last) : last] = val;
      return copy;
    });
  };
  const reset = () => { localStorage.removeItem(STORAGE_KEY); setState(window.MOM_DEFAULT); };
  const clear = () => {
    const b = JSON.parse(JSON.stringify(window.MOM_DEFAULT));
    b.meta = Object.fromEntries(Object.keys(b.meta).map(k => [k, ""]));
    b.attendees = b.attendees.map(a => ({ ...a, name:"", role:"", status:"present" }));
    b.agenda = Array(5).fill(0).map(() => ({ time:"", dur:"15", topic:"", desc:"", owner:"", type:"disc" }));
    b.points = Array(3).fill(0).map(() => ({ tag:"نقاش", title:"", text:"", meta:{vote:"",impact:""} }));
    b.departments = b.departments.map(d => ({ ...d, tasks: Array(3).fill(0).map(() => ({ task:"", status:"progress" })) }));
    b.notes = ""; b.nextMeeting = "";
    setState(b);
  };
  return { state, setState, update, reset, clear };
}

/* ── Fillable text ── */
function Fill({ value, onChange, placeholder, className = "", latin = false, num = false, multi = false, ...rest }) {
  const ref = useRef(null);
  useEffect(() => { if (multi && ref.current) { ref.current.style.height = "auto"; ref.current.style.height = ref.current.scrollHeight + "px"; } }, [value, multi]);
  if (multi) {
    return <textarea ref={ref} className={`fill fill-multi ${className}`} value={value || ""} onChange={e => onChange(e.target.value)} placeholder={placeholder} rows={1} {...rest}/>;
  }
  return <input className={`fill ${latin ? "fill-latin" : ""} ${num ? "fill-num" : ""} ${className}`} value={value || ""} onChange={e => onChange(e.target.value)} placeholder={placeholder} {...rest}/>;
}

/* ── Page chrome ── */
function Header({ st, page }) {
  const m = st.meta;
  return (
    <div className="head">
      <img className="logo" src="assets/msga-logo.png" alt="MSGA"/>
      <div className="titles">
        <div className="eyebrow">MSGA Investment · Meeting Minutes</div>
        <div className="doctitle">محضر اجتماع — {m.title || "—"}</div>
      </div>
      <div className="doc-meta">
        <div><b>DOC</b> {m.docId}</div>
        <div><b>DATE</b> {m.date}</div>
        <div><b>PAGE</b> {String(page).padStart(2,"0")} / {String(TOTAL).padStart(2,"0")}</div>
      </div>
    </div>
  );
}
function Footer({ st, page }) {
  return (
    <div className="foot">
      <div className="brand-mark">شركة مسقا للاستثمار · محضر داخلي</div>
      <div>{st.meta.docId}</div>
      <div className="pagenum"><b>{String(page).padStart(2,"0")}</b> / {String(TOTAL).padStart(2,"0")}</div>
    </div>
  );
}
function Page({ label, st, page, children }) {
  return (
    <div className="page" data-screen-label={label}>
      <div className="watermark"></div>
      <div className="page-inner">
        <Header st={st} page={page}/>
        {children}
        <Footer st={st} page={page}/>
      </div>
    </div>
  );
}
function Sec({ no, label, en, first }) {
  return (
    <div className={`sec-head ${first ? "first" : ""}`}>
      <div className="sec-no">{no}</div>
      <h2>{label}</h2>
      <div className="en">{en}</div>
    </div>
  );
}
function Cap({ lbl, tag }) {
  return <div className="cap"><span className="lbl">{lbl}</span><div className="dots"></div><span className="ref">{tag}</span></div>;
}

/* ── Editable pills ── */
function CyclePill({ value, map, order, cls, className = "mpill" }) {
  const cur = map[value] || map[order[0]];
  return (
    <span className={`${className} ${cur.css}`}
      onClick={() => cls(order[(order.indexOf(value) + 1) % order.length])}>
      {cur.label}
    </span>
  );
}
const ATT_MAP = { present:{label:"حاضر",css:"present"}, remote:{label:"عن بُعد",css:"remote"}, absent:{label:"غائب",css:"absent"} };
const AGENDA_MAP = { proc:{label:"إجرائي",css:"t-proc"}, show:{label:"عرض",css:"t-show"}, disc:{label:"نقاش",css:"t-disc"}, dec:{label:"قرار",css:"t-dec"} };
const STATUS_MAP = { progress:{label:"قيد الإنجاز",css:"progress"}, review:{label:"بانتظار الاعتماد",css:"review"}, done:{label:"تم الإنجاز",css:"done"}, deferred:{label:"مؤجلة",css:"deferred"} };

/* ════════ COVER ════════ */
const TOC = [
  ["01","بيانات الاجتماع"], ["02","الحضور والغياب"],
  ["03","المالية والقطاع التجاري"], ["04","الموارد البشرية، المشاريع، المشتريات"],
  ["05","الملاحظات والاعتماد"],
];
function Cover({ st, u }) {
  const m = st.meta;
  const present = st.attendees.filter(a => a.status !== "absent").length;
  const tasks = st.departments.reduce((s,d) => s + d.tasks.length, 0);
  return (
    <div className="page cover" data-screen-label="01 الغلاف">
      <div className="watermark"></div>
      <div className="page-inner cover-inner">
        <div className="cover-top">
          <span className="co">شركة مسقا للاستثمار</span>
          <div></div>
          <span className="brandline">Meeting Minutes · 2026</span>
        </div>

        <div className="cover-hero">
          <img className="logo-w" src="assets/msga-logo.png" alt="MSGA"/>
          <h1>محضر اجتماع</h1>
          <div className="subtitle">{m.type} — {m.date}</div>
          <div className="period-pill">{m.docId}</div>
          <Fill className="cover-desc" value={m.subtitle} onChange={v => u("meta.subtitle", v)} placeholder="وصف موجز للاجتماع" multi/>
        </div>

        <div className="cover-cards four">
          <div className="ccard"><div className="k">Date</div><div className="v">{m.date || "—"}</div><div className="s">{m.weekday}</div></div>
          <div className="ccard"><div className="k">Duration</div><div className="v num">{m.duration || "—"}</div><div className="s">{m.timeStart} – {m.timeEnd}</div></div>
          <div className="ccard"><div className="k">Attendees</div><div className="v num">{present}/{st.attendees.length}</div><div className="s">النصاب: {m.quorum}</div></div>
          <div className="ccard"><div className="k">Tasks</div><div className="v num">{String(tasks).padStart(2,"0")}</div><div className="s">مهام الأسبوع</div></div>
        </div>

        <div className="cover-toc">
          <div className="th">Contents — محتويات المحضر</div>
          <div className="tg">
            {TOC.map(([n,t]) => <div className="ti" key={n}><span className="n">{n}</span><span>{t}</span></div>)}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ════════ P2 · Meeting info + attendance ════════ */
function InfoRow({ icon, k, v, onChange, latin, num }) {
  return (
    <div className="info-row">
      <div className="k">{icon}<span>{k}</span></div>
      <div className="v"><Fill value={v} onChange={onChange} placeholder="—" latin={latin} num={num}/></div>
    </div>
  );
}
function PageInfo({ st, u }) {
  const m = st.meta;
  return (
    <Page label="02 بيانات الاجتماع والحضور" st={st} page={2}>
      <Sec no="01" label="بيانات الاجتماع" en="Meeting Metadata" first/>
      <div className="info-grid">
        <InfoRow icon={Icon.cal} k="التاريخ" v={m.date} onChange={v=>u("meta.date",v)} num/>
        <InfoRow icon={Icon.hash} k="رقم الاجتماع" v={m.meetingNo} onChange={v=>u("meta.meetingNo",v)} latin/>
        <InfoRow icon={Icon.clock} k="وقت البداية" v={m.timeStart} onChange={v=>u("meta.timeStart",v)} num/>
        <InfoRow icon={Icon.clock} k="وقت النهاية" v={m.timeEnd} onChange={v=>u("meta.timeEnd",v)} num/>
        <InfoRow icon={Icon.pin} k="المكان" v={m.location} onChange={v=>u("meta.location",v)}/>
        <InfoRow icon={Icon.type} k="نوع الانعقاد" v={m.locationType} onChange={v=>u("meta.locationType",v)}/>
        <InfoRow icon={Icon.user} k="رئيس الاجتماع" v={m.chair} onChange={v=>u("meta.chair",v)}/>
        <InfoRow icon={Icon.type} k="نوع الاجتماع" v={m.type} onChange={v=>u("meta.type",v)}/>
      </div>

      <Sec no="02" label="الحضور والغياب" en="Attendance Register"/>
      <div className="dtable">
        <div className="dt-head cols-att"><div>#</div><div>الاسم</div><div>المنصب</div><div className="center">الحضور</div><div className="center">توقيع</div></div>
        {st.attendees.map((a,i) => (
          <div className="drow cols-att" key={i}>
            <div className="idx">{String(i+1).padStart(2,"0")}</div>
            <div><Fill value={a.name} onChange={v=>u(`attendees.${i}.name`,v)} placeholder="الاسم"/></div>
            <div><Fill value={a.role} onChange={v=>u(`attendees.${i}.role`,v)} placeholder="المنصب"/></div>
            <div style={{justifyContent:"center"}}><CyclePill value={a.status} map={ATT_MAP} order={["present","remote","absent"]} cls={v=>u(`attendees.${i}.status`,v)}/></div>
            <div className="sig-cell"><div className="sig-dash"></div></div>
          </div>
        ))}
      </div>
      <div className="meta-strip"><span>// QUORUM · النصاب {m.quorum}</span><div className="dots"></div><span>CHAIR · {m.chair}</span></div>
    </Page>
  );
}

/* ════════ P3 · Agenda + timeline ════════ */
function PageAgenda({ st, u, setState }) {
  const m = st.meta;
  const totalMin = st.agenda.reduce((s,a) => s + (parseInt(a.dur,10) || 0), 0);
  const colors = ["#2F4D69","#46617C","#5F7790","#E5811F","#B0831F","#2B5180","#7E91A6","#2F8559"];
  return (
    <Page label="03 جدول الأعمال" st={st} page={3}>
      <Sec no="03" label="جدول الأعمال" en="Agenda / Schedule" first/>
      <Cap lbl={`عدد البنود ${String(st.agenda.length).padStart(2,"0")} · المدة المقدرة ${Math.floor(totalMin/60)}h ${totalMin%60}m`} tag={`Schedule · ${m.date}`}/>
      <div className="dtable">
        <div className="dt-head cols-agenda"><div>#</div><div>الوقت</div><div>البند / الموضوع</div><div>المسؤول</div><div className="center">النوع</div><div></div></div>
        {st.agenda.map((a,i) => (
          <div className="drow cols-agenda" key={i}>
            <div className="num">{String(i+1).padStart(2,"0")}</div>
            <div className="time"><Fill value={a.time} onChange={v=>u(`agenda.${i}.time`,v)} num placeholder="HH:MM"/></div>
            <div className="topic">
              <Fill value={a.topic} onChange={v=>u(`agenda.${i}.topic`,v)} placeholder="عنوان البند"/>
              <Fill className="desc" value={a.desc} onChange={v=>u(`agenda.${i}.desc`,v)} placeholder="وصف موجز"/>
            </div>
            <div className="own"><Fill value={a.owner} onChange={v=>u(`agenda.${i}.owner`,v)} placeholder="الاسم"/></div>
            <div style={{justifyContent:"center"}}><CyclePill value={a.type} map={AGENDA_MAP} order={["proc","show","disc","dec"]} cls={v=>u(`agenda.${i}.type`,v)}/></div>
            <div className="del" onClick={() => setState(s => ({...s, agenda: s.agenda.filter((_,j)=>j!==i)}))}>×</div>
          </div>
        ))}
      </div>
      <button className="add-row" onClick={() => setState(s => ({...s, agenda:[...s.agenda,{time:"",dur:"15",topic:"",desc:"",owner:"",type:"disc"}]}))}>إضافة بند جديد</button>

      <div className="timeline">
        <div className="tl-head"><span>Timeline · {m.timeStart}</span><span>{m.timeEnd}</span></div>
        <div className="tl-bar">
          {st.agenda.map((a,i) => {
            const dur = parseInt(a.dur,10) || 15;
            const pct = totalMin ? (dur/totalMin)*100 : 100/st.agenda.length;
            return <div className="tl-seg" key={i} style={{width:pct+"%", background:colors[i%colors.length]}}>{pct>7?String(i+1).padStart(2,"0"):""}</div>;
          })}
        </div>
        <div className="tl-labels">{st.agenda.map((a,i) => <div className="tl-label" key={i}>{a.time}</div>)}</div>
      </div>
      <div className="meta-strip"><span>// AGENDA APPROVED</span><div className="dots"></div><span>CHAIR: {m.chair}</span></div>
    </Page>
  );
}

/* ════════ P4 · Discussions ════════ */
function PageDiscussions({ st, u, setState }) {
  const TAG_ORDER = ["قرار","نقاش","معلومة"];
  return (
    <Page label="04 المناقشات والقرارات" st={st} page={4}>
      <Sec no="04" label="المناقشات والنقاط الرئيسية" en="Key Discussions & Resolutions" first/>
      <div className="meta-strip" style={{marginBottom:8, marginTop:2}}>
        <span style={{display:"flex",gap:14}}>
          <span><span style={{display:"inline-block",width:8,height:8,borderRadius:"50%",background:"var(--ok)",marginInlineEnd:6,verticalAlign:"middle"}}></span>قرار</span>
          <span><span style={{display:"inline-block",width:8,height:8,borderRadius:"50%",background:"var(--orange)",marginInlineEnd:6,verticalAlign:"middle"}}></span>معلومة</span>
          <span><span style={{display:"inline-block",width:8,height:8,borderRadius:"50%",background:"var(--navy)",marginInlineEnd:6,verticalAlign:"middle"}}></span>نقاش</span>
        </span>
        <div className="dots"></div>
        <span>RECORDS · {String(st.points.length).padStart(2,"0")}</span>
      </div>

      <div className="points">

          const accent = p.tag === "قرار" ? "accent-dec" : p.tag === "معلومة" ? "accent-info" : "";
          const tagCls = p.tag === "قرار" ? "dec" : p.tag === "معلومة" ? "info" : "disc";
          return (
            <div className={`point ${accent}`} key={i}>
              <div className="p-num">{String(i+1).padStart(2,"0")}</div>
              <div className="p-body">
                <div className="p-top">
                  <span className={`p-tag ${tagCls}`} onClick={() => u(`points.${i}.tag`, TAG_ORDER[(TAG_ORDER.indexOf(p.tag)+1)%TAG_ORDER.length])}>{p.tag}</span>
                  <Fill className="p-title" value={p.title} onChange={v=>u(`points.${i}.title`,v)} placeholder="عنوان النقطة"/>

                </div>
                <textarea className="p-text" value={p.text} onChange={e=>u(`points.${i}.text`,e.target.value)} placeholder="ملخص النقاش أو القرار..." rows={2}/>
                <div className="p-meta">
                  <span>التصويت: <b>{p.meta?.vote || "—"}</b></span>
                  <span>التأثير: <b>{p.meta?.impact || "—"}</b></span>
                  <span style={{marginInlineStart:"auto",color:"var(--ink-4)"}}>#{String(i+1).padStart(3,"0")}</span>
                </div>
              </div>
            </div>
          );
        })}
      </div>
      <button className="add-row" onClick={() => setState(s => ({...s, points:[...s.points,{tag:"نقاش",title:"",text:"",meta:{vote:"",impact:""}}]}))}>إضافة نقطة جديدة</button>

      <div className="notes-block">
        <div className="nb-head"><span className="dot"></span><span className="lbl">// ملاحظات إضافية — Additional Notes</span></div>
        <textarea value={st.notes} onChange={e=>u("notes",e.target.value)} placeholder="أي ملاحظات أو نقاط لم تُغطَّ في الأقسام السابقة..."/>
      </div>
    </Page>
  );
}

/* ════════ Department card ════════ */
function DeptCard({ st, u, setState, di, from = 0, to = null, cont = false }) {
  const d = st.departments[di];
  if (!d) return null;
  const done = d.tasks.filter(t => t.status === "done").length;
  const end = to == null ? d.tasks.length : to;
  const isLast = end >= d.tasks.length;
  return (
    <div className="dcard">
      <div className="dcard-head">
        <span className="code">{d.code}</span>
        <div className="dname"><span className="n">{d.name}{cont ? " — تابع" : ""}</span><span className="director">{d.director}</span></div>
        <div className="progress">{done}/{d.tasks.length}</div>
      </div>
      <div className="dtasks">
        {d.tasks.map((t,ti) => ({t,ti})).slice(from, end).map(({t,ti}) => (
          <div className={`dtask ${t.status === "done" ? "st-done" : ""}`} key={ti}>
            <div className="tnum">{String(ti+1).padStart(2,"0")}</div>
            <div className="tbody"><Fill multi value={t.task} onChange={v=>u(`departments.${di}.tasks.${ti}.task`,v)} placeholder="وصف المهمة"/></div>
            <div className="tmeta"><CyclePill value={t.status} map={STATUS_MAP} order={["progress","review","done","deferred"]} cls={v=>u(`departments.${di}.tasks.${ti}.status`,v)} className="mpill compact"/></div>
            <span className="tdel" onClick={() => setState(s => { const c = JSON.parse(JSON.stringify(s)); c.departments[di].tasks.splice(ti,1); return c; })}>×</span>
          </div>
        ))}
        {isLast && <button className="dcard-add" onClick={() => setState(s => { const c = JSON.parse(JSON.stringify(s)); c.departments[di].tasks.push({task:"",status:"progress"}); return c; })}>+ إضافة مهمة</button>}
      </div>
    </div>
  );
}

function Legend({ st }) {
  const all = st.departments.flatMap(d => d.tasks);
  const c = {
    done: all.filter(t=>t.status==="done").length,
    progress: all.filter(t=>t.status==="progress").length,
    review: all.filter(t=>t.status==="review").length,
    deferred: all.filter(t=>t.status==="deferred").length,
  };
  return (
    <div className="status-legend">
      <span className="total">إجمالي المهام <b>{String(all.length).padStart(2,"0")}</b></span>
      <span className="leg done"><span className="dot"></span>تم الإنجاز <b>{c.done}</b></span>
      <span className="leg progress"><span className="dot"></span>قيد الإنجاز <b>{c.progress}</b></span>
      <span className="leg review"><span className="dot"></span>بانتظار الاعتماد <b>{c.review}</b></span>
      <span className="leg deferred"><span className="dot"></span>مؤجلة <b>{c.deferred}</b></span>
    </div>
  );
}

/* ════════ Department task pages ════════ */
function PageTasks({ st, u, setState, page, cards, secNo, part, showLegend, signoff }) {
  const m = st.meta;
  const all = st.departments.flatMap(d => d.tasks);
  const pct = all.length ? Math.round(all.filter(t=>t.status==="done").length / all.length * 100) : 0;
  return (
    <Page label={`0${page} مهام الإدارات ${part}`} st={st} page={page}>
      <Sec no={secNo} label="مهام الإدارات والمتابعة الأسبوعية" en={`Dept Tasks · ${part}`} first/>
      {showLegend ? <Legend st={st}/> : (
        <div className="meta-strip" style={{marginBottom:8,marginTop:2}}><span>// CONTINUED · {part}</span><div className="dots"></div><span>{m.docId} · {m.date}</span></div>
      )}
      <div className="depts">
        {cards.map((c,i) => <DeptCard key={i} st={st} u={u} setState={setState} di={c.di} from={c.from || 0} to={c.to ?? null} cont={c.cont}/>)}
      </div>
      {signoff && (
        <>
          <div className="next-bar">
            <div>
              <div className="eyebrow">// Next Meeting · الاجتماع القادم</div>
              <Fill className="val" value={st.nextMeeting} onChange={v=>u("nextMeeting",v)} placeholder="التاريخ والوقت" style={{color:"#fff"}}/>
            </div>
            <div className="right">إنجاز الأسبوع · {pct}%</div>
          </div>
          <div className="signoff-mom">
            <div className="sign">
              <div className="label">// Chair · رئيس الاجتماع</div>
              <div className="name">{m.chair || "—"}</div>
              <div className="role">المدير التنفيذي · شركة مسقا للاستثمار</div>
              <div className="sig-line"></div>
            </div>
          </div>
        </>
      )}
    </Page>
  );
}

/* ════════ Closing page · notes + approval ════════ */
function PageClosing({ st, u }) {
  const m = st.meta;
  const all = st.departments.flatMap(d => d.tasks);
  const pct = all.length ? Math.round(all.filter(t=>t.status==="done").length / all.length * 100) : 0;
  return (
    <Page label="05 الملاحظات والاعتماد" st={st} page={5}>
      <Sec no="07" label="ملخص المتابعة" en="Follow-up Summary" first/>
      <Legend st={st}/>

      <Sec no="08" label="الاجتماع القادم والاعتماد" en="Next Meeting & Approval"/>
      <div className="next-bar">
        <div>
          <div className="eyebrow">// Next Meeting · الاجتماع القادم</div>
          <Fill className="val" value={st.nextMeeting} onChange={v=>u("nextMeeting",v)} placeholder="التاريخ والوقت" style={{color:"#fff"}}/>
        </div>
        <div className="right">إنجاز الأسبوع · {pct}%</div>
      </div>
      <div className="signoff-mom">
        <div className="sign" style={{minHeight:140}}>
          <div className="label">// Chair · رئيس الاجتماع</div>
          <div className="name">{m.chair || "—"}</div>
          <div className="role">الرئيس التنفيذي · شركة مسقا للاستثمار</div>
          <div className="sig-line"></div>
        </div>
      </div>
    </Page>
  );
}

/* ── Toolbar ── */
function Toolbar({ onPrint, onReset, onClear }) {
  return (
    <div className="toolbar">
      <div className="brand">MSGA · MoM</div>
      <button onClick={onPrint}>Print / PDF</button>
      <button onClick={onClear}>Empty</button>
      <button onClick={onReset}>Sample</button>
    </div>
  );
}

/* ── App ── */
function App() {
  const { state, setState, update, reset, clear } = useStore();
  return (
    <>
      <Toolbar onPrint={() => window.print()} onReset={reset} onClear={clear}/>
      <div className="stage">
        <Cover st={state} u={update}/>
        <PageInfo st={state} u={update}/>
        <PageTasks st={state} u={update} setState={setState} page={3} cards={[{di:0},{di:1}]} secNo="03" part="جزء 1/2" showLegend/>
        <PageTasks st={state} u={update} setState={setState} page={4} cards={[{di:2},{di:3},{di:4}]} secNo="04" part="جزء 2/2"/>
        <PageClosing st={state} u={update}/>
      </div>
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
