<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>MSGA — نظام محاضر الاجتماعات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Saira:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#1F3A57; --navy-2:#16304B; --navy-3:#102539; --navy-deep:#0D2034;
  --navy-card:#27425E; --navy-line:#33506C;
  --orange:#E5811F; --orange-2:#C96B12; --orange-soft:#FBEEDD;
  --ink:#1E2B38; --ink-2:#41505F; --ink-3:#76828F; --ink-4:#A7B0BA;
  --paper:#FFFFFF; --paper-2:#F7F8FB; --paper-3:#DDE2E8; --lav:#EEF0F7; --lav-2:#F4F5FA;
  --line:#E5E8EE; --line-2:#EEF0F4; --th:#F4F5F8;
  --ok:#2F8559; --ok-bg:#E6F4EC; --ok-bd:#CBE8D6;
  --prog:#2B5180; --prog-bg:#E9EFF7; --prog-bd:#D2DEEE;
  --hold:#B0831F; --hold-bg:#FAF2DA; --hold-bd:#ECDBA9;
  --red:#B0432C; --red-bg:#F8E9E4; --red-bd:#ECCDC2;
  --ar:"Tajawal",system-ui,sans-serif;
  --latin:"Saira","Tajawal",system-ui,sans-serif;
  --page-w:210mm; --page-h:297mm; --mx:15mm; --my:14mm;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--paper-3);font-family:var(--ar);color:var(--ink);-webkit-font-smoothing:antialiased;}
body{direction:rtl;}

/* ── AUTH ── */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--navy);background-image:radial-gradient(circle at 1px 1px,rgba(255,255,255,.04) 1px,transparent 1px);background-size:20px 20px;}
.auth-card{background:#fff;width:380px;padding:40px;direction:rtl;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.auth-logo{height:52px;display:block;margin:0 auto 24px;}
.auth-title{font-size:22px;font-weight:700;color:var(--navy);text-align:center;margin:0 0 4px;}
.auth-sub{font-size:11px;color:var(--ink-3);text-align:center;margin:0 0 28px;font-family:var(--latin);letter-spacing:.08em;}
.auth-field{margin-bottom:16px;}
.auth-field label{display:block;font-size:11.5px;font-weight:600;color:var(--ink-2);margin-bottom:6px;}
.auth-field input{width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:8px;
  font-family:var(--ar);font-size:13px;outline:none;background:var(--paper-2);direction:ltr;text-align:start;transition:border .15s;}
.auth-field input:focus{border-color:var(--navy);background:#fff;}
.auth-btn{width:100%;padding:12px;background:var(--navy);color:#fff;border:none;border-radius:8px;
  font-family:var(--ar);font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;}
.auth-btn:hover{background:var(--navy-deep);}
.auth-btn:disabled{opacity:.5;cursor:default;}
.auth-err{background:var(--red-bg);color:var(--red);padding:10px 12px;font-size:12px;margin-top:12px;border-radius:6px;}

/* ── TOP NAV ── */
.top-nav{position:fixed;top:0;inset-inline:0;z-index:200;background:var(--navy-3);color:#fff;
  display:flex;align-items:center;gap:6px;padding:0 14px;height:48px;font-family:var(--latin);font-size:11px;direction:ltr;}
.top-nav .tn-brand{display:flex;align-items:center;gap:8px;padding-inline-end:12px;border-inline-end:1px solid rgba(255,255,255,.15);}
.top-nav .tn-brand::before{content:"";width:8px;height:8px;background:var(--orange);border-radius:50%;}
.tn-spacer{flex:1;}
.tn-user{font-size:10px;color:rgba(255,255,255,.55);direction:rtl;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tn-btn{background:transparent;color:#fff;border:none;font:inherit;padding:6px 10px;cursor:pointer;display:flex;align-items:center;gap:5px;opacity:.8;border-radius:5px;}
.tn-btn:hover{opacity:1;background:rgba(255,255,255,.1);}
.tn-btn.orange{background:var(--orange);opacity:1;border-radius:6px;}
.tn-btn.orange:hover{background:var(--orange-2);}
.tn-btn.green{background:var(--ok);opacity:1;border-radius:6px;}
.tn-btn.green:hover{background:#1e6647;}
.tn-sep{width:1px;height:20px;background:rgba(255,255,255,.15);margin:0 2px;}
.tn-status{font-size:9.5px;padding:3px 10px;border-radius:999px;white-space:nowrap;}
.tn-status.draft{background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);}
.tn-status.pending{background:var(--hold-bg);color:var(--hold);}
.tn-status.approved{background:var(--ok);color:#fff;}
.tn-status.rejected{background:var(--red);color:#fff;}
.tn-save{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:.06em;}
.tn-badge{background:var(--orange);color:#fff;font-size:9px;font-weight:700;width:16px;height:16px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;margin-inline-start:4px;}

/* ── DASHBOARD ── */
.dash{min-height:100vh;padding:72px 0 60px;background:var(--paper-3);}
.dash-inner{max-width:760px;margin:0 auto;padding:32px 24px;}
.dash-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;}
.dash-top h1{margin:0 0 4px;font-size:22px;font-weight:700;color:var(--navy);}
.dash-top p{margin:0;font-size:12px;color:var(--ink-3);}
.dash-new{display:inline-flex;align-items:center;gap:8px;background:var(--navy);color:#fff;
  border:none;border-radius:9px;font-family:var(--ar);font-size:13px;font-weight:600;padding:10px 20px;cursor:pointer;}
.dash-new:hover{background:var(--navy-deep);}
.dash-doc-btn{display:inline-flex;align-items:center;gap:7px;background:#fff;color:var(--navy);
  border:1.5px solid var(--navy);border-radius:9px;font-family:var(--ar);font-size:13px;font-weight:600;padding:9px 18px;cursor:pointer;}
.dash-doc-btn:hover{background:var(--lav);}
/* documents library */
.docs-wrap{margin-top:6px;}
.docs-group{margin:18px 0 0;}
.docs-group-h{font-family:var(--latin);font-size:9px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--ink-3);padding-bottom:8px;border-bottom:1px solid var(--line);margin-bottom:12px;}
.docs-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.doc-card{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);
  border-radius:9px;padding:13px 16px;text-decoration:none;transition:box-shadow .15s,border-color .15s;}
.doc-card:hover{box-shadow:0 2px 12px rgba(31,58,87,.1);border-color:var(--navy);}
.doc-card .di{width:34px;height:34px;border-radius:8px;background:var(--lav);display:grid;place-items:center;font-size:15px;flex-shrink:0;}
.doc-card .dt{font-size:12.5px;font-weight:600;color:var(--ink);line-height:1.4;}
.doc-card .da{margin-inline-start:auto;color:var(--ink-4);font-size:15px;}
.dash-sec{font-family:var(--latin);font-size:9px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--ink-3);padding-bottom:8px;border-bottom:1px solid var(--line);margin:20px 0 12px;}
.m-card{background:#fff;border:1px solid var(--line);border-radius:9px;display:grid;
  grid-template-columns:8px 1fr auto;align-items:center;gap:14px;padding:14px 18px;cursor:pointer;transition:box-shadow .15s,border-color .15s;}
.m-card:hover{box-shadow:0 2px 12px rgba(31,58,87,.1);border-color:var(--navy);}
.m-card+.m-card{margin-top:8px;}
.m-card .mc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.mc-dot.draft{background:var(--ink-4);}
.mc-dot.pending{background:var(--hold);}
.mc-dot.approved{background:var(--ok);}
.mc-dot.rejected{background:var(--red);}
.m-card .mc-title{font-size:13.5px;font-weight:600;color:var(--ink);margin-bottom:3px;}
.m-card .mc-meta{font-size:11px;color:var(--ink-3);font-family:var(--latin);}
.mc-badge{font-family:var(--latin);font-size:9px;padding:3px 10px;border-radius:999px;white-space:nowrap;}
.mc-badge.draft{background:var(--paper-2);color:var(--ink-3);border:1px solid var(--line);}
.mc-badge.pending{background:var(--hold-bg);color:var(--hold);border:1px solid var(--hold-bd);}
.mc-badge.approved{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-bd);}
.mc-badge.rejected{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd);}
.dash-empty{text-align:center;padding:60px 20px;color:var(--ink-3);}
.dash-empty .de-icon{font-size:36px;margin-bottom:12px;}
.dash-empty p{font-size:13px;}
.dash-empty2{text-align:center;padding:28px;color:var(--ink-4);font-size:12px;border:1px dashed var(--line);border-radius:9px;}
/* KPIs */
.dash-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:8px 0 4px;}
.dk{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden;}
.dk::after{content:"";position:absolute;top:0;bottom:0;right:0;width:4px;background:var(--navy);}
.dk .dk-v{font-family:var(--latin);font-size:26px;font-weight:700;color:var(--navy);line-height:1;}
.dk .dk-l{font-size:11px;color:var(--ink-3);margin-top:6px;}
.dk.alert::after{background:var(--orange);}
.dk.alert .dk-v{color:var(--orange-2);}
/* tools: search + filters */
.dash-tools{display:flex;gap:10px;align-items:center;margin:18px 0 4px;flex-wrap:wrap;}
.dash-search{flex:1;min-width:220px;position:relative;}
.dash-search input{width:100%;padding:9px 12px 9px 34px;border:1.5px solid var(--line);border-radius:9px;font-family:var(--ar);font-size:13px;outline:none;background:#fff;}
.dash-search input:focus{border-color:var(--navy);}
.dash-search .si{position:absolute;top:50%;transform:translateY(-50%);inset-inline-start:11px;font-size:12px;opacity:.5;}
.dash-filters{display:flex;gap:6px;flex-wrap:wrap;}
.fchip{font-family:var(--ar);font-size:11.5px;padding:7px 13px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--ink-2);cursor:pointer;white-space:nowrap;}
.fchip:hover{border-color:var(--navy);}
.fchip.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.fchip .fc-n{font-family:var(--latin);opacity:.65;margin-inline-start:5px;}
/* card extras */
.m-card .mc-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.mc-turn{font-family:var(--ar);font-size:9.5px;font-weight:700;padding:2px 9px;border-radius:999px;background:var(--orange-soft);color:var(--orange-2);border:1px solid #F0CBA0;margin-inline-start:8px;}
.mc-tasks{font-family:var(--ar);color:var(--ink-4);}
.mc-prog{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.mc-prog .pbar{width:84px;height:5px;border-radius:3px;background:var(--line);overflow:hidden;}
.mc-prog .pbar i{display:block;height:100%;}
.mc-prog .pnum{font-family:var(--latin);font-size:9.5px;color:var(--ink-3);letter-spacing:.02em;}

/* ── REVIEW PANEL ── */
.rv-overlay{position:fixed;inset:0;z-index:400;background:rgba(16,37,57,.75);display:flex;align-items:center;justify-content:center;padding:20px;}
.rv-panel{background:#fff;width:500px;max-height:85vh;overflow-y:auto;padding:32px;direction:rtl;border-radius:12px;}
.rv-panel h2{margin:0 0 4px;font-size:20px;color:var(--navy);}
.rv-panel .rv-sub{font-size:11px;color:var(--ink-3);font-family:var(--latin);margin-bottom:24px;}
.rv-section{margin-bottom:16px;}
.rv-section label{display:block;font-size:11px;font-weight:600;color:var(--ink-2);margin-bottom:6px;}
.rv-section textarea{width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:8px;
  font-family:var(--ar);font-size:13px;resize:vertical;min-height:80px;outline:none;}
.rv-section textarea:focus{border-color:var(--navy);}
.rv-info{background:var(--paper-2);border:1px solid var(--line);border-radius:8px;padding:12px 14px;font-size:12px;line-height:1.7;margin-bottom:16px;}
.rv-info b{color:var(--navy);}
.rv-btns{display:flex;gap:10px;margin-top:20px;}
.rv-btn{flex:1;padding:12px;border:none;border-radius:8px;font-family:var(--ar);font-size:13px;font-weight:600;cursor:pointer;}
.rv-btn.approve{background:var(--ok);color:#fff;}
.rv-btn.approve:hover{background:#1e6647;}
.rv-btn.reject{background:var(--red);color:#fff;}
.rv-btn.reject:hover{background:#8f3423;}
.rv-btn.cancel{background:var(--paper-2);color:var(--ink-2);border:1px solid var(--line);flex:0 0 auto;padding:12px 20px;}

/* ── PAGES ── */
.stage{min-height:100vh;padding:72px 16px 80px;display:flex;flex-direction:column;align-items:center;gap:28px;}
.page{width:var(--page-w);height:var(--page-h);background:var(--paper);position:relative;overflow:hidden;
  box-shadow:0 1px 2px rgba(20,30,45,.05),0 16px 44px rgba(20,30,45,.14);page-break-after:always;break-after:page;display:flex;flex-direction:column;}
.page:last-of-type{page-break-after:auto;}
.watermark{position:absolute;inset:0;pointer-events:none;z-index:0;}
.page-inner{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;padding:var(--my) var(--mx) 0;}

/* header */
.head{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:16px;padding-bottom:11px;margin-bottom:6px;border-bottom:2px solid var(--orange);}
.head .logo{height:34px;width:auto;display:block;}
.head .titles{display:flex;flex-direction:column;gap:1px;}
.head .eyebrow{font-family:var(--latin);font-size:8.5px;font-weight:600;letter-spacing:.18em;color:var(--orange-2);text-transform:uppercase;direction:ltr;}
.head .doctitle{font-size:13.5px;font-weight:700;color:var(--navy);}
.head .doc-meta{text-align:left;direction:ltr;font-family:var(--latin);font-size:9px;font-weight:500;color:var(--ink-3);line-height:1.65;}
.head .doc-meta b{color:var(--navy);font-weight:700;letter-spacing:.08em;}
/* footer */
.foot{position:absolute;bottom:8mm;inset-inline:var(--mx);display:flex;align-items:center;justify-content:space-between;
  font-family:var(--latin);font-size:8.5px;font-weight:500;color:var(--ink-3);letter-spacing:.08em;text-transform:uppercase;
  border-top:1px solid var(--line);padding-top:7px;z-index:2;direction:ltr;}
.foot .brand-mark{display:flex;align-items:center;gap:7px;}
.foot .brand-mark::before{content:"";width:5px;height:5px;background:var(--orange);border-radius:50%;}
.foot .pagenum b{color:var(--navy);font-weight:700;}
/* section bar */
.sec-head{position:relative;display:flex;align-items:center;gap:11px;flex-direction:row-reverse;justify-content:flex-start;
  background:var(--lav);border-radius:9px;padding:9px 16px 9px 14px;margin:16px 0 11px;overflow:hidden;}
.sec-head.first{margin-top:4px;}
.sec-head::after{content:"";position:absolute;top:0;bottom:0;right:0;width:5px;background:var(--orange);}
.sec-head .sec-no{width:24px;height:24px;border-radius:50%;background:var(--orange);color:#fff;display:grid;place-items:center;font-family:var(--latin);font-size:11px;font-weight:700;flex-shrink:0;}
.sec-head h2{margin:0;font-size:16px;font-weight:700;color:var(--navy);flex:1;}
.sec-head .en{font-family:var(--latin);font-size:9px;font-weight:600;color:var(--ink-3);letter-spacing:.16em;text-transform:uppercase;white-space:nowrap;direction:ltr;}
/* fill */
.fill{border:none;outline:none;background:transparent;width:100%;font:inherit;color:inherit;
  padding:2px 0;border-bottom:1px dashed transparent;transition:border .15s,background .15s;}
.fill:hover{border-bottom-color:var(--line);}
.fill:focus{border-bottom-color:var(--orange);background:linear-gradient(to top,rgba(229,129,31,.07),transparent);}
.fill::placeholder{color:var(--ink-4);font-weight:400;}
.fill.readonly{pointer-events:none;opacity:.8;}
.fill-latin{font-family:var(--latin);direction:ltr;text-align:start;}
.fill-num{font-family:var(--latin);direction:ltr;text-align:start;font-weight:500;}
.fill-multi{resize:none;overflow:hidden;display:block;font-family:inherit;line-height:1.6;min-height:18px;border-bottom:1px dashed transparent;}
.fill-multi:hover{border-bottom-color:var(--line);}
.fill-multi:focus{border-bottom-color:var(--orange);background:linear-gradient(to top,rgba(229,129,31,.07),transparent);}
.cover-hero .fill{text-align:center;color:#C5D0DC;}
.cover-hero .fill::placeholder{color:rgba(197,208,220,.5);}
/* kpis */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-top:4px;}
.kpi{border:1px solid var(--line);border-radius:9px;background:var(--paper-2);padding:12px 14px;display:flex;flex-direction:column;gap:5px;position:relative;overflow:hidden;}
.kpi::after{content:"";position:absolute;top:0;bottom:0;right:0;width:4px;background:var(--orange);}
.kpi .label{font-family:var(--latin);font-size:8.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);direction:ltr;}
.kpi .val{font-family:var(--latin);font-size:24px;font-weight:700;color:var(--navy);line-height:1;direction:ltr;}
.kpi .sub{font-size:9.5px;color:var(--ink-3);}
/* info grid */
.info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:0;border:1px solid var(--line);border-radius:9px;overflow:hidden;margin-top:6px;}
.info-row{display:grid;grid-template-columns:130px 1fr;border-bottom:1px solid var(--line-2);border-inline-end:1px solid var(--line-2);min-height:40px;}
.info-row:nth-child(2n){border-inline-end:none;}
.info-row:nth-last-child(-n+2){border-bottom:none;}
.info-row .k{background:var(--th);padding:9px 12px;display:flex;align-items:center;gap:8px;font-size:10.5px;color:var(--navy);font-weight:600;border-inline-end:1px solid var(--line-2);}
.info-row .k svg{width:13px;height:13px;color:var(--orange-2);stroke:currentColor;fill:none;stroke-width:1.7;}
.info-row .v{padding:8px 12px;display:flex;align-items:center;font-size:11.5px;color:var(--ink);}
/* attendance table */
.dtable{margin-top:6px;border:1px solid var(--line);border-radius:9px;overflow:hidden;}
.dt-head{display:grid;background:var(--th);border-bottom:2px solid var(--orange);font-size:9.5px;font-weight:700;color:var(--navy);}
.dt-head>div{padding:8px 11px;}
.dt-head>div.center{text-align:center;}
.drow{display:grid;border-bottom:1px solid var(--line-2);font-size:11px;min-height:36px;background:var(--paper);align-items:stretch;}
.drow:last-child{border-bottom:none;}
.drow:nth-child(even){background:var(--lav-2);}
.drow>div{padding:6px 11px;display:flex;align-items:center;}
.drow .idx{font-family:var(--latin);font-size:10px;color:var(--ink-4);justify-content:center;}
.cols-att{grid-template-columns:34px 1fr 150px 96px 70px;}
.sig-dash{flex:1;border-bottom:1px dashed var(--ink-4);margin:0 4px 4px;min-height:16px;align-self:flex-end;}
/* pills */
.mpill{display:inline-flex;align-items:center;gap:6px;font-size:9.5px;font-weight:700;padding:3px 10px;
  border-radius:999px;border:1px solid transparent;white-space:nowrap;cursor:pointer;user-select:none;}
.mpill::before{content:"";width:5px;height:5px;border-radius:50%;background:currentColor;}
.mpill.present{color:var(--prog);background:var(--prog-bg);border-color:var(--prog-bd);}
.mpill.remote{color:var(--hold);background:var(--hold-bg);border-color:var(--hold-bd);}
.mpill.absent{color:var(--red);background:var(--red-bg);border-color:var(--red-bd);}
.mpill.done{color:var(--ok);background:var(--ok-bg);border-color:var(--ok-bd);}
.mpill.progress{color:var(--prog);background:var(--prog-bg);border-color:var(--prog-bd);}
.mpill.review{color:var(--hold);background:var(--hold-bg);border-color:var(--hold-bd);}
.mpill.deferred{color:var(--ink-3);background:var(--paper-2);border-color:var(--line);}
.mpill.compact{font-size:9px;padding:3px 9px;}
.mpill.ro{cursor:default;}
/* dept cards */
.depts{display:flex;flex-direction:column;gap:11px;margin-top:6px;}
.dcard{border:1px solid var(--line);border-radius:9px;background:#fff;overflow:hidden;}
.dcard-head{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:10px;padding:8px 13px;background:var(--th);border-bottom:2px solid var(--orange);}
.dcard-head .code{font-family:var(--latin);font-size:8.5px;font-weight:700;letter-spacing:.08em;background:var(--orange);color:#fff;padding:3px 8px;border-radius:5px;direction:ltr;}
.dcard-head .dname{display:flex;align-items:baseline;gap:9px;}
.dcard-head .dname .n{font-size:12px;font-weight:700;color:var(--navy);}

// Build the in-memory departments array, sourcing tasks from the separate
// deptTasks map (each dept owns its own key → no write conflicts).
// Falls back to tasks embedded in data.departments for older documents.
function mergeDeptTasks(savedData,deptTasks){
  const base=BLANK().departments;
  const saved=Array.isArray(savedData?.departments)?savedData.departments:base;
  return base.map(bd=>{
    const sd=saved.find(x=>x.id===bd.id)||bd;
    const fromMap=deptTasks&&Array.isArray(deptTasks[bd.id])?deptTasks[bd.id]:null;
    const fromEmbedded=Array.isArray(sd.tasks)?sd.tasks:[];
    return {id:bd.id,name:sd.name||bd.name,director:sd.director||bd.director,code:bd.code,
      tasks:fromMap!==null?fromMap:fromEmbedded};
  });
}

  const t=useRef(null);

/* ── Auth ── */
function AuthScreen(){
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);
  const login=async e=>{
    e.preventDefault();setErr("");setLoading(true);
    try{await auth.signInWithEmailAndPassword(email.trim(),pass);}
    catch(ex){
      const m={"auth/user-not-found":"البريد غير مسجّل","auth/wrong-password":"كلمة المرور خاطئة",

        "auth/invalid-credential":"البريد أو كلمة المرور غير صحيحة"};
      setErr(m[ex.code]||ex.message);
    }
    setLoading(false);
  };
  return(
    <div className="auth-wrap">
      <div className="auth-card">
        <img className="auth-logo" src="assets/msga-logo.png" alt="MSGA" onError={e=>e.target.style.display="none"}/>

        <form onSubmit={login}>

          <div className="auth-field"><label>كلمة المرور</label>
            <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" required/></div>
          {err&&<div className="auth-err">{err}</div>}
          <button className="auth-btn" type="submit" disabled={loading}>{loading?"جاري الدخول...":"دخول"}</button>
        </form>
      </div>
    </div>
  );
}

/* ── Dashboard ── */
function Dashboard({user,meetings,onNew,onOpen}){
  const isAdmin=user?.email===ADMIN_EMAIL;
  const userDept=DEPT_MAP[user?.email]||null;
  const isViewer=!isAdmin&&!userDept;
  const canSeeDocs=isAdmin||userDept?.id==="hr";
  const [showDocs,setShowDocs]=useState(false);
  const [q,setQ]=useState("");
  const [filter,setFilter]=useState("all");

  const cnt=s=>meetings.filter(m=>m.status===s).length;
  const submittedOf=m=>DEPT_IDS.filter(id=>m.deptStatus&&m.deptStatus[id]==="submitted").length;
  const tasksOf=m=>{const d=mergeDeptTasks(m.data,m.deptTasks);return{total:d.reduce((s,x)=>s+x.tasks.length,0),done:d.reduce((s,x)=>s+x.tasks.filter(t=>t.status==="done").length,0)};};
  const needsMe=m=>userDept&&m.status!=="approved"&&(!m.deptStatus||m.deptStatus[userDept.id]!=="submitted");
  const needsMeCount=meetings.filter(needsMe).length;

  // KPIs adapt to role
  const kpis=isAdmin
    ?[{v:meetings.length,l:"إجمالي المحاضر"},{v:cnt("pending"),l:"بانتظار الاعتماد",alert:cnt("pending")>0},{v:cnt("approved"),l:"معتمدة"},{v:meetings.filter(m=>m.status==="draft"||m.status==="rejected").length,l:"قيد الإعداد"}]
    :userDept
    ?[{v:needsMeCount,l:"بانتظار رفع مهامك",alert:needsMeCount>0},{v:cnt("pending"),l:"بانتظار الاعتماد"},{v:cnt("approved"),l:"معتمدة"},{v:meetings.length,l:"الإجمالي"}]
    :[{v:meetings.length,l:"إجمالي المحاضر"},{v:cnt("approved"),l:"معتمدة"},{v:cnt("pending"),l:"بانتظار الاعتماد"},{v:cnt("rejected"),l:"مرفوضة"}];

  const norm=s=>(s||"").toString().toLowerCase();
  const match=m=>{
    const hay=norm(m.data?.meta?.title)+" "+norm(m.data?.meta?.date)+" "+norm(m.data?.meta?.meetingNo)+" "+norm(m.createdByEmail);
    return (!q.trim()||hay.includes(norm(q)))&&(filter==="all"||m.status===filter);
  };
  const chips=[["all","الكل",meetings.length],["draft","مسودة",cnt("draft")],["pending","بانتظار",cnt("pending")],["approved","معتمد",cnt("approved")],["rejected","مرفوض",cnt("rejected")]];

  // priority section (only when not searching/filtering)
  const showPriority=filter==="all"&&!q.trim();
  const priority=isAdmin?meetings.filter(m=>m.status==="pending"):(userDept?meetings.filter(needsMe):[]);
  const prioIds=new Set(priority.map(m=>m.id));
  const rest=showPriority?meetings.filter(m=>!prioIds.has(m.id)):meetings.filter(match);

  const Card=({m})=>{
    const sub=submittedOf(m), t=tasksOf(m), mine=needsMe(m);
    return(
      <div className="m-card" onClick={()=>onOpen(m)}>
        <div className={`mc-dot ${m.status}`}/>
        <div>
          <div className="mc-title">{(m.data?.meta?.title||"").trim()||(m.data?.meta?.date||"").trim()||"محضر بدون عنوان"}{mine&&<span className="mc-turn">● دورك</span>}</div>
          <div className="mc-meta">{m.data?.meta?.date||"—"} · {m.data?.meta?.meetingNo||"—"}{isAdmin&&m.createdByEmail?` · ${m.createdByEmail}`:""} · <span className="mc-tasks">{t.total} مهمة</span></div>
        </div>
        <div className="mc-right">
          <span className={`mc-badge ${m.status}`}>{STATUS_LABELS[m.status]}</span>
          {m.status==="approved"
            ?<div className="mc-prog"><span className="pnum">الإنجاز {t.total?Math.round(t.done/t.total*100):0}%</span></div>
            :<div className="mc-prog"><div className="pbar"><i style={{width:(sub/TOTAL*100)+"%",background:sub===TOTAL?"var(--ok)":"var(--orange)"}}/></div><span className="pnum">القطاعات {sub}/{TOTAL}</span></div>}
        </div>
      </div>
    );
  };

  return(
    <div className="dash">
      <div className="dash-inner">
        <div className="dash-top">
          <div><h1>{showDocs?"المستندات والوثائق":"محاضر الاجتماعات"}</h1>
            <p>{showDocs?"وثائق ولوائح الشركة — اضغط للفتح":(isAdmin?"جميع المحاضر — صلاحية الاعتماد":(isViewer?"المحاضر — للاطلاع فقط":"محاضر الاجتماعات — أضف مهام قطاعك"))}</p></div>
          <div style={{display:"flex",gap:8}}>
            {canSeeDocs&&<button className="dash-doc-btn" onClick={()=>setShowDocs(s=>!s)}>{showDocs?"← المحاضر":"📁 المستندات"}</button>}
            {isAdmin&&!showDocs&&<button className="dash-new" onClick={onNew}>+ محضر جديد</button>}
          </div>
        </div>

        {showDocs
          ?<div className="docs-wrap">{DOCS.map(g=>(
              <div className="docs-group" key={g.group}>
                <div className="docs-group-h">{g.group}</div>
                <div className="docs-grid">
                  {g.items.map(it=><a className="doc-card" key={it.h} href={it.h} target="_blank" rel="noopener noreferrer"><span className="di">📄</span><span className="dt">{it.t}</span><span className="da">↗</span></a>)}
                </div>
              </div>))}
            </div>
          :meetings.length===0
          ?<div className="dash-empty"><div className="de-icon">📄</div><p>{isAdmin?'لا توجد محاضر — اضغط "محضر جديد" للبدء':"لا توجد محاضر بعد"}</p></div>
          :<>
            <div className="dash-kpis">
              {kpis.map((k,i)=><div className={`dk${k.alert?" alert":""}`} key={i}><div className="dk-v">{k.v}</div><div className="dk-l">{k.l}</div></div>)}
            </div>

            <div className="dash-tools">
              <div className="dash-search">
                <span className="si">🔍</span>
                <input value={q} onChange={e=>setQ(e.target.value)} placeholder="ابحث بالعنوان أو التاريخ أو رقم الاجتماع..."/>
              </div>
              <div className="dash-filters">
                {chips.map(([id,lbl,n])=><button key={id} className={`fchip${filter===id?" active":""}`} onClick={()=>setFilter(id)}>{lbl}<span className="fc-n">{n}</span></button>)}
              </div>
            </div>

            {showPriority&&priority.length>0&&<>
              <div className="dash-sec">{isAdmin?`بانتظار الاعتماد (${priority.length})`:`بانتظار رفع مهامك (${priority.length})`}</div>
              {priority.map(m=><Card key={m.id} m={m}/>)}
            </>}

            <div className="dash-sec">{q.trim()||filter!=="all"?`النتائج (${rest.length})`:"جميع المحاضر"}</div>
            {rest.length>0?rest.map(m=><Card key={m.id} m={m}/>):<div className="dash-empty2">لا توجد محاضر مطابقة</div>}
          </>}
      </div>
    </div>
  );
}

/* ── Review Panel ── */
function ReviewPanel({meeting,onApprove,onReject,onClose,pendingDepts=[]}){
  const [note,setNote]=useState("");
  const [mode,setMode]=useState(null);
  const [busy,setBusy]=useState(false);
  const blocked=pendingDepts.length>0;
  const submit=async()=>{setBusy(true);if(mode==="approve")await onApprove(note);else await onReject(note);setBusy(false);};
  return(
    <div className="rv-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="rv-panel">
        <h2>مراجعة المحضر</h2>
        <p className="rv-sub">{meeting.data?.meta?.title||"محضر"} · {meeting.data?.meta?.date||""}</p>
        <div className="rv-info">
          <b>المُعِد:</b> {meeting.createdByEmail}<br/>
          <b>رقم الاجتماع:</b> {meeting.data?.meta?.meetingNo||"—"}<br/>
          <b>المهام:</b> {meeting.data?.departments?.reduce((s,d)=>s+d.tasks.length,0)||0} مهمة
        </div>
        {blocked&&<div style={{background:"var(--red-bg)",color:"var(--red)",border:"1px solid var(--red-bd)",borderRadius:8,padding:"12px 14px",fontSize:12,lineHeight:1.8,marginBottom:16}}>
          <b>⚠ لا يمكن الاعتماد بعد</b><br/>القطاعات التالية لم ترفع مهامها:<br/>{pendingDepts.map(n=><span key={n}>• {n}<br/></span>)}
        </div>}
        {!mode&&<><p style={{fontSize:13,color:"var(--ink-2)"}}>هل تريد اعتماد هذا المحضر أو رفضه؟</p>
          <div className="rv-btns">
            <button className="rv-btn approve" onClick={()=>setMode("approve")} disabled={blocked} style={blocked?{opacity:.4,cursor:"not-allowed"}:{}}>اعتماد ✓</button>
            <button className="rv-btn reject" onClick={()=>setMode("reject")}>رفض ✗</button>
            <button className="rv-btn cancel" onClick={onClose}>إلغاء</button>
          </div></>}
        {mode==="approve"&&<><div className="rv-section"><label>ملاحظة (اختياري)</label>
          <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="أي تعليق للموظف..."/></div>
          <div className="rv-btns">
            <button className="rv-btn approve" onClick={submit} disabled={busy||blocked}>{busy?"...":"تأكيد الاعتماد ✓"}</button>
            <button className="rv-btn cancel" onClick={()=>setMode(null)}>رجوع</button>
          </div></>}
        {mode==="reject"&&<><div className="rv-section"><label>سبب الرفض (اختياري)</label>
          <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="اذكر السبب للموظفين..."/></div>
          <div className="rv-btns">
            <button className="rv-btn reject" onClick={submit} disabled={busy}>{busy?"...":"تأكيد الرفض ✗"}</button>
            <button className="rv-btn cancel" onClick={()=>setMode(null)}>رجوع</button>
          </div></>}
      </div>
    </div>
  );
}

/* ── Form primitives ── */
function Fill({value,onChange,placeholder,className="",latin=false,num=false,multi=false,readOnly=false,...rest}){
  const ref=useRef(null);
  useEffect(()=>{if(multi&&ref.current){ref.current.style.height="auto";ref.current.style.height=ref.current.scrollHeight+"px";}},[value,multi]);
  if(multi)return <textarea ref={ref} className={`fill fill-multi ${className}${readOnly?" readonly":""}`}
    value={value||""} onChange={readOnly?undefined:e=>onChange(e.target.value)} placeholder={placeholder} rows={1} readOnly={readOnly} {...rest}/>;
  return <input className={`fill${latin?" fill-latin":""}${num?" fill-num":""} ${className}${readOnly?" readonly":""}`}
    value={value||""} onChange={readOnly?undefined:e=>onChange(e.target.value)} placeholder={placeholder} readOnly={readOnly} {...rest}/>;
}

function MPill({value,map,order,onChange,readOnly=false,compact=false}){
  const cur=map[value]||map[order[0]];
  return <span className={`mpill ${cur.css}${compact?" compact":""}${readOnly?" ro":""}`}
    onClick={readOnly?undefined:()=>onChange(order[(order.indexOf(value)+1)%order.length])}>{cur.label}</span>;
}

const TASK_MAP={progress:{label:"قيد الإنجاز",css:"progress"},review:{label:"بانتظار الاعتماد",css:"review"},done:{label:"تم الإنجاز",css:"done"},deferred:{label:"مؤجلة",css:"deferred"}};

const ATT_ORDER=["present","remote","absent"];

/* ── Approved stamp ── */
function fmtTs(ts){
  if(!ts)return"";
  const d=new Date((ts.seconds||0)*1000);
  if(isNaN(d.getTime()))return"";
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function ApprovedStamp({where,by,at}){
  return(
    <div className={`approved-stamp ${where==="cover"?"on-cover":"on-close"}`}>
      <div className="as-main">معتمد</div>
      <div className="as-sub">APPROVED ✓</div>
      {(by||at)&&<div className="as-meta">{nameOf(by)}{by&&at?" · ":""}{fmtTs(at)}</div>}
    </div>
  );
}

/* ── Dept Card ── */
function DeptCard({st,u,setState,di,readOnly,deptStatus}){
  const d=st.departments[di];
  if(!d)return null;
  const done=d.tasks.filter(t=>t.status==="done").length;
  const submitted=deptStatus&&deptStatus[d.id]==="submitted";
  return(
    <div className="dcard">
      <div className="dcard-head">
        <span className="code">{d.code}</span>
        <div className="dname"><span className="n">{d.name}</span><span className="director">{d.director}</span></div>
        <div className="progress" style={{display:"flex",alignItems:"center",gap:6}}>
          {submitted&&<span style={{fontSize:9,background:"var(--ok-bg)",color:"var(--ok)",border:"1px solid var(--ok-bd)",padding:"2px 6px",borderRadius:4,fontWeight:600}}>✓ تم الرفع</span>}
          {done}/{d.tasks.length}
        </div>
      </div>
      <div className="dtasks">
        {d.tasks.map((t,ti)=>(
          <div className={`dtask${t.status==="done"?" st-done":""}`} key={ti}>
            <div className="tnum">{String(ti+1).padStart(2,"0")}</div>
            <div className="tbody"><Fill multi value={t.task} onChange={v=>u(`departments.${di}.tasks.${ti}.task`,v)} placeholder="وصف المهمة" readOnly={readOnly}/></div>
            <div className="tmeta"><MPill value={t.status} map={TASK_MAP} order={TASK_ORDER} onChange={v=>u(`departments.${di}.tasks.${ti}.status`,v)} readOnly={readOnly} compact/></div>
            {!readOnly&&<span className="tdel" onClick={()=>setState(s=>{const c=JSON.parse(JSON.stringify(s));c.departments[di].tasks.splice(ti,1);return c;})}>×</span>}
          </div>
        ))}
        {!readOnly&&<button className="dcard-add" onClick={()=>setState(s=>{const c=JSON.parse(JSON.stringify(s));c.departments[di].tasks.push({task:"",status:"progress"});return c;})}>+ إضافة مهمة</button>}
      </div>
    </div>
  );
}

function Legend({st}){
  const all=st.departments.flatMap(d=>d.tasks);
  const c={done:all.filter(t=>t.status==="done").length,progress:all.filter(t=>t.status==="progress").length,review:all.filter(t=>t.status==="review").length,deferred:all.filter(t=>t.status==="deferred").length};
  return(
    <div className="status-legend">
      <span className="total">إجمالي المهام <b>{String(all.length).padStart(2,"0")}</b></span>
      <span className="leg done"><span className="dot"/>{" "}تم الإنجاز <b>{c.done}</b></span>
      <span className="leg progress"><span className="dot"/>{" "}قيد الإنجاز <b>{c.progress}</b></span>
      <span className="leg review"><span className="dot"/>{" "}بانتظار الاعتماد <b>{c.review}</b></span>
      <span className="leg deferred"><span className="dot"/>{" "}مؤجلة <b>{c.deferred}</b></span>
    </div>
  );
}

/* ── Task pages (3 & 4) ── */
function PageTasks({st,u,setState,page,deptIndices,secNo,part,showLegend,readOnly,userDept,deptStatus}){
  const m=st.meta;
  return(
    <Pg st={st} page={page}>
      <Sec no={secNo} label="مهام الإدارات والمتابعة الأسبوعية" en={`Dept Tasks · ${part}`} first/>
      {showLegend?<Legend st={st}/>:<div className="meta-strip" style={{marginBottom:8,marginTop:2}}><span>// CONTINUED · {part}</span><div className="dots"/><span>{m.docId} · {m.date}</span></div>}
      <div className="depts">
        {deptIndices.map(di=>{
          const dept=st.departments[di];
          const cardReadOnly=readOnly||(userDept&&dept.id!==userDept.id)||(userDept&&deptStatus&&deptStatus[dept.id]==="submitted");
          return <DeptCard key={di} st={st} u={u} setState={setState} di={di} readOnly={!!cardReadOnly} deptStatus={deptStatus}/>;
        })}
      </div>
    </Pg>
  );
}

/* ── Page 5: Closing ── */
function PageClosing({st,u,readOnly,approved,reviewBy,reviewAt}){
  const m=st.meta;
  const all=st.departments.flatMap(d=>d.tasks);
  const pct=all.length?Math.round(all.filter(t=>t.status==="done").length/all.length*100):0;
  return(
    <Pg st={st} page={5}>
      <Sec no="05" label="ملخص المتابعة والاعتماد" en="Follow-up Summary & Approval" first/>
      <Legend st={st}/>
      <div className="notes-block">
        <div className="nb-head"><span className="dot"/><span className="lbl">// ملاحظات إضافية — Additional Notes</span></div>
        <textarea value={st.notes||""} onChange={readOnly?undefined:e=>u("notes",e.target.value)} placeholder="أي ملاحظات أو نقاط للمتابعة..." readOnly={readOnly}/>
      </div>
      <div className="next-bar">
        <div>
          <div className="eyebrow">// Next Meeting · الاجتماع القادم</div>
          <Fill className="val" value={st.nextMeeting} onChange={v=>u("nextMeeting",v)} placeholder="التاريخ والوقت" style={{color:"#fff",fontSize:14,fontWeight:700}} readOnly={readOnly}/>
        </div>
        <div className="right">إنجاز الأسبوع · {pct}%</div>
      </div>
      <div className="signoff-mom" style={{display:"grid",gridTemplateColumns:approved?"1fr auto":"1fr",gap:14,alignItems:"center"}}>
        <div className="sign" style={{minHeight:140}}>
          <div className="label">// Chair · رئيس الاجتماع</div>
          <div className="name">{m.chair||"—"}</div>
          <div className="role">الرئيس التنفيذي · شركة مسقا للاستثمار</div>
          <div className="sig-line"/>
        </div>
        {approved&&<div style={{textAlign:"center"}}><ApprovedStamp where="close" by={reviewBy} at={reviewAt}/></div>}
      </div>
    </Pg>
  );
}

/* ── Editor ── */
function Editor({user,meetingDoc,onBack,userDept}){
  const isAdmin=user?.email===ADMIN_EMAIL;
  const isViewer=!isAdmin&&!userDept; // CEO / observer / any account not mapped to a dept → read-only
  const [data,setData]=useState(()=>{
    const base=BLANK();
    const saved=meetingDoc.data||{};
    return {...base,...saved,
      meta:{...base.meta,...(saved.meta||{})},
      attendees:Array.isArray(saved.attendees)?saved.attendees:base.attendees,
      departments:mergeDeptTasks(saved,meetingDoc.deptTasks),
      notes:saved.notes||"",nextMeeting:saved.nextMeeting||"",
    };
  });
  const [status,setStatus]=useState(meetingDoc.status||"draft");
  const [deptStatus,setDeptStatus]=useState(meetingDoc.deptStatus||BLANK_DEPT_STATUS());
  const [saveStatus,setSaveStatus]=useState("");
  const [showReview,setShowReview]=useState(false);
  const [rejectNote,setRejectNote]=useState(meetingDoc.rejectNote||"");
  const [review,setReview]=useState({by:meetingDoc.reviewedBy||"",at:meetingDoc.reviewedAt||null});
  const editingRef=useRef(0); // timestamp of last local edit (protects admin's unsaved task edits from live-sync clobber)
  const docRef=db.collection("meetings").doc(meetingDoc.id);

  // Real-time sync: status, deptStatus, all depts' tasks, and (for dept users) admin's meta/attendance
  useEffect(()=>{
    return docRef.onSnapshot(snap=>{
      if(!snap.exists)return;
      const d=snap.data();
      if(d.deptStatus) setDeptStatus(d.deptStatus);
      if(d.status) setStatus(d.status);
      if(d.reviewedBy||d.reviewedAt) setReview({by:d.reviewedBy||"",at:d.reviewedAt||null});
      setData(prev=>{
        const merged=mergeDeptTasks(d.data,d.deptTasks);
        // admin edits any dept's tasks → keep local copy while actively editing (within 5s of last keystroke)
        const adminEditing=!userDept&&(Date.now()-editingRef.current<5000)&&Array.isArray(prev.departments);
        // keep own dept's tasks local while typing (don't clobber unsaved edits)
        const departments=adminEditing?prev.departments:merged.map(md=>{
          if(userDept && md.id===userDept.id){
            const local=Array.isArray(prev.departments)?prev.departments.find(x=>x.id===md.id):null;
            return local?{...md,tasks:local.tasks}:md;
          }
          return md;
        });
        // dept users see admin's meta/attendance updates; admin keeps its own local edits
        const meta=userDept?{...prev.meta,...(d.data?.meta||{})}:prev.meta;
        const attendees=userDept&&Array.isArray(d.data?.attendees)?d.data.attendees:prev.attendees;
        const notes=userDept?(d.data?.notes||prev.notes):prev.notes;
        return {...prev,meta,attendees,notes,departments};
      });
    });
  },[]);

  const deptSubmitted=userDept?deptStatus[userDept.id]==="submitted":false;
  const readOnly=isViewer?true:(isAdmin?(status==="approved"):(status==="approved"||deptSubmitted));

  const saveToDB=useCallback(async d=>{
    setSaveStatus("جاري الحفظ...");
    try{
      const ts=firebase.firestore.FieldValue.serverTimestamp();
      if(userDept){
        // Each dept writes ONLY its own key in the deptTasks map — no conflicts, no races
        const deptId=userDept.id;
        const localTasks=Array.isArray(d.departments)
          ?(d.departments.find(dep=>dep.id===deptId)||{}).tasks||[]
          :[];
        await docRef.update({['deptTasks.'+deptId]:localTasks,updatedAt:ts});
      } else {
        // Admin: save meta/attendance/notes AND department tasks (admin may fill tasks on behalf of depts)
        const deptTasksMap={};
        (Array.isArray(d.departments)?d.departments:[]).forEach(dep=>{ if(dep&&dep.id) deptTasksMap[dep.id]=dep.tasks||[]; });
        await docRef.update({
          'data.meta':d.meta||{},
          'data.attendees':d.attendees||[],
          'data.notes':d.notes||'',
          'data.nextMeeting':d.nextMeeting||'',
          deptTasks:deptTasksMap,
          updatedAt:ts,
        });
      }
      setSaveStatus("تم الحفظ ✓");setTimeout(()=>setSaveStatus(""),2000);
    }catch(e){console.error(e);setSaveStatus("خطأ في الحفظ: "+(e.message||""));}
  },[userDept]);
  const debouncedSave=useDebounce(saveToDB,1500);

  const update=(path,val)=>{
    if(readOnly)return;
    editingRef.current=Date.now();
    setData(s=>{
      const copy=JSON.parse(JSON.stringify(s));
      const parts=path.split(".");let cur=copy;
      for(let i=0;i<parts.length-1;i++){const k=parts[i];cur=cur[k.match(/^\d+$/)?Number(k):k];}
      const last=parts[parts.length-1];cur[last.match(/^\d+$/)?Number(last):last]=val;
      debouncedSave(copy);return copy;
    });
  };
  const updateState=fn=>{if(readOnly)return;editingRef.current=Date.now();setData(s=>{const next=fn(s);debouncedSave(next);return next;});};

  const submitForApproval=async()=>{
    const pending=DEPT_IDS.filter(id=>deptStatus[id]!=="submitted");
    if(pending.length){
      alert("لا يمكن إرسال المحضر للاعتماد قبل أن ترفع جميع القطاعات مهامها.\n\nالقطاعات التي لم ترفع بعد:\n• "+pending.map(id=>DEPT_LABELS[id]).join("\n• "));
      return;
    }
    if(!confirm("إرسال المحضر للاعتماد؟ لن تتمكن من التعديل بعد الإرسال."))return;
    await docRef.update({status:"pending",submittedAt:firebase.firestore.FieldValue.serverTimestamp()});
    setStatus("pending");
  };
  const submitDept=async()=>{
    if(!confirm(`رفع مهام ${userDept.name} للاعتماد؟ لن تتمكن من التعديل بعد الرفع.`))return;
    const next={...deptStatus,[userDept.id]:"submitted"};
    await docRef.update({deptStatus:next,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
    setDeptStatus(next);
  };
  const handleApprove=async note=>{
    const missing=DEPT_IDS.filter(id=>deptStatus[id]!=="submitted");
    if(missing.length){
      alert("لا يمكن اعتماد المحضر قبل أن ترفع جميع القطاعات مهامها.\n\nالقطاعات التي لم ترفع بعد:\n• "+missing.map(id=>DEPT_LABELS[id]).join("\n• "));
      return;
    }
    await docRef.update({status:"approved",reviewNote:note||"",reviewedAt:firebase.firestore.FieldValue.serverTimestamp(),reviewedBy:user.email});
    setStatus("approved");setReview({by:user.email,at:{seconds:Date.now()/1000}});setShowReview(false);
  };
  const handleReject=async note=>{
    // Reopen all departments so dept users can fix and re-submit
    const reset=BLANK_DEPT_STATUS();
    await docRef.update({status:"rejected",rejectNote:note||"",deptStatus:reset,reviewedAt:firebase.firestore.FieldValue.serverTimestamp(),reviewedBy:user.email});
    setStatus("rejected");setRejectNote(note||"");setDeptStatus(reset);setShowReview(false);
  };
  // Admin override: approve directly even if some departments haven't submitted
  const adminForceApprove=async()=>{
    const missing=DEPT_IDS.filter(id=>deptStatus[id]!=="submitted");
    const msg=missing.length
      ?"اعتماد المحضر مباشرةً رغم أن القطاعات التالية لم ترفع مهامها:\n• "+missing.map(id=>DEPT_LABELS[id]).join("\n• ")+"\n\nتأكيد الاعتماد الإداري؟"
      :"اعتماد المحضر مباشرةً؟";
    if(!confirm(msg))return;
    await docRef.update({status:"approved",reviewNote:"اعتماد إداري (تجاوز)",reviewedAt:firebase.firestore.FieldValue.serverTimestamp(),reviewedBy:user.email});
    setStatus("approved");setReview({by:user.email,at:{seconds:Date.now()/1000}});
  };

  const canSubmit=isAdmin&&(status==="draft"||status==="rejected");
  const missingCount=DEPT_IDS.filter(id=>deptStatus[id]!=="submitted").length;
  const canForceApprove=isAdmin&&(status==="draft"||status==="rejected"||status==="pending")&&missingCount>0;
  return <>
    <TopNav user={user} docStatus={status} saveStatus={saveStatus} onBack={onBack}
      onSubmit={canSubmit?submitForApproval:null}
      onReview={isAdmin&&status==="pending"?()=>setShowReview(true):null}
      onDeptSubmit={userDept&&!isAdmin?submitDept:null}
      deptSubmitted={deptSubmitted} userDept={userDept}
      deptProgress={isAdmin&&status!=="approved"?{done:DEPT_IDS.filter(id=>deptStatus[id]==="submitted").length,total:TOTAL}:null}
      onForceApprove={canForceApprove?adminForceApprove:null}
      pendingCount={0}/>
    {status==="rejected"&&rejectNote&&(
      <div className="reject-banner" style={{position:"fixed",top:48,insetInline:0,zIndex:150,
        background:"var(--red-bg)",color:"var(--red)",padding:"10px 20px",
        fontFamily:"var(--latin)",fontSize:12,direction:"rtl",display:"flex",alignItems:"center",gap:10}}>
        <b>سبب الرفض:</b> {rejectNote}
        {!readOnly&&<span style={{marginInlineStart:"auto",opacity:.6}}>يمكنك التعديل والإعادة</span>}
      </div>
    )}
    {status==="approved"&&(
      <div className="approved-banner" style={{position:"fixed",top:48,insetInline:0,zIndex:150,
        background:"var(--ok-bg)",color:"var(--ok)",padding:"8px 20px",
        fontFamily:"var(--ar)",fontSize:12,direction:"rtl",display:"flex",alignItems:"center",gap:10,borderBottom:"1px solid var(--ok-bd)"}}>
        <span className="lock-note">🔒 محضر معتمد ومقفل — لا يمكن التعديل</span>
        {review.by&&<span style={{marginInlineStart:"auto",opacity:.8,fontFamily:"var(--ar)",fontWeight:600}}>اعتمده: {nameOf(review.by)} · {fmtTs(review.at)}</span>}
      </div>
    )}
    <div className="stage" style={{marginTop:(status==="rejected"&&rejectNote)||status==="approved"?38:0}}>
      <Cover st={data} u={update} readOnly={readOnly||!!userDept} approved={status==="approved"} reviewBy={review.by} reviewAt={review.at}/>
      <PageInfo st={data} u={update} readOnly={readOnly||!!userDept}/>
      <PageTasks st={data} u={update} setState={updateState} page={3} deptIndices={[0,1]} secNo="03" part="جزء 1/2" showLegend readOnly={readOnly} userDept={userDept} deptStatus={deptStatus}/>
      <PageTasks st={data} u={update} setState={updateState} page={4} deptIndices={[2,3,4]} secNo="04" part="جزء 2/2" readOnly={readOnly} userDept={userDept} deptStatus={deptStatus}/>
      <PageClosing st={data} u={update} readOnly={readOnly||!!userDept} approved={status==="approved"} reviewBy={review.by} reviewAt={review.at}/>
    </div>
    {showReview&&<ReviewPanel meeting={{...meetingDoc,data,status}} onApprove={handleApprove} onReject={handleReject} onClose={()=>setShowReview(false)} pendingDepts={DEPT_IDS.filter(id=>deptStatus[id]!=="submitted").map(id=>DEPT_LABELS[id])}/>}
  </>;
}

/* ── App ── */
function App(){
  const [user,setUser]=useState(undefined);
  const [meetings,setMeetings]=useState([]);
  const [currentDoc,setCurrentDoc]=useState(null);

  useEffect(()=>auth.onAuthStateChanged(u=>setUser(u||null)),[]);

  useEffect(()=>{
    if(!user)return;
    // All authenticated users see all meetings
    return db.collection("meetings").onSnapshot(snap=>{
      const docs=snap.docs.map(d=>({id:d.id,...d.data()}));
      docs.sort((a,b)=>(b.updatedAt?.seconds||0)-(a.updatedAt?.seconds||0));
      setMeetings(docs);
    },err=>{console.error(err);if(err.code==="permission-denied")alert("خطأ في الصلاحيات — تأكد من إعدادات Firestore.");});
  },[user]);

  const createNew=async()=>{
    const blank=BLANK();
    // Carry over unfinished tasks (status !== "done") from the most recent approved meeting
    const prev=meetings.find(m=>m.status==="approved");
    const carried=BLANK_DEPT_TASKS();
    let carriedCount=0;
    if(prev){
      mergeDeptTasks(prev.data,prev.deptTasks).forEach(d=>{
        const open=(d.tasks||[]).filter(t=>t.status!=="done"&&(t.task||"").trim());
        carried[d.id]=open.map(t=>({task:t.task,status:t.status||"progress"}));
        carriedCount+=open.length;
      });
    }
    if(carriedCount&&!confirm(`سيتم ترحيل ${carriedCount} مهمة غير منجزة من المحضر السابق المعتمد إلى المحضر الجديد.\n\nمتابعة؟`)){
      // user can opt out of carry-over → start clean
      Object.keys(carried).forEach(k=>carried[k]=[]);
    }
    try{
      const ref=await db.collection("meetings").add({
        data:blank,status:"draft",
        deptStatus:BLANK_DEPT_STATUS(),
        deptTasks:carried,
        createdBy:user.uid,createdByEmail:user.email,
        updatedAt:firebase.firestore.FieldValue.serverTimestamp(),submittedAt:null,
      });
      setCurrentDoc({id:ref.id,data:blank,status:"draft",deptStatus:BLANK_DEPT_STATUS(),deptTasks:carried,createdBy:user.uid,createdByEmail:user.email});
    }catch(err){alert("خطأ في إنشاء المحضر:\n"+err.message);}
  };

  const userDept=DEPT_MAP[user?.email]||null;

  if(user===undefined)return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--navy)",color:"#fff",fontFamily:"var(--latin)"}}>جاري التحميل...</div>;
  if(!user)return <AuthScreen/>;
  if(currentDoc)return <Editor user={user} meetingDoc={currentDoc} onBack={()=>setCurrentDoc(null)} userDept={userDept}/>;

  const pendingCount=meetings.filter(m=>m.status==="pending").length;
  return <>
    <TopNav user={user} pendingCount={pendingCount}/>
    <Dashboard user={user} meetings={meetings} onNew={createNew} onOpen={m=>setCurrentDoc(m)}/>
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
