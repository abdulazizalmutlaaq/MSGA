<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>MSGA — نظام محاضر الاجتماعات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#10375C; --navy-deep:#0A2540; --navy-tint:#E8EEF5;
  --orange:#FF7E2A; --orange-soft:#FFE4D2;
  --gold:#F2C523; --gold-soft:#FCEFB4;
  --ink:#1E1E1E; --ink-2:#3A3A3A; --ink-3:#6B6B6B; --ink-4:#9CA3AF;
  --paper:#fff; --paper-2:#F7F7F7; --paper-3:#EFEFEC;
  --line:#DCDFE4; --line-2:#E8EAEE;
  --page-w:210mm; --page-h:297mm; --margin-x:14mm; --margin-y:14mm;
  --ar:"IBM Plex Sans Arabic",system-ui,sans-serif;
  --mono:"IBM Plex Mono",ui-monospace,monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;font-family:var(--ar);color:var(--ink);-webkit-font-smoothing:antialiased;}
body{direction:rtl;background:var(--paper-3);}

/* ── AUTH ── */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--navy);
  background-image:radial-gradient(circle at 1px 1px,rgba(255,255,255,.04) 1px,transparent 1px);
  background-size:20px 20px;}
.auth-card{background:#fff;width:380px;padding:40px;direction:rtl;}
.auth-logo{height:52px;display:block;margin:0 auto 24px;}
.auth-title{font-size:22px;font-weight:700;color:var(--navy);text-align:center;margin:0 0 4px;}
.auth-sub{font-size:11px;color:var(--ink-3);text-align:center;margin:0 0 28px;font-family:var(--mono);letter-spacing:.08em;}
.auth-field{margin-bottom:16px;}
.auth-field label{display:block;font-size:11.5px;font-weight:600;color:var(--ink-2);margin-bottom:6px;}
.auth-field input{width:100%;padding:10px 12px;border:1.5px solid var(--line);
  font-family:var(--ar);font-size:13px;outline:none;background:var(--paper-2);
  direction:ltr;text-align:start;transition:border .15s;}
.auth-field input:focus{border-color:var(--navy);background:#fff;}
.auth-btn{width:100%;padding:12px;background:var(--navy);color:#fff;border:none;
  font-family:var(--ar);font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;}
.auth-btn:hover{background:var(--navy-deep);}
.auth-btn:disabled{opacity:.5;cursor:default;}
.auth-err{background:#FCE5DE;color:#B23A1F;padding:10px 12px;font-size:12px;margin-top:12px;}

/* ── TOP NAV ── */
.top-nav{position:fixed;top:0;inset-inline:0;z-index:200;background:var(--ink);color:#fff;
  display:flex;align-items:center;gap:6px;padding:0 14px;height:48px;
  font-family:var(--mono);font-size:11px;direction:ltr;}
.top-nav .tn-brand{display:flex;align-items:center;gap:8px;
  padding-inline-end:12px;border-inline-end:1px solid rgba(255,255,255,.15);}
.top-nav .tn-brand::before{content:"";width:8px;height:8px;background:var(--orange);}
.tn-spacer{flex:1;}
.tn-user{font-size:10px;color:rgba(255,255,255,.55);direction:rtl;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tn-btn{background:transparent;color:#fff;border:none;font:inherit;padding:6px 10px;
  cursor:pointer;display:flex;align-items:center;gap:5px;opacity:.8;}
.tn-btn:hover{opacity:1;background:rgba(255,255,255,.1);}
.tn-btn.orange{background:var(--orange);opacity:1;}
.tn-btn.orange:hover{background:#e06820;}
.tn-btn.green{background:#1F6B3E;opacity:1;}
.tn-btn.green:hover{background:#175530;}
.tn-sep{width:1px;height:20px;background:rgba(255,255,255,.15);margin:0 2px;}
.tn-status{font-size:9.5px;padding:3px 10px;border-radius:999px;white-space:nowrap;}
.tn-status.draft{background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);}
.tn-status.pending{background:var(--gold);color:#1E1E1E;}
.tn-status.approved{background:#1F6B3E;color:#fff;}
.tn-status.rejected{background:#B23A1F;color:#fff;}
.tn-save{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:.06em;}
.tn-badge{background:var(--orange);color:#fff;font-size:9px;font-weight:700;
  width:16px;height:16px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;margin-inline-start:4px;}

/* ── DASHBOARD ── */
.dash{min-height:100vh;padding:72px 0 60px;background:var(--paper-3);}
.dash-inner{max-width:760px;margin:0 auto;padding:32px 24px;}
.dash-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;}
.dash-top h1{margin:0 0 4px;font-size:22px;font-weight:700;color:var(--navy);}
.dash-top p{margin:0;font-size:12px;color:var(--ink-3);}
.dash-new{display:inline-flex;align-items:center;gap:8px;background:var(--navy);color:#fff;
  border:none;font-family:var(--ar);font-size:13px;font-weight:600;padding:10px 20px;cursor:pointer;}
.dash-new:hover{background:var(--navy-deep);}
.dash-sec{font-family:var(--mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--ink-3);padding-bottom:8px;border-bottom:1px solid var(--line);margin:20px 0 12px;}
.m-card{background:#fff;border:1px solid var(--line);display:grid;
  grid-template-columns:8px 1fr auto;align-items:center;gap:14px;
  padding:14px 18px;cursor:pointer;transition:box-shadow .15s,border-color .15s;}
.m-card:hover{box-shadow:0 2px 12px rgba(16,55,92,.1);border-color:var(--navy);}
.m-card+.m-card{margin-top:8px;}
.m-card .mc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.mc-dot.draft{background:var(--ink-4);}
.mc-dot.pending{background:var(--gold);}
.mc-dot.approved{background:#1F6B3E;}
.mc-dot.rejected{background:#B23A1F;}
.m-card .mc-title{font-size:13.5px;font-weight:600;color:var(--ink);margin-bottom:3px;}
.m-card .mc-meta{font-size:11px;color:var(--ink-3);font-family:var(--mono);}
.mc-badge{font-family:var(--mono);font-size:9px;padding:3px 10px;border-radius:999px;white-space:nowrap;}
.mc-badge.draft{background:var(--paper-2);color:var(--ink-3);border:1px solid var(--line);}
.mc-badge.pending{background:var(--gold-soft);color:#8B5E00;border:1px solid var(--gold);}
.mc-badge.approved{background:#DCEFE2;color:#1F6B3E;border:1px solid #1F6B3E;}
.mc-badge.rejected{background:#FCE5DE;color:#B23A1F;border:1px solid #B23A1F;}
.dash-empty{text-align:center;padding:60px 20px;color:var(--ink-3);}
.dash-empty .de-icon{font-size:36px;margin-bottom:12px;}
.dash-empty p{font-size:13px;}

/* ── REVIEW PANEL ── */
.rv-overlay{position:fixed;inset:0;z-index:400;background:rgba(16,55,92,.75);
  display:flex;align-items:center;justify-content:center;padding:20px;}
.rv-panel{background:#fff;width:500px;max-height:85vh;overflow-y:auto;padding:32px;direction:rtl;}
.rv-panel h2{margin:0 0 4px;font-size:20px;color:var(--navy);}
.rv-panel .rv-sub{font-size:11px;color:var(--ink-3);font-family:var(--mono);margin-bottom:24px;}
.rv-section{margin-bottom:16px;}
.rv-section label{display:block;font-size:11px;font-weight:600;color:var(--ink-2);margin-bottom:6px;}
.rv-section textarea{width:100%;padding:10px 12px;border:1.5px solid var(--line);
  font-family:var(--ar);font-size:13px;resize:vertical;min-height:80px;outline:none;}
.rv-section textarea:focus{border-color:var(--navy);}
.rv-info{background:var(--paper-2);border:1px solid var(--line);padding:12px 14px;
  font-size:12px;line-height:1.7;margin-bottom:16px;}
.rv-info b{color:var(--navy);}
.rv-btns{display:flex;gap:10px;margin-top:20px;}
.rv-btn{flex:1;padding:12px;border:none;font-family:var(--ar);font-size:13px;font-weight:600;cursor:pointer;}
.rv-btn.approve{background:#1F6B3E;color:#fff;}
.rv-btn.approve:hover{background:#175530;}
.rv-btn.reject{background:#B23A1F;color:#fff;}
.rv-btn.reject:hover{background:#922f18;}
.rv-btn.cancel{background:var(--paper-2);color:var(--ink-2);border:1px solid var(--line);flex:0 0 auto;padding:12px 20px;}
.rv-note-box{background:var(--orange-soft);border:1px solid var(--orange);padding:12px 14px;
  font-size:12px;color:#B33D00;margin-bottom:16px;}

/* ── PAGES / FORM (unchanged from original) ── */
.stage{min-height:100vh;padding:72px 16px 80px;display:flex;flex-direction:column;align-items:center;gap:28px;}
.page{width:var(--page-w);height:var(--page-h);background:var(--paper);position:relative;
  overflow:hidden;box-shadow:0 1px 2px rgba(16,55,92,.04),0 8px 24px rgba(16,55,92,.08);
  page-break-after:always;break-after:page;display:flex;flex-direction:column;}
.page:last-of-type{page-break-after:auto;}
.watermark{position:absolute;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(circle at 1px 1px,rgba(16,55,92,.045) 1px,transparent 1px);
  background-size:14px 14px;}
.watermark::after{content:"";position:absolute;inset:0;
  background-image:url("assets/msga-logo.png");background-repeat:no-repeat;
  background-position:center 60%;background-size:60% auto;opacity:.025;filter:grayscale(1);}
.page-inner{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;
  padding:var(--margin-y) var(--margin-x);gap:0;}
.head{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:14px;
  padding-bottom:10px;border-bottom:1.5px solid var(--ink);margin-bottom:12px;}
.head .logo{height:44px;width:auto;display:block;}
.head .titles{display:flex;flex-direction:column;gap:2px;}
.head .eyebrow{font-family:var(--mono);font-size:9px;letter-spacing:.14em;color:var(--ink-3);text-transform:uppercase;}
.head .doctitle{font-size:14px;font-weight:600;color:var(--navy);letter-spacing:-.01em;}
.head .doc-meta{text-align:left;font-family:var(--mono);font-size:9.5px;color:var(--ink-3);line-height:1.55;direction:ltr;}
.head .doc-meta b{color:var(--ink);font-weight:600;}
.foot{position:absolute;bottom:8mm;inset-inline:var(--margin-x);display:flex;align-items:center;
  justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--ink-3);
  letter-spacing:.08em;border-top:1px solid var(--line);padding-top:6px;z-index:2;}
.foot .brand-mark{display:flex;align-items:center;gap:6px;}
.foot .brand-mark::before{content:"";display:inline-block;width:6px;height:6px;background:var(--orange);}
.foot .pagenum b{color:var(--ink);font-weight:600;}
.sec-head{display:flex;align-items:center;gap:10px;margin:16px 0 10px;}
.sec-head .num{font-family:var(--mono);font-size:10px;font-weight:500;background:var(--navy);color:#fff;padding:3px 7px;letter-spacing:.08em;}
.sec-head .icon{width:22px;height:22px;display:grid;place-items:center;background:var(--navy-tint);color:var(--navy);border-radius:2px;}
.sec-head .icon svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.6;}
.sec-head h2{margin:0;font-size:15px;font-weight:700;color:var(--ink);letter-spacing:-.01em;}
.sec-head .en{font-family:var(--mono);font-size:9px;color:var(--ink-4);letter-spacing:.18em;text-transform:uppercase;margin-inline-start:auto;}
.sec-head .rule{flex:1;height:1px;background:var(--line);margin-inline-start:8px;}
.hero{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:end;
  border-bottom:1px solid var(--line);padding-bottom:12px;margin-top:4px;}
.hero .kicker{font-family:var(--mono);font-size:9.5px;letter-spacing:.22em;color:var(--orange);text-transform:uppercase;margin-bottom:6px;}
.hero h1{margin:0;font-size:38px;font-weight:700;line-height:1.05;color:var(--navy);letter-spacing:-.02em;}
.hero h1 .arrow{color:var(--orange);font-weight:600;}
.hero .subtitle{margin-top:8px;font-size:13px;color:var(--ink-3);max-width:70%;line-height:1.55;}
.hero .stamp{font-family:var(--mono);font-size:9px;border:1px solid var(--navy);color:var(--navy);
  padding:6px 10px;letter-spacing:.1em;text-transform:uppercase;direction:ltr;line-height:1.4;
  text-align:center;display:flex;flex-direction:column;gap:2px;}
.hero .stamp b{font-weight:600;font-size:11px;}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);margin-top:14px;border:1px solid var(--line);background:var(--paper-2);}
.kpi{padding:12px 12px 10px;border-inline-end:1px solid var(--line);display:flex;flex-direction:column;gap:4px;}
.kpi:last-child{border-inline-end:none;}
.kpi .label{font-family:var(--mono);font-size:8.5px;letter-spacing:.16em;color:var(--ink-3);text-transform:uppercase;}
.kpi .val{font-family:var(--mono);font-size:22px;font-weight:600;color:var(--navy);line-height:1;direction:ltr;text-align:start;}
.kpi .sub{font-size:10px;color:var(--ink-3);}
.info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:0;border:1px solid var(--line);margin-top:4px;}
.info-row{display:grid;grid-template-columns:130px 1fr;border-bottom:1px solid var(--line);border-inline-end:1px solid var(--line);min-height:38px;}
.info-row:nth-child(2n){border-inline-end:none;}
.info-row:nth-last-child(-n+2){border-bottom:none;}
.info-row .k{background:var(--paper-2);padding:8px 10px;display:flex;align-items:center;gap:8px;font-size:11px;color:var(--ink-2);font-weight:500;border-inline-end:1px solid var(--line);}
.info-row .k svg{width:12px;height:12px;color:var(--navy);}
.info-row .v{padding:8px 10px;display:flex;align-items:center;font-size:12px;color:var(--ink);}
.fill{border:none;outline:none;background:transparent;width:100%;font:inherit;color:inherit;
  padding:2px 0;border-bottom:1px dashed transparent;transition:border .15s,background .15s;}
.fill:hover{border-bottom-color:var(--line);}
.fill:focus{border-bottom-color:var(--orange);background:linear-gradient(to top,rgba(255,126,42,.06),transparent);}
.fill::placeholder{color:var(--ink-4);font-weight:300;}
.fill.readonly{pointer-events:none;opacity:.8;}
.fill-mono{font-family:var(--mono);}
.fill-num{font-family:var(--mono);direction:ltr;text-align:start;}
.fill-multi{resize:none;overflow:hidden;display:block;font-family:inherit;line-height:1.45;min-height:16px;border-bottom:1px dashed transparent;}
.fill-multi:hover{border-bottom-color:var(--line);}
.fill-multi:focus{border-bottom-color:var(--orange);background:linear-gradient(to top,rgba(255,126,42,.06),transparent);}
.attendees{margin-top:14px;border:1px solid var(--line);}
.attendees-head{display:grid;grid-template-columns:28px 1fr 140px 90px 60px;background:var(--navy);color:#fff;font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;}
.attendees-head>div{padding:7px 10px;border-inline-end:1px solid rgba(255,255,255,.15);}
.attendees-head>div:last-child{border-inline-end:none;}
.attendee-row{display:grid;grid-template-columns:28px 1fr 140px 90px 60px;border-bottom:1px solid var(--line);font-size:11.5px;min-height:32px;}
.attendee-row:last-child{border-bottom:none;}
.attendee-row>div{padding:6px 10px;border-inline-end:1px solid var(--line);display:flex;align-items:center;}
.attendee-row>div:last-child{border-inline-end:none;justify-content:center;}
.attendee-row .idx{font-family:var(--mono);font-size:10px;color:var(--ink-4);justify-content:center;padding:6px 0;}
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;border:1px solid currentColor;border-radius:999px;white-space:nowrap;}
.pill::before{content:"";width:5px;height:5px;border-radius:50%;background:currentColor;}
.pill.present{color:var(--navy);background:var(--navy-tint);}
.pill.absent{color:#B23A1F;background:#FCE5DE;}
.pill.remote{color:#8B5E00;background:var(--gold-soft);}
.pill.compact{font-size:9.5px;padding:3px 9px;}
.pill.compact::before{width:5px;height:5px;}
.pill.st-done{color:#1F6B3E;background:#DCEFE2;border-color:transparent;}
.pill.st-progress{color:#B33D00;background:var(--orange-soft);border-color:transparent;}
.pill.st-review{color:#8B5E00;background:var(--gold-soft);border-color:transparent;}
.pill.st-deferred{color:var(--ink-3);background:var(--paper-3);border-color:transparent;}
.add-row{display:flex;align-items:center;gap:6px;background:transparent;border:1px dashed var(--line);
  color:var(--ink-3);font-family:var(--ar);font-size:11px;padding:6px 10px;cursor:pointer;width:100%;justify-content:center;transition:all .15s;}
.add-row:hover{border-color:var(--orange);color:var(--orange);background:var(--orange-soft);}
.add-row::before{content:"+";font-family:var(--mono);font-weight:700;}
.meta-strip{display:flex;justify-content:space-between;align-items:center;margin-top:6px;
  font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--ink-3);text-transform:uppercase;}
.meta-strip .dots{flex:1;border-bottom:1px dotted var(--line);margin:0 10px;}
.depts{display:flex;flex-direction:column;gap:7px;margin-top:4px;}
.dept{border:1px solid var(--line);background:#fff;display:flex;flex-direction:column;}
.dept-head{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:8px;
  padding:5px 9px 6px;background:var(--navy);color:#fff;}
.dept-head .code{font-family:var(--mono);font-size:8.5px;letter-spacing:.1em;background:var(--orange);color:#fff;padding:2px 6px;font-weight:600;}
.dept-head .dname{display:flex;align-items:baseline;gap:8px;line-height:1.2;}
.dept-head .dname .n{font-size:11px;font-weight:600;}
.dept-head .dname .director{font-size:9.5px;font-weight:400;color:rgba(255,255,255,.75);}
.dept-head .dname .director::before{content:"•";margin-inline-end:6px;color:rgba(255,255,255,.4);}
.dept-head .progress{font-family:var(--mono);font-size:10.5px;font-weight:600;color:var(--gold);}
.dept-tasks{display:flex;flex-direction:column;}
.dept-task{display:grid;grid-template-columns:28px 1fr 120px 18px;gap:10px;align-items:start;
  padding:8px 12px;border-bottom:1px solid var(--line-2);font-size:11.5px;min-height:34px;}
.dept-task:last-of-type{border-bottom:none;}
.dept-task .tnum{font-family:var(--mono);font-size:10px;color:var(--ink-4);padding-top:4px;text-align:center;}
.dept-task .tbody{min-width:0;padding-top:1px;}
.dept-task .tbody .fill{font-size:11.5px;line-height:1.6;padding:1px 0;width:100%;}
.dept-task .tmeta{display:flex;align-items:center;justify-content:flex-end;gap:4px;flex-shrink:0;padding-top:3px;}
.dept-task .tdel{cursor:pointer;color:var(--ink-4);font-family:var(--mono);font-size:13px;
  width:18px;text-align:center;padding-top:3px;opacity:0;transition:opacity .15s,color .15s;}
.dept-task:hover .tdel{opacity:1;}
.dept-task .tdel:hover{color:var(--orange);}
.dept-task.st-done .tbody .fill{color:var(--ink-3);text-decoration:line-through;}
.dept-add{display:flex;align-items:center;justify-content:center;gap:4px;background:var(--paper-2);
  border:none;border-top:1px dashed var(--line);color:var(--ink-3);font-family:var(--ar);
  font-size:10.5px;padding:5px 8px;cursor:pointer;}
.dept-add:hover{color:var(--orange);background:var(--orange-soft);}
.status-legend{display:flex;align-items:center;gap:14px;margin:4px 0 10px;padding:8px 12px;
  background:var(--paper-2);border:1px solid var(--line);font-family:var(--mono);font-size:9.5px;
  letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);}
.status-legend .leg{display:flex;align-items:center;gap:6px;}
.status-legend .leg .dot{width:8px;height:8px;border-radius:50%;}
.status-legend .leg b{color:var(--ink);font-weight:600;font-size:11px;margin:0 2px;}
.status-legend .leg.done .dot{background:#1F6B3E;}
.status-legend .leg.progress .dot{background:var(--orange);}
.status-legend .leg.review .dot{background:var(--gold);}
.status-legend .leg.deferred .dot{background:var(--ink-4);}
.status-legend .total{margin-inline-end:auto;color:var(--ink);font-weight:600;}
.next-bar{margin-top:10px;background:var(--navy);color:#fff;padding:10px 14px;
  display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:16px;}
.next-bar .eyebrow{font-family:var(--mono);font-size:9px;letter-spacing:.16em;color:var(--gold);text-transform:uppercase;}
.next-bar .val{font-size:13px;font-weight:600;}

/* ─── Debounce ─── */
function useDebounce(fn, delay) {
  const timer = useRef(null);
  return useCallback((...args) => {
    clearTimeout(timer.current);
    timer.current = setTimeout(()=>fn(...args), delay);
  }, [fn, delay]);
}

/* ─── Auth Screen ─── */
function AuthScreen() {
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);

  const login = async(e) => {
    e.preventDefault();
    setErr(""); setLoading(true);
    try { await auth.signInWithEmailAndPassword(email.trim(), pass); }
    catch(ex) {
      const msgs={
        "auth/user-not-found":"البريد الإلكتروني غير مسجّل",
        "auth/wrong-password":"كلمة المرور غير صحيحة",
        "auth/invalid-email":"البريد الإلكتروني غير صحيح",
        "auth/too-many-requests":"محاولات كثيرة — حاول لاحقاً",
        "auth/invalid-credential":"البريد أو كلمة المرور غير صحيحة",
      };
      setErr(msgs[ex.code]||ex.message);
    }
    setLoading(false);
  };

  return (
    <div className="auth-wrap">
      <div className="auth-card">
        <img className="auth-logo" src="assets/msga-logo.png" alt="MSGA" onError={e=>e.target.style.display="none"}/>

            <label>البريد الإلكتروني</label>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="name@company.com" required/>
          </div>
          <div className="auth-field">
            <label>كلمة المرور</label>
            <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" required/>
          </div>
          {err && <div className="auth-err">{err}</div>}
          <button className="auth-btn" type="submit" disabled={loading}>
            {loading ? "جاري الدخول..." : "دخول"}
          </button>
        </form>
      </div>
    </div>
  );
}

/* ─── Review Panel ─── */
function ReviewPanel({meeting, onApprove, onReject, onClose}) {
  const [note,setNote]=useState("");
  const [mode,setMode]=useState(null); // 'approve'|'reject'
  const [busy,setBusy]=useState(false);

  const submit = async() => {
    setBusy(true);
    if(mode==="approve") await onApprove(note);
    else await onReject(note);
    setBusy(false);
  };

  return (
    <div className="rv-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="rv-panel">
        <h2>مراجعة المحضر</h2>
        <p className="rv-sub">{meeting.data?.meta?.title||"محضر"} · {meeting.data?.meta?.date||""}</p>
        <div className="rv-info">
          <b>المُعِد:</b> {meeting.createdByEmail}<br/>
          <b>رقم الاجتماع:</b> {meeting.data?.meta?.meetingNo||"—"}<br/>
          <b>المهام:</b> {meeting.data?.departments?.reduce((s,d)=>s+d.tasks.length,0)||0} مهمة
        </div>
        {!mode && <>
          <p style={{fontSize:13,color:"var(--ink-2)"}}>هل تريد اعتماد هذا المحضر أو رفضه؟</p>
          <div className="rv-btns">
            <button className="rv-btn approve" onClick={()=>setMode("approve")}>اعتماد ✓</button>
            <button className="rv-btn reject" onClick={()=>setMode("reject")}>رفض ✗</button>
            <button className="rv-btn cancel" onClick={onClose}>إلغاء</button>
          </div>
        </>}
        {mode==="approve" && <>
          <div className="rv-section">
            <label>ملاحظة (اختياري)</label>
            <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="أي تعليق للموظف..."/>
          </div>
          <div className="rv-btns">
            <button className="rv-btn approve" onClick={submit} disabled={busy}>{busy?"...":"تأكيد الاعتماد ✓"}</button>
            <button className="rv-btn cancel" onClick={()=>setMode(null)}>رجوع</button>
          </div>
        </>}
        {mode==="reject" && <>
          <div className="rv-section">
            <label>سبب الرفض *</label>
            <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="اذكر السبب ليتمكن الموظف من التعديل..." required/>

          <div className="rv-btns">
            <button className="rv-btn reject" onClick={submit} disabled={busy||!note.trim()}>{busy?"...":"تأكيد الرفض ✗"}</button>
            <button className="rv-btn cancel" onClick={()=>setMode(null)}>رجوع</button>
          </div>
        </>}

    </div>
  );

/* ─── Form Components ─── */
function Fill({value,onChange,placeholder,className="",mono=false,num=false,multi=false,readOnly=false,...rest}) {
  const ref=useRef(null);
  useEffect(()=>{
    if(multi&&ref.current){ref.current.style.height="auto";ref.current.style.height=ref.current.scrollHeight+"px";}
  },[value,multi]);
  if(multi) return <textarea ref={ref} className={`fill fill-multi${mono?" fill-mono":""} ${className}${readOnly?" readonly":""}`}
    value={value||""} onChange={readOnly?undefined:e=>onChange(e.target.value)} placeholder={placeholder} rows={1} readOnly={readOnly} {...rest}/>;
  return <input className={`fill${mono?" fill-mono":""}${num?" fill-num":""} ${className}${readOnly?" readonly":""}`}
    value={value||""} onChange={readOnly?undefined:e=>onChange(e.target.value)} placeholder={placeholder} readOnly={readOnly} {...rest}/>;
}

  return <div className="page">
    <div className="watermark"></div>
    <div className="page-inner">
      <Header docId={m.docId} title={m.title} date={m.date} page={1} total={4}/>
      <div className="hero">
        <div>
          <div className="kicker">// {new Date().getFullYear()} · INTERNAL</div>
          <h1>محضر اجتماع<span className="arrow"> ›</span></h1>
          <Fill className="subtitle" value={m.title} onChange={v=>u("meta.title",v)} placeholder="عنوان الاجتماع" readOnly={readOnly}/>
          <Fill className="subtitle" value={m.subtitle} onChange={v=>u("meta.subtitle",v)} placeholder="وصف موجز" style={{marginTop:2}} readOnly={readOnly}/>
        </div>
        <div className="stamp"><div>DOCUMENT ID</div><b>{m.docId}</b><div style={{marginTop:4,color:"var(--orange)"}}>● ACTIVE</div></div>
      </div>
      <div className="kpis">
        <div className="kpi"><div className="label">DATE</div><div className="val">{m.date||"——"}</div><div className="sub">{m.weekday}</div></div>
        <div className="kpi"><div className="label">DURATION</div><div className="val">{m.duration||"—:—"}</div><div className="sub">{m.timeStart} – {m.timeEnd}</div></div>
        <div className="kpi"><div className="label">ATTENDEES</div><div className="val">{st.attendees.filter(a=>a.status!=="absent").length}/{st.attendees.length}</div><div className="sub">النصاب: {m.quorum}</div></div>
        <div className="kpi"><div className="label">TASKS</div><div className="val">{st.departments.reduce((s,d)=>s+d.tasks.length,0)}</div><div className="sub">مهام الأسبوع</div></div>
      </div>
      <SecHead num="01" label="بيانات الاجتماع" en="MEETING METADATA" icon={Icon.doc}/>
      <div className="info-grid">
        <InfoRow icon={Icon.cal} k="التاريخ" v={m.date} onChange={v=>u("meta.date",v)} num readOnly={readOnly}/>
        <InfoRow icon={Icon.hash} k="رقم الاجتماع" v={m.meetingNo} onChange={v=>u("meta.meetingNo",v)} mono readOnly={readOnly}/>
        <InfoRow icon={Icon.clock} k="وقت البداية" v={m.timeStart} onChange={v=>u("meta.timeStart",v)} num readOnly={readOnly}/>
        <InfoRow icon={Icon.clock} k="وقت النهاية" v={m.timeEnd} onChange={v=>u("meta.timeEnd",v)} num readOnly={readOnly}/>
        <InfoRow icon={Icon.pin} k="المكان" v={m.location} onChange={v=>u("meta.location",v)} readOnly={readOnly}/>
        <InfoRow icon={Icon.type} k="نوع الانعقاد" v={m.locationType} onChange={v=>u("meta.locationType",v)} readOnly={readOnly}/>
        <InfoRow icon={Icon.user} k="رئيس الاجتماع" v={m.chair} onChange={v=>u("meta.chair",v)} readOnly={readOnly}/>
        <InfoRow icon={Icon.type} k="نوع الاجتماع" v={m.type} onChange={v=>u("meta.type",v)} readOnly={readOnly}/>
      </div>
      <SecHead num="02" label="الحضور والغياب" en="ATTENDANCE REGISTER" icon={Icon.users}/>
      <div className="attendees">
        <div className="attendees-head"><div>#</div><div>الاسم</div><div>المنصب</div><div>الحضور</div><div>توقيع</div></div>
        {st.attendees.map((a,i)=>(
          <div className="attendee-row" key={i}>
            <div className="idx">{String(i+1).padStart(2,"0")}</div>
            <div><Fill value={a.name} onChange={v=>u(`attendees.${i}.name`,v)} placeholder="الاسم" readOnly={readOnly}/></div>
            <div><Fill value={a.role} onChange={v=>u(`attendees.${i}.role`,v)} placeholder="المنصب" readOnly={readOnly}/></div>
            <div><StatusPill value={a.status} onChange={v=>u(`attendees.${i}.status`,v)} readOnly={readOnly}/></div>
            <div style={{borderBottom:"1px dashed var(--line-2)",margin:"6px 4px",minHeight:18}}></div>
          </div>
        ))}
      </div>
      <Footer page={1} total={4} docId={m.docId}/>
    </div>
  </div>;
}

function TypeChip({value,onChange,readOnly}) {
  const map={"إجرائي":"present","عرض":"remote","نقاش":"progress","قرار":"todo"};
  const order=["إجرائي","عرض","نقاش","قرار"];
  return <span className={`pill ${map[value]||"progress"}`} style={{cursor:readOnly?"default":"pointer"}}
    onClick={readOnly?undefined:()=>onChange(order[(order.indexOf(value)+1)%order.length])}>{value||"نقاش"}</span>;
}

function Page2({st,u,setState,readOnly}) {
  const m=st.meta;
  const totalMin=st.agenda.reduce((s,a)=>s+(parseInt(a.dur,10)||0),0);
  return <div className="page">
    <div className="watermark"></div>
    <div className="page-inner">
      <Header docId={m.docId} title={m.title} date={m.date} page={2} total={4}/>
      <SecHead num="03" label="جدول الأعمال" en="AGENDA / SCHEDULE" icon={Icon.list}/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:8}}>
        <div style={{fontSize:11.5,color:"var(--ink-3)"}}>عدد البنود: <b style={{fontFamily:"var(--mono)"}}>{String(st.agenda.length).padStart(2,"0")}</b></div>
      </div>
      <div className="agenda">
        <div className="agenda-head"><div>#</div><div>الوقت</div><div>البند</div><div>المسؤول</div><div>النوع</div><div></div></div>
        {st.agenda.map((a,i)=>(
          <div className="agenda-row" key={i}>
            <div className="num">{String(i+1).padStart(2,"0")}</div>
            <div className="time"><Fill value={a.time} onChange={v=>u(`agenda.${i}.time`,v)} mono num placeholder="HH:MM" readOnly={readOnly}/></div>
            <div className="topic" style={{flexDirection:"column",alignItems:"stretch",padding:"6px 10px"}}>
              <Fill value={a.topic} onChange={v=>u(`agenda.${i}.topic`,v)} placeholder="عنوان البند" readOnly={readOnly}/>
              <Fill value={a.desc} onChange={v=>u(`agenda.${i}.desc`,v)} placeholder="وصف" style={{fontSize:10.5,color:"var(--ink-3)"}} readOnly={readOnly}/>
            </div>
            <div className="own"><Fill value={a.owner} onChange={v=>u(`agenda.${i}.owner`,v)} placeholder="الاسم" readOnly={readOnly}/></div>
            <div><TypeChip value={a.type} onChange={v=>u(`agenda.${i}.type`,v)} readOnly={readOnly}/></div>
            <div className="del" onClick={readOnly?undefined:()=>setState(s=>({...s,agenda:s.agenda.filter((_,j)=>j!==i)}))}>×</div>
          </div>
        ))}
      </div>
      {!readOnly && <button className="add-row" onClick={()=>setState(s=>({...s,agenda:[...s.agenda,{time:"",dur:"15",topic:"",desc:"",owner:"",type:"نقاش"}]}))}>إضافة بند</button>}
      <div className="timeline">
        <div className="tl-head"><span>TIMELINE · {m.timeStart}</span><span>{m.timeEnd}</span></div>
        <div className="tl-bar">
          {st.agenda.map((a,i)=>{
            const dur=parseInt(a.dur,10)||15;
            const pct=totalMin?(dur/totalMin)*100:100/st.agenda.length;
            const colors=["#10375C","#214E78","#3A6B95","#FF7E2A","#F2C523","#214E78","#3A6B95"];
            return <div className="tl-seg" key={i} style={{width:pct+"%",background:colors[i%colors.length]}}>{pct>7?String(i+1).padStart(2,"0"):""}</div>;
          })}
        </div>
        <div className="tl-labels">{st.agenda.map((a,i)=><div className="tl-label" key={i}>{a.time}</div>)}</div>
      </div>
      <Footer page={2} total={4} docId={m.docId}/>
    </div>
  </div>;
}

function TagChip({value,onChange,readOnly}) {
  const order=["قرار","نقاش","معلومة"];
  const cls=value==="قرار"?"dec":value==="معلومة"?"info":"";
  return <span className={`tag ${cls}`} style={{cursor:readOnly?"default":"pointer"}}
    onClick={readOnly?undefined:()=>onChange(order[(order.indexOf(value)+1)%order.length])}>{value}</span>;
}

  return <div className="page">
    <div className="watermark"></div>
    <div className="page-inner">
      <Header docId={m.docId} title={m.title} date={m.date} page={3} total={4}/>
      <SecHead num="04" label="المناقشات والنقاط الرئيسية" en="KEY DISCUSSIONS" icon={Icon.chat}/>
      <div className="points">
        {st.points.map((p,i)=>{

                {!readOnly&&<span style={{cursor:"pointer",color:"var(--ink-4)",fontFamily:"var(--mono)"}} onClick={()=>setState(s=>({...s,points:s.points.filter((_,j)=>j!==i)}))}>×</span>}
              </div>

                placeholder="ملخص النقاش..." readOnly={readOnly}

                <span>التصويت: <b>{p.meta?.vote||"—"}</b></span>

        })}

      <div className="notes-block">
        <div className="nb-head"><span className="dot"></span><span className="lbl">// ملاحظات إضافية</span></div>
        <textarea value={st.notes} onChange={readOnly?undefined:e=>u("notes",e.target.value)}

function StatusChip({value,onChange,readOnly}) {
  const m=STATUS_META[value]||STATUS_META.progress;
  return <span className={`pill compact ${m.cls}`} style={{cursor:readOnly?"default":"pointer"}}
    onClick={readOnly?undefined:()=>onChange(STATUS_ORDER[(STATUS_ORDER.indexOf(value)+1)%STATUS_ORDER.length])}>{m.label}</span>;
}

function DeptCard({st,u,setState,di,readOnly}) {
  const d=st.departments[di];
  if(!d) return null;
  const dDone=d.tasks.filter(t=>t.status==="done").length;
  return <div className="dept">
    <div className="dept-head">
      <span className="code">{d.code}</span>
      <div className="dname"><span className="n">{d.name}</span><span className="director">{d.director}</span></div>
      <div className="progress">{dDone}/{d.tasks.length}</div>
    </div>
    <div className="dept-tasks">
      {d.tasks.map((t,ti)=>(
        <div className={`dept-task ${t.status==="done"?"st-done":""}`} key={ti}>
          <div className="tnum">{String(ti+1).padStart(2,"0")}</div>
          <div className="tbody"><Fill multi value={t.task} onChange={v=>u(`departments.${di}.tasks.${ti}.task`,v)} placeholder="وصف المهمة" readOnly={readOnly}/></div>
          <div className="tmeta"><StatusChip value={t.status} onChange={v=>u(`departments.${di}.tasks.${ti}.status`,v)} readOnly={readOnly}/></div>
          {!readOnly&&<span className="tdel" onClick={()=>setState(s=>{const c=JSON.parse(JSON.stringify(s));c.departments[di].tasks.splice(ti,1);return c;})}>×</span>}
        </div>
      ))}
      {!readOnly&&<button className="dept-add" onClick={()=>setState(s=>{const c=JSON.parse(JSON.stringify(s));c.departments[di].tasks.push({task:"",due:"",status:"progress"});return c;})}>+ إضافة مهمة</button>}
    </div>
  </div>;
}

function StatusLegend({st,marker}) {
  const all=st.departments.flatMap(d=>d.tasks);
  const total=all.length;
  const counts={done:all.filter(t=>t.status==="done").length,progress:all.filter(t=>t.status==="progress").length,review:all.filter(t=>t.status==="review").length,deferred:all.filter(t=>t.status==="deferred").length};
  return <div className="status-legend">
    <span className="total">إجمالي المهام <b>{String(total).padStart(2,"0")}</b></span>
    <span className="leg done"><span className="dot"></span>تم الإنجاز <b>{counts.done}</b></span>
    <span className="leg progress"><span className="dot"></span>قيد الإنجاز <b>{counts.progress}</b></span>
    <span className="leg review"><span className="dot"></span>بانتظار الاعتماد <b>{counts.review}</b></span>
    <span className="leg deferred"><span className="dot"></span>مؤجلة <b>{counts.deferred}</b></span>
    {marker&&<span style={{marginInlineStart:8,color:"var(--orange)",fontWeight:600,fontSize:10}}>{marker}</span>}
  </div>;
}

function TasksPage({st,u,setState,deptIndices,pageNum,totalPages,showLegend,showSignoff,partLabel,secNum,readOnly}) {
  const m=st.meta;
  const all=st.departments.flatMap(d=>d.tasks);
  const done=all.filter(t=>t.status==="done").length;
  const pct=all.length?Math.round(done/all.length*100):0;
  return <div className="page">
    <div className="watermark"></div>
    <div className="page-inner">
      <Header docId={m.docId} title={m.title} date={m.date} page={pageNum} total={totalPages}/>
      <SecHead num={secNum} label="مهام الإدارات والمتابعة الأسبوعية" en={`DEPT TASKS · ${partLabel||""}`} icon={Icon.check}/>
      {showLegend?<StatusLegend st={st} marker={partLabel}/>:
        <div className="meta-strip" style={{marginBottom:8,marginTop:2}}>
          <span>// CONTINUED · {partLabel}</span><div className="dots"></div><span>{m.docId} · {m.date}</span>
        </div>}
      <div className="depts">
        {deptIndices.map(di=><DeptCard key={di} st={st} u={u} setState={setState} di={di} readOnly={readOnly}/>)}
      </div>
      {showSignoff&&<>
        <div className="next-bar">
          <div>
            <div className="eyebrow">// NEXT MEETING · الاجتماع القادم</div>
            <Fill className="val" value={st.nextMeeting} onChange={v=>u("nextMeeting",v)} placeholder="التاريخ والوقت" style={{color:"#fff",fontSize:13,fontWeight:600}} readOnly={readOnly}/>
          </div>
          <div></div>
          <div className="right">إنجاز الأسبوع · {pct}%</div>
        </div>
        <div className="signoff-compact" style={{gridTemplateColumns:"1fr"}}>
          <div className="sign">
            <div className="label">// CHAIR · رئيس الاجتماع</div>
            <div className="name">{m.chair||"—"}</div>
            <div className="role">المدير التنفيذي · MSGA Investment</div>
            <div className="sig-line"></div>
          </div>
        </div>
      </>}
      <Footer page={pageNum} total={totalPages} docId={m.docId}/>
    </div>
  </div>;
}

/* ─── Editor (Firebase-backed) ─── */
function Editor({user, meetingDoc, onBack}) {
  const isAdmin = user?.email === ADMIN_EMAIL;
  const [data, setData] = useState(meetingDoc.data || BLANK());
  const [status, setStatus] = useState(meetingDoc.status || "draft");
  const [saveStatus, setSaveStatus] = useState("");
  const [showReview, setShowReview] = useState(false);
  const [rejectNote, setRejectNote] = useState(meetingDoc.rejectNote||"");
  const docRef = db.collection("meetings").doc(meetingDoc.id);

  const readOnly = (status==="pending"&&!isAdmin) || status==="approved";

  const saveToDB = useCallback(async(d) => {
    setSaveStatus("جاري الحفظ...");
    try {
      await docRef.update({ data: d, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
      setSaveStatus("تم الحفظ ✓");
      setTimeout(()=>setSaveStatus(""),2000);
    } catch{ setSaveStatus("خطأ في الحفظ"); }
  }, []);

  const debouncedSave = useDebounce(saveToDB, 1500);

  const update = (path, val) => {
    if(readOnly) return;
    setData(s => {
      const copy=JSON.parse(JSON.stringify(s));
      const parts=path.split(".");
      let cur=copy;
      for(let i=0;i<parts.length-1;i++){const k=parts[i];cur=cur[k.match(/^\d+$/)?Number(k):k];}
      const last=parts[parts.length-1];
      cur[last.match(/^\d+$/)?Number(last):last]=val;
      debouncedSave(copy);
      return copy;
    });
  };

  const updateState = (fn) => {
    if(readOnly) return;
    setData(s=>{const next=fn(s);debouncedSave(next);return next;});
  };

  const submitForApproval = async() => {
    if(!confirm("إرسال المحضر للاعتماد؟ لن تتمكن من التعديل بعد الإرسال.")) return;
    await docRef.update({status:"pending",submittedAt:firebase.firestore.FieldValue.serverTimestamp()});
    setStatus("pending");
  };

  const handleApprove = async(note) => {
    await docRef.update({status:"approved",reviewNote:note,reviewedAt:firebase.firestore.FieldValue.serverTimestamp(),reviewedBy:user.email});
    setStatus("approved"); setShowReview(false);
  };

  const handleReject = async(note) => {
    await docRef.update({status:"rejected",rejectNote:note,reviewedAt:firebase.firestore.FieldValue.serverTimestamp(),reviewedBy:user.email});
    setStatus("rejected"); setRejectNote(note); setShowReview(false);
  };

  const pendingCount = 0;

  return <>
    <TopNav user={user} docStatus={status} saveStatus={saveStatus} onBack={onBack}
      onSubmit={(status==="draft"||status==="rejected")?submitForApproval:null}
      onReview={isAdmin&&status==="pending"?()=>setShowReview(true):null}
      pendingCount={pendingCount}/>

    {status==="rejected"&&rejectNote&&(
      <div style={{position:"fixed",top:48,inset:0,height:"auto",zIndex:150,
        background:"#FCE5DE",color:"#B23A1F",padding:"10px 20px",
        fontFamily:"var(--mono)",fontSize:12,direction:"rtl",display:"flex",alignItems:"center",gap:10}}>
        <b>سبب الرفض:</b> {rejectNote}
        {!readOnly&&<span style={{marginInlineStart:"auto",opacity:.6}}>يمكنك التعديل والإعادة</span>}
      </div>
    )}

    <div className="stage" style={{marginTop:status==="rejected"&&rejectNote?40:0}}>
      <Page1 st={data} u={update} readOnly={readOnly}/>
      <Page2 st={data} u={update} setState={updateState} readOnly={readOnly}/>
      <Page3 st={data} u={update} setState={updateState} readOnly={readOnly}/>
      <TasksPage st={data} u={update} setState={updateState} deptIndices={[0,1]} pageNum={2} totalPages={4} showLegend secNum="02" partLabel="جزء 1/3" readOnly={readOnly}/>
      <TasksPage st={data} u={update} setState={updateState} deptIndices={[2]} pageNum={3} totalPages={4} secNum="03" partLabel="جزء 2/3" readOnly={readOnly}/>
      <TasksPage st={data} u={update} setState={updateState} deptIndices={[3,4]} pageNum={4} totalPages={4} showSignoff secNum="04" partLabel="جزء 3/3" readOnly={readOnly}/>
    </div>

    {showReview&&<ReviewPanel meeting={{...meetingDoc,data,status}} onApprove={handleApprove} onReject={handleReject} onClose={()=>setShowReview(false)}/>}
  </>;
}

/* ─── App Root ─── */
function App() {
  const [user, setUser] = useState(undefined);
  const [meetings, setMeetings] = useState([]);
  const [currentDoc, setCurrentDoc] = useState(null);

  useEffect(()=>{
    return auth.onAuthStateChanged(u=>setUser(u||null));
  },[]);

  useEffect(()=>{
    if(!user) return;
    const isAdmin = user.email===ADMIN_EMAIL;
    let q = db.collection("meetings").orderBy("updatedAt","desc");
    if(!isAdmin) q = db.collection("meetings").where("createdBy","==",user.uid).orderBy("updatedAt","desc");
    return q.onSnapshot(snap=>{
      setMeetings(snap.docs.map(d=>({id:d.id,...d.data()})));
    }, err=>{
      console.error(err);
      if(err.code==="failed-precondition") {
        alert("يلزم إنشاء فهرس في Firestore. افتح Console للحصول على رابط الإنشاء.");
      } else if(err.code==="permission-denied") {
        alert("Firebase غير مُهيَّأ بشكل صحيح. تأكد من تفعيل Firestore في Test Mode.");
      }
    });
  },[user]);

  const createNew = async() => {
    const blank = BLANK();
    try {
      const ref = await db.collection("meetings").add({
        data: blank,
        status: "draft",
        createdBy: user.uid,
        createdByEmail: user.email,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        submittedAt: null,
      });
      setCurrentDoc({id:ref.id, data:blank, status:"draft", createdBy:user.uid, createdByEmail:user.email});
    } catch(err) {
      alert("خطأ في إنشاء المحضر:\n" + err.message + "\n\nتأكد من تفعيل Firestore في Firebase Console بوضع Test Mode.");
    }
  };

  if(user===undefined) return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--navy)",color:"#fff",fontFamily:"var(--mono)"}}>جاري التحميل...</div>;
  if(!user) return <AuthScreen/>;

  if(currentDoc) {
    return <Editor user={user} meetingDoc={currentDoc} onBack={()=>setCurrentDoc(null)}/>;
  }

  const pendingCount = meetings.filter(m=>m.status==="pending").length;

  return <>
    <TopNav user={user} pendingCount={pendingCount}/>
    <Dashboard user={user} meetings={meetings} onNew={createNew} onOpen={m=>setCurrentDoc(m)}/>
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
