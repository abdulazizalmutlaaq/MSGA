<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>MSGA — نظام محاضر الاجتماعات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Saira:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#1F3A57; --navy-2:#16304B; --navy-3:#102539; --navy-deep:#0D2034;
  --navy-card:#27425E; --navy-line:#33506C;
  --orange:#E5811F; --orange-2:#C96B12; --orange-soft:#FBEEDD;
  --ink:#1E2B38; --ink-2:#41505F; --ink-3:#76828F; --ink-4:#A7B0BA;
  --paper:#FFFFFF; --paper-2:#F7F8FB; --paper-3:#DDE2E8; --lav:#EEF0F7; --lav-2:#F4F5FA;
  --line:#E5E8EE; --line-2:#EEF0F4; --th:#F4F5F8;
  --ok:#2F8559; --ok-bg:#E6F4EC; --ok-bd:#CBE8D6;
  --prog:#2B5180; --prog-bg:#E9EFF7; --prog-bd:#D2DEEE;
  --hold:#B0831F; --hold-bg:#FAF2DA; --hold-bd:#ECDBA9;
  --red:#B0432C; --red-bg:#F8E9E4; --red-bd:#ECCDC2;
  --ar:"Tajawal",system-ui,sans-serif;
  --latin:"Saira","Tajawal",system-ui,sans-serif;
  --page-w:210mm; --page-h:297mm; --mx:15mm; --my:14mm;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--paper-3);font-family:var(--ar);color:var(--ink);-webkit-font-smoothing:antialiased;}
body{direction:rtl;}

/* ── AUTH ── */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--navy);background-image:radial-gradient(circle at 1px 1px,rgba(255,255,255,.04) 1px,transparent 1px);background-size:20px 20px;}
.auth-card{background:#fff;width:380px;padding:40px;direction:rtl;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.auth-logo{height:52px;display:block;margin:0 auto 24px;}
.auth-title{font-size:22px;font-weight:700;color:var(--navy);text-align:center;margin:0 0 4px;}
.auth-sub{font-size:11px;color:var(--ink-3);text-align:center;margin:0 0 28px;font-family:var(--latin);letter-spacing:.08em;}
.auth-field{margin-bottom:16px;}
.auth-field label{display:block;font-size:11.5px;font-weight:600;color:var(--ink-2);margin-bottom:6px;}
.auth-field input{width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:8px;
  font-family:var(--ar);font-size:13px;outline:none;background:var(--paper-2);direction:ltr;text-align:start;transition:border .15s;}
.auth-field input:focus{border-color:var(--navy);background:#fff;}
.auth-btn{width:100%;padding:12px;background:var(--navy);color:#fff;border:none;border-radius:8px;
  font-family:var(--ar);font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;}
.auth-btn:hover{background:var(--navy-deep);}
.auth-btn:disabled{opacity:.5;cursor:default;}
.auth-err{background:var(--red-bg);color:var(--red);padding:10px 12px;font-size:12px;margin-top:12px;border-radius:6px;}

/* ── TOP NAV ── */
.top-nav{position:fixed;top:0;inset-inline:0;z-index:200;background:var(--navy-3);color:#fff;
  display:flex;align-items:center;gap:6px;padding:0 14px;height:48px;font-family:var(--latin);font-size:11px;direction:ltr;}
.top-nav .tn-brand{display:flex;align-items:center;gap:8px;padding-inline-end:12px;border-inline-end:1px solid rgba(255,255,255,.15);}
.top-nav .tn-brand::before{content:"";width:8px;height:8px;background:var(--orange);border-radius:50%;}
.tn-spacer{flex:1;}
.tn-user{font-size:10px;color:rgba(255,255,255,.55);direction:rtl;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tn-btn{background:transparent;color:#fff;border:none;font:inherit;padding:6px 10px;cursor:pointer;display:flex;align-items:center;gap:5px;opacity:.8;border-radius:5px;}
.tn-btn:hover{opacity:1;background:rgba(255,255,255,.1);}
.tn-btn.orange{background:var(--orange);opacity:1;border-radius:6px;}
.tn-btn.orange:hover{background:var(--orange-2);}
.tn-btn.green{background:var(--ok);opacity:1;border-radius:6px;}
.tn-btn.green:hover{background:#1e6647;}
.tn-sep{width:1px;height:20px;background:rgba(255,255,255,.15);margin:0 2px;}
.tn-status{font-size:9.5px;padding:3px 10px;border-radius:999px;white-space:nowrap;}
.tn-status.draft{background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);}
.tn-status.pending{background:var(--hold-bg);color:var(--hold);}
.tn-status.approved{background:var(--ok);color:#fff;}
.tn-status.rejected{background:var(--red);color:#fff;}
.tn-save{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:.06em;}
.tn-badge{background:var(--orange);color:#fff;font-size:9px;font-weight:700;width:16px;height:16px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;margin-inline-start:4px;}

/* ── DASHBOARD ── */
.dash{min-height:100vh;padding:72px 0 60px;background:var(--paper-3);}
.dash-inner{max-width:760px;margin:0 auto;padding:32px 24px;}
.dash-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;}
.dash-top h1{margin:0 0 4px;font-size:22px;font-weight:700;color:var(--navy);}
.dash-top p{margin:0;font-size:12px;color:var(--ink-3);}
.dash-new{display:inline-flex;align-items:center;gap:8px;background:var(--navy);color:#fff;
  border:none;border-radius:9px;font-family:var(--ar);font-size:13px;font-weight:600;padding:10px 20px;cursor:pointer;}
.dash-new:hover{background:var(--navy-deep);}
.dash-doc-btn{display:inline-flex;align-items:center;gap:7px;background:#fff;color:var(--navy);
  border:1.5px solid var(--navy);border-radius:9px;font-family:var(--ar);font-size:13px;font-weight:600;padding:9px 18px;cursor:pointer;}
.dash-doc-btn:hover{background:var(--lav);}
/* documents library */
.docs-wrap{margin-top:6px;}
.docs-group{margin:18px 0 0;}
.docs-group-h{font-family:var(--latin);font-size:9px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--ink-3);padding-bottom:8px;border-bottom:1px solid var(--line);margin-bottom:12px;}
.docs-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.doc-card{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);
  border-radius:9px;padding:13px 16px;text-decoration:none;transition:box-shadow .15s,border-color .15s;}
.doc-card:hover{box-shadow:0 2px 12px rgba(31,58,87,.1);border-color:var(--navy);}
.doc-card .di{width:34px;height:34px;border-radius:8px;background:var(--lav);display:grid;place-items:center;font-size:15px;flex-shrink:0;}
.doc-card .dt{font-size:12.5px;font-weight:600;color:var(--ink);line-height:1.4;}
.doc-card .da{margin-inline-start:auto;color:var(--ink-4);font-size:15px;}
/* my-tasks summary */
.tsum-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:8px 0 4px;}
.tcard{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px 16px;cursor:pointer;position:relative;overflow:hidden;transition:border-color .15s,box-shadow .15s;}
.tcard:hover{border-color:var(--navy);}
.tcard.active{border-color:var(--navy);box-shadow:0 2px 12px rgba(31,58,87,.12);}
.tcard::after{content:"";position:absolute;top:0;bottom:0;right:0;width:4px;background:var(--ink-4);}
.tcard.s-done::after{background:var(--ok);}
.tcard.s-progress::after{background:var(--prog);}
.tcard.s-review::after{background:var(--hold);}
.tcard.s-deferred::after{background:var(--ink-4);}
.tcard .tc-v{font-family:var(--latin);font-size:26px;font-weight:700;line-height:1;color:var(--navy);}
.tcard .tc-l{font-size:11px;color:var(--ink-3);margin-top:7px;display:flex;align-items:center;gap:6px;}
.tcard .tc-l .dot{width:8px;height:8px;border-radius:50%;background:var(--ink-4);}
.tcard.s-done .tc-l .dot{background:var(--ok);}
.tcard.s-progress .tc-l .dot{background:var(--prog);}
.tcard.s-review .tc-l .dot{background:var(--hold);}
.tcard.s-deferred .tc-l .dot{background:var(--ink-4);}
.tlist{display:flex;flex-direction:column;gap:8px;}
.titem{background:#fff;border:1px solid var(--line);border-radius:9px;padding:11px 15px;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;}
.titem .ti-task{font-size:12.5px;font-weight:500;color:var(--ink);line-height:1.5;}
.titem .ti-meta{font-size:10px;color:var(--ink-3);font-family:var(--latin);margin-top:4px;}
/* executive dashboard */
.exec-actions{display:flex;justify-content:flex-end;margin:4px 0 8px;}
.exec-print-head{display:none;}
.exec-row{display:grid;grid-template-columns:1fr 1.4fr;gap:12px;margin-top:12px;}
.exec-card{background:#fff;border:1px solid var(--line);border-radius:11px;padding:16px 18px;margin-top:12px;}
.exec-row .exec-card{margin-top:0;}
.exec-h{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.exec-h::before{content:"";width:5px;height:14px;background:var(--orange);border-radius:3px;}
.exec-donut-wrap{display:flex;justify-content:center;align-items:center;padding:6px 0;}
.exec-donut{width:150px;height:150px;}
.exec-donut .don-v{font-family:var(--latin);font-size:30px;font-weight:800;fill:var(--navy);}
.exec-donut .don-l{font-family:var(--ar);font-size:11px;fill:var(--ink-3);}
.exstack{display:flex;height:22px;border-radius:6px;overflow:hidden;background:var(--line);margin:18px 0 14px;}
.exseg{height:100%;}
.exseg.s-done{background:var(--ok);} .exseg.s-progress{background:var(--prog);} .exseg.s-review{background:var(--hold);} .exseg.s-deferred{background:var(--ink-4);}
.exlegend{display:flex;flex-wrap:wrap;gap:14px;font-size:11.5px;color:var(--ink-2);}
.exleg{display:flex;align-items:center;gap:6px;}
.exleg b{font-family:var(--latin);color:var(--navy);}
.exleg .dot{width:9px;height:9px;border-radius:50%;}
.exleg .dot.s-done{background:var(--ok);} .exleg .dot.s-progress{background:var(--prog);} .exleg .dot.s-review{background:var(--hold);} .exleg .dot.s-deferred{background:var(--ink-4);}
.exbar{display:grid;grid-template-columns:120px 1fr 92px;align-items:center;gap:12px;margin:9px 0;}
.exbar-l{font-size:12px;color:var(--ink);font-weight:600;}
.exbar-track{height:14px;background:var(--lav);border-radius:7px;overflow:hidden;}
.exbar-track i{display:block;height:100%;border-radius:7px;transition:width .4s;}
.exbar-v{font-family:var(--latin);font-size:11px;color:var(--ink-3);text-align:left;direction:ltr;}
.extrend{display:flex;align-items:flex-end;gap:10px;height:170px;padding-top:8px;}
.tcol{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;}
.tcol .tpct{font-family:var(--latin);font-size:10px;font-weight:700;color:var(--navy);margin-bottom:4px;}
.tcol .tbarbox{flex:1;width:60%;display:flex;align-items:flex-end;}
.tcol .tbar{width:100%;background:linear-gradient(to top,var(--navy),var(--prog));border-radius:6px 6px 0 0;min-height:3px;}
.tcol .tlbl{font-family:var(--latin);font-size:8.5px;color:var(--ink-3);margin-top:6px;direction:ltr;white-space:nowrap;}
.brief-card{background:linear-gradient(180deg,#fff, #fbfcfe);}
.brief-body{display:flex;flex-direction:column;gap:8px;}
.brief-line{margin:0;font-size:13.5px;line-height:1.85;color:var(--ink);position:relative;padding-inline-start:18px;}
.brief-line::before{content:"◆";position:absolute;inset-inline-start:0;top:1px;color:var(--orange);font-size:9px;}
.brief-actions{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:14px;}
.ai-btn{font-family:var(--ar);font-size:13px;font-weight:700;color:#fff;border:0;border-radius:9px;cursor:pointer;
  padding:9px 16px;background:linear-gradient(135deg,var(--navy),#1d5fa6);box-shadow:0 2px 10px rgba(16,55,92,.25);transition:transform .12s,opacity .15s;}
.ai-btn:hover:not(:disabled){transform:translateY(-1px);}
.ai-btn:disabled{opacity:.6;cursor:default;}
.brief-hint{font-size:11.5px;color:var(--ink-3);}
.brief-err{margin-top:12px;font-size:12.5px;color:var(--red);background:#fdecec;border:1px solid #f6c5c5;border-radius:8px;padding:10px 12px;}
.brief-ai{margin-top:14px;padding:14px 16px;border-radius:10px;background:#f3f7fc;border:1px solid #d8e6f5;}
.brief-ai-tag{font-size:11px;font-weight:700;letter-spacing:.04em;color:var(--navy);margin-bottom:8px;}
/* Risk radar */
.risk-grid{display:flex;flex-direction:column;gap:8px;}
.risk-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;border:1px solid var(--line);background:#fff;}
.risk-item .risk-dot{width:11px;height:11px;border-radius:50%;flex:none;}
.risk-item.r-high{background:#fdeceb;border-color:#f3c9c4;} .risk-item.r-high .risk-dot{background:var(--red);}
.risk-item.r-mid{background:#fdf4e7;border-color:#f3ddbb;} .risk-item.r-mid .risk-dot{background:var(--orange);}
.risk-item.r-ok{background:#eef7f0;border-color:#cce6d4;} .risk-item.r-ok .risk-dot{background:var(--ok);}
.risk-body{flex:1;min-width:0;}
.risk-name{font-size:13px;font-weight:700;color:var(--ink);}
.risk-reason{font-size:11.5px;color:var(--ink-2);margin-top:2px;}
.risk-tag{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;flex:none;}
.risk-tag.t-high{background:var(--red);color:#fff;} .risk-tag.t-mid{background:var(--orange);color:#fff;} .risk-tag.t-ok{background:var(--ok);color:#fff;}
/* Accountability ranking */
.rank-list{display:flex;flex-direction:column;gap:9px;}
.rank-row{display:flex;align-items:center;gap:11px;}
.rank-medal{width:26px;text-align:center;font-size:15px;font-weight:800;color:var(--ink-2);flex:none;}
.rank-name{font-size:13px;font-weight:600;color:var(--ink);width:120px;flex:none;}
.rank-track{flex:1;height:9px;background:var(--prog-bg);border-radius:20px;overflow:hidden;}
.rank-track i{display:block;height:100%;border-radius:20px;}
.rank-pct{font-family:var(--latin);font-size:12px;font-weight:700;color:var(--navy);width:42px;text-align:left;flex:none;}
/* Ask assistant */
.ask-row{display:flex;gap:9px;}
.ask-input{flex:1;font-family:var(--ar);font-size:13.5px;padding:10px 13px;border:1px solid var(--prog-bd);border-radius:9px;outline:none;background:#fff;color:var(--ink);}
.ask-input:focus{border-color:var(--navy);}
.ask-suggest{display:flex;flex-wrap:wrap;gap:7px;margin-top:11px;}
.ask-chip{font-family:var(--ar);font-size:12px;color:var(--navy);background:#eef3f9;border:1px solid #d8e6f5;border-radius:20px;padding:6px 13px;cursor:pointer;transition:background .12s;}
.ask-chip:hover{background:#dfeaf6;}
/* ── Decisions: editor section ── */
.dec-list{display:flex;flex-direction:column;gap:7px;}
.dec-row{display:flex;align-items:flex-start;gap:8px;}
.dec-num{font-family:var(--latin);font-size:11px;font-weight:700;color:var(--orange);margin-top:5px;flex:none;}
.dec-input{flex:1;border:none;outline:none;background:transparent;resize:none;font-family:var(--ar);font-size:11px;color:var(--ink);line-height:1.7;min-height:24px;border-bottom:1px dashed var(--line);}
.dec-del{border:none;background:none;color:var(--ink-4);cursor:pointer;font-size:12px;padding:2px 4px;flex:none;}
.dec-del:hover{color:var(--red);}
.dec-add{align-self:flex-start;border:1px dashed var(--prog-bd);background:none;color:var(--navy);font-family:var(--ar);font-size:11px;border-radius:7px;padding:4px 10px;cursor:pointer;margin-top:3px;}
.dec-empty{font-size:11px;color:var(--ink-4);}
/* ── Decisions: register view ── */
.dec-wrap{margin-top:4px;}
.dec-tools{display:flex;gap:10px;align-items:center;margin-bottom:6px;flex-wrap:wrap;}
.dec-search{flex:1;min-width:200px;font-family:var(--ar);font-size:13.5px;padding:10px 14px;border:1px solid var(--prog-bd);border-radius:9px;outline:none;background:#fff;color:var(--ink);}
.dec-search:focus{border-color:var(--navy);}
.dec-sec{font-family:var(--latin);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);padding-bottom:8px;border-bottom:1px solid var(--line);margin:14px 0 12px;}
.dec-reg{display:flex;flex-direction:column;gap:8px;}
.dreg-row{background:#fff;border:1px solid var(--line);border-inline-start:4px solid var(--orange);border-radius:9px;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;gap:14px;}
.dreg-main{flex:1;min-width:0;}
.dreg-text{font-size:13.5px;font-weight:600;color:var(--ink);line-height:1.6;}
.dreg-meta{font-size:11px;color:var(--ink-3);margin-top:5px;}
/* ── Kanban board ── */
.kanban-wrap{margin-top:4px;}
.kanban-board{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;align-items:start;}
.kcol{background:#f4f6f9;border:1px solid var(--line);border-radius:12px;padding:10px;min-height:160px;transition:background .15s,box-shadow .15s,border-color .15s;}
.kcol.over{background:#eaf1fb;border-color:var(--navy);box-shadow:inset 0 0 0 2px rgba(16,55,92,.18);}
.kcol-head{display:flex;align-items:center;justify-content:space-between;font-size:12.5px;font-weight:700;color:var(--ink);padding:4px 6px 10px;border-bottom:2px solid transparent;margin-bottom:8px;}
.kcol-head b{font-family:var(--latin);background:#fff;border:1px solid var(--line);border-radius:20px;padding:1px 9px;font-size:12px;}
.kcol-head.s-done{border-bottom-color:var(--ok);} .kcol-head.s-progress{border-bottom-color:var(--prog);}
.kcol-head.s-review{border-bottom-color:var(--orange);} .kcol-head.s-deferred{border-bottom-color:var(--ink-4);}
.kcol-body{display:flex;flex-direction:column;gap:8px;min-height:60px;}
.kcard{background:#fff;border:1px solid var(--line);border-inline-start:4px solid var(--ink-4);border-radius:9px;padding:11px 12px;cursor:grab;transition:box-shadow .12s,transform .12s;}
.kcard:hover{box-shadow:0 2px 10px rgba(31,58,87,.12);}
.kcard:active{cursor:grabbing;}
.kcard.ro{cursor:default;opacity:.85;}
.kcard.ro:hover{box-shadow:none;}
.kcard.s-done{border-inline-start-color:var(--ok);} .kcard.s-progress{border-inline-start-color:var(--prog);}
.kcard.s-review{border-inline-start-color:var(--orange);} .kcard.s-deferred{border-inline-start-color:var(--ink-4);}
.kcard-task{font-size:13px;font-weight:600;color:var(--ink);line-height:1.5;}
.kcard-meta{font-size:11px;color:var(--ink-3);margin-top:5px;}
.kcol-empty{text-align:center;color:var(--ink-4);font-size:18px;padding:14px 0;}
.kanban-hint{margin-top:14px;font-size:12.5px;color:var(--ink-2);background:#eef3f9;border:1px solid #d8e6f5;border-radius:9px;padding:10px 14px;text-align:center;}
@media (max-width:820px){ .kanban-board{grid-template-columns:repeat(2,1fr);} }
@media (max-width:520px){ .kanban-board{grid-template-columns:1fr;} }
/* ── Presentation mode (full-screen boardroom display) ── */
.present-overlay{position:fixed;inset:0;z-index:9999;background:
  radial-gradient(120% 120% at 80% -10%, #1d5fa6 0%, transparent 45%),
  radial-gradient(120% 120% at -10% 110%, #163a5c 0%, transparent 50%),
  #10375C;
  color:#fff;display:flex;flex-direction:column;font-family:var(--ar);direction:rtl;animation:presIn .4s ease;}
@keyframes presIn{from{opacity:0} to{opacity:1}}
.pres-head{display:flex;justify-content:space-between;align-items:center;padding:30px 48px 0;}
.pres-brand{font-size:20px;font-weight:800;letter-spacing:.01em;}
.pres-date{font-family:var(--latin);font-size:15px;color:#bcd2ea;direction:ltr;}
.pres-stage{flex:1;display:flex;align-items:center;justify-content:center;padding:10px 60px;min-height:0;}
.pres-slide{width:100%;max-width:960px;text-align:center;animation:slideIn .5s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:none}}
.pres-title{font-size:30px;font-weight:800;margin-bottom:26px;color:#fff;}
.pres-title::after{content:"";display:block;width:64px;height:5px;background:var(--orange);border-radius:3px;margin:14px auto 0;}
.pres-big{font-family:var(--latin);font-size:150px;font-weight:800;line-height:1;color:#F2C523;direction:ltr;}
.pres-big-u{font-size:60px;margin-inline-start:6px;}
.pres-sub{font-size:19px;color:#cfe0f1;margin-top:6px;}
.pres-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-top:42px;}
.pres-k{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);border-radius:14px;padding:22px 10px;}
.pres-k b{display:block;font-family:var(--latin);font-size:46px;font-weight:800;color:#fff;}
.pres-k span{font-size:15px;color:#bcd2ea;}
.pres-bars,.pres-rank,.pres-risk{display:flex;flex-direction:column;gap:18px;text-align:right;}
.pres-bar,.pres-rank-row{display:flex;align-items:center;gap:18px;}
.pres-bar-l,.pres-rank-name{font-size:22px;font-weight:700;width:200px;flex:none;}
.pres-bar-track{flex:1;height:20px;background:rgba(255,255,255,.14);border-radius:30px;overflow:hidden;}
.pres-bar-track i{display:block;height:100%;border-radius:30px;transition:width .6s ease;}
.pres-bar-v{font-family:var(--latin);font-size:22px;font-weight:800;width:80px;text-align:left;flex:none;direction:ltr;}
.pres-medal{font-size:30px;width:46px;text-align:center;flex:none;}
.pres-risk-item{display:flex;align-items:center;justify-content:space-between;gap:20px;padding:18px 24px;border-radius:14px;background:rgba(255,255,255,.08);border-inline-start:6px solid #fff;}
.pres-risk-item.r-high{border-inline-start-color:var(--red);} .pres-risk-item.r-mid{border-inline-start-color:var(--orange);} .pres-risk-item.r-ok{border-inline-start-color:var(--ok);}
.pres-risk-txt{display:flex;flex-direction:column;gap:4px;text-align:right;}
.pres-risk-name{font-size:22px;font-weight:700;}
.pres-risk-reason{font-size:15px;color:#cfe0f1;}
.pres-risk-item .risk-tag{font-size:15px;padding:5px 16px;}
.pres-brief{text-align:right;max-width:860px;margin:0 auto;}
.pres-brief p{font-size:21px;line-height:2;margin:0 0 16px;padding-inline-start:24px;position:relative;}
.pres-brief p::before{content:"◆";position:absolute;inset-inline-start:0;top:6px;color:var(--orange);font-size:13px;}
.pres-foot{display:flex;align-items:center;justify-content:center;gap:22px;padding:0 0 30px;}
.pres-nav{width:46px;height:46px;border-radius:50%;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.08);color:#fff;font-size:24px;cursor:pointer;line-height:1;}
.pres-nav:hover{background:rgba(255,255,255,.18);}
.pres-dots{display:flex;gap:11px;}
.pres-dot{width:11px;height:11px;border-radius:50%;background:rgba(255,255,255,.3);cursor:pointer;transition:all .2s;}
.pres-dot.on{background:var(--orange);transform:scale(1.3);}
.pres-exit{position:absolute;bottom:26px;inset-inline-end:40px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.22);color:#fff;font-family:var(--ar);font-size:14px;font-weight:700;padding:8px 16px;border-radius:9px;cursor:pointer;}
.pres-exit:hover{background:rgba(255,255,255,.2);}
@media (max-width:820px){
  .pres-big{font-size:96px;} .pres-big-u{font-size:40px;}
  .pres-kpis{grid-template-columns:repeat(2,1fr);}
  .pres-title{font-size:23px;} .pres-bar-l,.pres-rank-name{width:120px;font-size:17px;}
  .pres-bar-v{font-size:17px;} .pres-head{padding:18px 20px 0;} .pres-stage{padding:8px 18px;}
  .pres-brief p{font-size:16px;line-height:1.9;}
}
.dash-sec{font-family:var(--latin);font-size:9px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--ink-3);padding-bottom:8px;border-bottom:1px solid var(--line);margin:20px 0 12px;}
.m-card{background:#fff;border:1px solid var(--line);border-radius:9px;display:grid;
  grid-template-columns:8px 1fr auto;align-items:center;gap:14px;padding:14px 18px;cursor:pointer;transition:box-shadow .15s,border-color .15s;}
.m-card:hover{box-shadow:0 2px 12px rgba(31,58,87,.1);border-color:var(--navy);}
.m-card+.m-card{margin-top:8px;}
.m-card .mc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.mc-dot.draft{background:var(--ink-4);}
.mc-dot.pending{background:var(--hold);}
.mc-dot.approved{background:var(--ok);}
.mc-dot.rejected{background:var(--red);}
.m-card .mc-title{font-size:13.5px;font-weight:600;color:var(--ink);margin-bottom:3px;}
.m-card .mc-meta{font-size:11px;color:var(--ink-3);font-family:var(--latin);}
.mc-badge{font-family:var(--latin);font-size:9px;padding:3px 10px;border-radius:999px;white-space:nowrap;}
.mc-badge.draft{background:var(--paper-2);color:var(--ink-3);border:1px solid var(--line);}
.mc-badge.pending{background:var(--hold-bg);color:var(--hold);border:1px solid var(--hold-bd);}
.mc-badge.approved{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-bd);}
.mc-badge.rejected{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd);}
.dash-empty{text-align:center;padding:60px 20px;color:var(--ink-3);}
.dash-empty .de-icon{font-size:36px;margin-bottom:12px;}
.dash-empty p{font-size:13px;}
.dash-empty2{text-align:center;padding:28px;color:var(--ink-4);font-size:12px;border:1px dashed var(--line);border-radius:9px;}
/* KPIs */
.dash-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:8px 0 4px;}
.dk{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden;}
.dk::after{content:"";position:absolute;top:0;bottom:0;right:0;width:4px;background:var(--navy);}
.dk .dk-v{font-family:var(--latin);font-size:26px;font-weight:700;color:var(--navy);line-height:1;}
.dk .dk-l{font-size:11px;color:var(--ink-3);margin-top:6px;}
.dk.alert::after{background:var(--orange);}
.dk.alert .dk-v{color:var(--orange-2);}
/* tools: search + filters */
.dash-tools{display:flex;gap:10px;align-items:center;margin:18px 0 4px;flex-wrap:wrap;}
.dash-search{flex:1;min-width:220px;position:relative;}
.dash-search input{width:100%;padding:9px 12px 9px 34px;border:1.5px solid var(--line);border-radius:9px;font-family:var(--ar);font-size:13px;outline:none;background:#fff;}
.dash-search input:focus{border-color:var(--navy);}
.dash-search .si{position:absolute;top:50%;transform:translateY(-50%);inset-inline-start:11px;font-size:12px;opacity:.5;}
.dash-filters{display:flex;gap:6px;flex-wrap:wrap;}
.fchip{font-family:var(--ar);font-size:11.5px;padding:7px 13px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--ink-2);cursor:pointer;white-space:nowrap;}
.fchip:hover{border-color:var(--navy);}
.fchip.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.fchip .fc-n{font-family:var(--latin);opacity:.65;margin-inline-start:5px;}
/* card extras */
.m-card .mc-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.mc-turn{font-family:var(--ar);font-size:9.5px;font-weight:700;padding:2px 9px;border-radius:999px;background:var(--orange-soft);color:var(--orange-2);border:1px solid #F0CBA0;margin-inline-start:8px;}
.mc-tasks{font-family:var(--ar);color:var(--ink-4);}
.mc-prog{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.mc-prog .pbar{width:84px;height:5px;border-radius:3px;background:var(--line);overflow:hidden;}
.mc-prog .pbar i{display:block;height:100%;}
.mc-prog .pnum{font-family:var(--latin);font-size:9.5px;color:var(--ink-3);letter-spacing:.02em;}

/* ── REVIEW PANEL ── */
.rv-overlay{position:fixed;inset:0;z-index:400;background:rgba(16,37,57,.75);display:flex;align-items:center;justify-content:center;padding:20px;}
.rv-panel{background:#fff;width:500px;max-height:85vh;overflow-y:auto;padding:32px;direction:rtl;border-radius:12px;}
.rv-panel h2{margin:0 0 4px;font-size:20px;color:var(--navy);}
.rv-panel .rv-sub{font-size:11px;color:var(--ink-3);font-family:var(--latin);margin-bottom:24px;}
.rv-section{margin-bottom:16px;}
.rv-section label{display:block;font-size:11px;font-weight:600;color:var(--ink-2);margin-bottom:6px;}
.rv-section textarea{width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:8px;
  font-family:var(--ar);font-size:13px;resize:vertical;min-height:80px;outline:none;}
.rv-section textarea:focus{border-color:var(--navy);}
.rv-info{background:var(--paper-2);border:1px solid var(--line);border-radius:8px;padding:12px 14px;font-size:12px;line-height:1.7;margin-bottom:16px;}
.rv-info b{color:var(--navy);}
.rv-btns{display:flex;gap:10px;margin-top:20px;}
.rv-btn{flex:1;padding:12px;border:none;border-radius:8px;font-family:var(--ar);font-size:13px;font-weight:600;cursor:pointer;}
.rv-btn.approve{background:var(--ok);color:#fff;}
.rv-btn.approve:hover{background:#1e6647;}
.rv-btn.reject{background:var(--red);color:#fff;}
.rv-btn.reject:hover{background:#8f3423;}
.rv-btn.cancel{background:var(--paper-2);color:var(--ink-2);border:1px solid var(--line);flex:0 0 auto;padding:12px 20px;}

/* ── PAGES ── */
.stage{min-height:100vh;padding:72px 16px 80px;display:flex;flex-direction:column;align-items:center;gap:28px;}
.page{width:var(--page-w);height:var(--page-h);background:var(--paper);position:relative;overflow:hidden;
  box-shadow:0 1px 2px rgba(20,30,45,.05),0 16px 44px rgba(20,30,45,.14);page-break-after:always;break-after:page;display:flex;flex-direction:column;}
.page:last-of-type{page-break-after:auto;}
.watermark{position:absolute;inset:0;pointer-events:none;z-index:0;}
.page-inner{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;padding:var(--my) var(--mx) 0;}

/* header */
.head{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:16px;padding-bottom:11px;margin-bottom:6px;border-bottom:2px solid var(--orange);}
.head .logo{height:34px;width:auto;display:block;}
.head .titles{display:flex;flex-direction:column;gap:1px;}
.head .eyebrow{font-family:var(--latin);font-size:8.5px;font-weight:600;letter-spacing:.18em;color:var(--orange-2);text-transform:uppercase;direction:ltr;}
.head .doctitle{font-size:13.5px;font-weight:700;color:var(--navy);}
.head .doc-meta{text-align:left;direction:ltr;font-family:var(--latin);font-size:9px;font-weight:500;color:var(--ink-3);line-height:1.65;}
.head .doc-meta b{color:var(--navy);font-weight:700;letter-spacing:.08em;}
/* footer */
.foot{position:absolute;bottom:8mm;inset-inline:var(--mx);display:flex;align-items:center;justify-content:space-between;
  font-family:var(--latin);font-size:8.5px;font-weight:500;color:var(--ink-3);letter-spacing:.08em;text-transform:uppercase;
  border-top:1px solid var(--line);padding-top:7px;z-index:2;direction:ltr;}
.foot .brand-mark{display:flex;align-items:center;gap:7px;}
.foot .brand-mark::before{content:"";width:5px;height:5px;background:var(--orange);border-radius:50%;}
.foot .pagenum b{color:var(--navy);font-weight:700;}
/* section bar */
.sec-head{position:relative;display:flex;align-items:center;gap:11px;flex-direction:row-reverse;justify-content:flex-start;
  background:var(--lav);border-radius:9px;padding:9px 16px 9px 14px;margin:16px 0 11px;overflow:hidden;}
.sec-head.first{margin-top:4px;}
.sec-head::after{content:"";position:absolute;top:0;bottom:0;right:0;width:5px;background:var(--orange);}
.sec-head .sec-no{width:24px;height:24px;border-radius:50%;background:var(--orange);color:#fff;display:grid;place-items:center;font-family:var(--latin);font-size:11px;font-weight:700;flex-shrink:0;}
.sec-head h2{margin:0;font-size:16px;font-weight:700;color:var(--navy);flex:1;}
.sec-head .en{font-family:var(--latin);font-size:9px;font-weight:600;color:var(--ink-3);letter-spacing:.16em;text-transform:uppercase;white-space:nowrap;direction:ltr;}
/* fill */
.fill{border:none;outline:none;background:transparent;width:100%;font:inherit;color:inherit;
  padding:2px 0;border-bottom:1px dashed transparent;transition:border .15s,background .15s;}
.fill:hover{border-bottom-color:var(--line);}
.fill:focus{border-bottom-color:var(--orange);background:linear-gradient(to top,rgba(229,129,31,.07),transparent);}
.fill::placeholder{color:var(--ink-4);font-weight:400;}
.fill.readonly{pointer-events:none;opacity:.8;}
.fill-latin{font-family:var(--latin);direction:ltr;text-align:start;}
.fill-num{font-family:var(--latin);direction:ltr;text-align:start;font-weight:500;}
.fill-multi{resize:none;overflow:hidden;display:block;font-family:inherit;line-height:1.6;min-height:18px;border-bottom:1px dashed transparent;}
.fill-multi:hover{border-bottom-color:var(--line);}
.fill-multi:focus{border-bottom-color:var(--orange);background:linear-gradient(to top,rgba(229,129,31,.07),transparent);}
.cover-hero .fill{text-align:center;color:#C5D0DC;}
.cover-hero .fill::placeholder{color:rgba(197,208,220,.5);}
/* kpis */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-top:4px;}
.kpi{border:1px solid var(--line);border-radius:9px;background:var(--paper-2);padding:12px 14px;display:flex;flex-direction:column;gap:5px;position:relative;overflow:hidden;}
.kpi::after{content:"";position:absolute;top:0;bottom:0;right:0;width:4px;background:var(--orange);}
.kpi .label{font-family:var(--latin);font-size:8.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);direction:ltr;}
.kpi .val{font-family:var(--latin);font-size:24px;font-weight:700;color:var(--navy);line-height:1;direction:ltr;}
.kpi .sub{font-size:9.5px;color:var(--ink-3);}
/* info grid */
.info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:0;border:1px solid var(--line);border-radius:9px;overflow:hidden;margin-top:6px;}
.info-row{display:grid;grid-template-columns:130px 1fr;border-bottom:1px solid var(--line-2);border-inline-end:1px solid var(--line-2);min-height:40px;}
.info-row:nth-child(2n){border-inline-end:none;}
.info-row:nth-last-child(-n+2){border-bottom:none;}
.info-row .k{background:var(--th);padding:9px 12px;display:flex;align-items:center;gap:8px;font-size:10.5px;color:var(--navy);font-weight:600;border-inline-end:1px solid var(--line-2);}
.info-row .k svg{width:13px;height:13px;color:var(--orange-2);stroke:currentColor;fill:none;stroke-width:1.7;}
.info-row .v{padding:8px 12px;display:flex;align-items:center;font-size:11.5px;color:var(--ink);}
/* attendance table */
.dtable{margin-top:6px;border:1px solid var(--line);border-radius:9px;overflow:hidden;}
.dt-head{display:grid;background:var(--th);border-bottom:2px solid var(--orange);font-size:9.5px;font-weight:700;color:var(--navy);}
.dt-head>div{padding:8px 11px;}
.dt-head>div.center{text-align:center;}
.drow{display:grid;border-bottom:1px solid var(--line-2);font-size:11px;min-height:36px;background:var(--paper);align-items:stretch;}
.drow:last-child{border-bottom:none;}
.drow:nth-child(even){background:var(--lav-2);}
.drow>div{padding:6px 11px;display:flex;align-items:center;}
.drow .idx{font-family:var(--latin);font-size:10px;color:var(--ink-4);justify-content:center;}
.cols-att{grid-template-columns:34px 1fr 150px 96px 70px;}
.sig-dash{flex:1;border-bottom:1px dashed var(--ink-4);margin:0 4px 4px;min-height:16px;align-self:flex-end;}
/* pills */
.mpill{display:inline-flex;align-items:center;gap:6px;font-size:9.5px;font-weight:700;padding:3px 10px;
  border-radius:999px;border:1px solid transparent;white-space:nowrap;cursor:pointer;user-select:none;}
.mpill::before{content:"";width:5px;height:5px;border-radius:50%;background:currentColor;}
.mpill.present{color:var(--prog);background:var(--prog-bg);border-color:var(--prog-bd);}
.mpill.remote{color:var(--hold);background:var(--hold-bg);border-color:var(--hold-bd);}
.mpill.absent{color:var(--red);background:var(--red-bg);border-color:var(--red-bd);}
.mpill.done{color:var(--ok);background:var(--ok-bg);border-color:var(--ok-bd);}
.mpill.progress{color:var(--prog);background:var(--prog-bg);border-color:var(--prog-bd);}
.mpill.review{color:var(--hold);background:var(--hold-bg);border-color:var(--hold-bd);}
.mpill.deferred{color:var(--ink-3);background:var(--paper-2);border-color:var(--line);}
.mpill.compact{font-size:9px;padding:3px 9px;}
.mpill.ro{cursor:default;}
/* dept cards */
.depts{display:flex;flex-direction:column;gap:11px;margin-top:6px;}
.dcard{border:1px solid var(--line);border-radius:9px;background:#fff;overflow:hidden;}
.dcard-head{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:10px;padding:8px 13px;background:var(--th);border-bottom:2px solid var(--orange);}
.dcard-head .code{font-family:var(--latin);font-size:8.5px;font-weight:700;letter-spacing:.08em;background:var(--orange);color:#fff;padding:3px 8px;border-radius:5px;direction:ltr;}
.dcard-head .dname{display:flex;align-items:baseline;gap:9px;}
.dcard-head .dname .n{font-size:12px;font-weight:700;color:var(--navy);}
.dcard-head .dname .director{font-size:9.5px;color:var(--ink-3);}
.dcard-head .dname .director::before{content:"•";margin-inline-end:6px;color:var(--ink-4);}
.dcard-head .progress{font-family:var(--latin);font-size:11px;font-weight:700;color:var(--orange-2);direction:ltr;}
.dtasks{display:flex;flex-direction:column;}
.dtask{display:grid;grid-template-columns:28px 1fr 130px 18px;gap:10px;align-items:start;padding:8px 13px;border-bottom:1px solid var(--line-2);font-size:11px;min-height:34px;}
.dtask:nth-child(even){background:var(--lav-2);}
.dtask:last-of-type{border-bottom:none;}
.dtask .tnum{font-family:var(--latin);font-size:10px;color:var(--ink-4);padding-top:4px;text-align:center;}
.dtask .tbody{min-width:0;padding-top:1px;}
.dtask .tmeta{display:flex;align-items:center;justify-content:flex-end;gap:4px;padding-top:2px;}
.dtask .tdel{cursor:pointer;color:var(--ink-4);font-size:13px;width:18px;text-align:center;padding-top:3px;opacity:0;transition:opacity .15s,color .15s;}
.dtask:hover .tdel{opacity:1;}
.dtask .tdel:hover{color:var(--orange);}
.dtask.st-done .tbody .fill{color:var(--ink-3);text-decoration:line-through;}
.dcard-add{display:flex;align-items:center;justify-content:center;gap:5px;background:var(--paper-2);
  border:none;border-top:1px dashed var(--line);color:var(--ink-3);font-family:var(--ar);font-size:10px;padding:6px 8px;cursor:pointer;width:100%;}
.dcard-add:hover{color:var(--orange-2);background:var(--orange-soft);}
/* legend */
.status-legend{display:flex;align-items:center;gap:16px;margin:4px 0 10px;padding:9px 14px;background:var(--lav);border-radius:9px;
  font-family:var(--latin);font-size:9.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3);}
.status-legend .leg{display:flex;align-items:center;gap:7px;}
.status-legend .leg .dot{width:8px;height:8px;border-radius:50%;}
.status-legend .leg b{color:var(--navy);font-weight:700;font-size:11px;margin:0 2px;}
.status-legend .leg.done .dot{background:var(--ok);}
.status-legend .leg.progress .dot{background:var(--prog);}
.status-legend .leg.review .dot{background:var(--hold);}
.status-legend .leg.deferred .dot{background:var(--ink-4);}
.status-legend .total{margin-inline-end:auto;color:var(--navy);font-weight:700;}
/* next bar */
.next-bar{margin-top:12px;background:var(--navy);border-radius:9px;padding:13px 18px;display:grid;grid-template-columns:1fr auto;align-items:center;gap:16px;color:#fff;}
.next-bar .eyebrow{font-family:var(--latin);font-size:9px;letter-spacing:.16em;color:#F0B978;text-transform:uppercase;margin-bottom:4px;direction:ltr;text-align:start;}
.next-bar .val{font-size:14px;font-weight:700;color:#fff;}
.next-bar .right{font-family:var(--latin);font-size:9.5px;color:#AEBCCC;letter-spacing:.1em;text-transform:uppercase;text-align:left;direction:ltr;}
/* notes */
.notes-block{margin-top:11px;border:1px solid var(--line);border-radius:9px;padding:12px 14px;background:var(--paper-2);}
.notes-block .nb-head{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.notes-block .nb-head .dot{width:6px;height:6px;border-radius:50%;background:var(--orange);}
.notes-block .nb-head .lbl{font-family:var(--latin);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);direction:ltr;}
.notes-block textarea{width:100%;border:none;outline:none;background:transparent;resize:none;font-family:var(--ar);font-size:11px;color:var(--ink);line-height:1.8;min-height:46px;}

// Build the in-memory departments array, sourcing tasks from the separate
// deptTasks map (each dept owns its own key → no write conflicts).
// Falls back to tasks embedded in data.departments for older documents.
function mergeDeptTasks(savedData,deptTasks){
  const base=BLANK().departments;
  const saved=Array.isArray(savedData?.departments)?savedData.departments:base;
  return base.map(bd=>{
    const sd=saved.find(x=>x.id===bd.id)||bd;
    const fromMap=deptTasks&&Array.isArray(deptTasks[bd.id])?deptTasks[bd.id]:null;
    const fromEmbedded=Array.isArray(sd.tasks)?sd.tasks:[];
    return {id:bd.id,name:sd.name||bd.name,director:sd.director||bd.director,code:bd.code,
      tasks:fromMap!==null?fromMap:fromEmbedded};
  });
}

function useDebounce(fn,delay){
  const t=useRef(null);
  return useCallback((...a)=>{clearTimeout(t.current);t.current=setTimeout(()=>fn(...a),delay);},[fn,delay]);
}

/* ── Auth ── */
function AuthScreen(){
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);
  const login=async e=>{

    try{await auth.signInWithEmailAndPassword(email.trim(),pass);}
    catch(ex){
      const m={"auth/user-not-found":"البريد غير مسجّل","auth/wrong-password":"كلمة المرور خاطئة",
        "auth/invalid-email":"البريد غير صحيح","auth/too-many-requests":"محاولات كثيرة — حاول لاحقاً",
        "auth/invalid-credential":"البريد أو كلمة المرور غير صحيحة"};
      setErr(m[ex.code]||ex.message);
    }
    setLoading(false);
  };
  return(
    <div className="auth-wrap">
      <div className="auth-card">
        <img className="auth-logo" src="assets/msga-logo.png" alt="MSGA" onError={e=>e.target.style.display="none"}/>

        <form onSubmit={login}>

          <div className="auth-field"><label>كلمة المرور</label>
            <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" required/></div>
          {err&&<div className="auth-err">{err}</div>}
          <button className="auth-btn" type="submit" disabled={loading}>{loading?"جاري الدخول...":"دخول"}</button>
        </form>
      </div>

  );
}

      {onDeptSubmit&&deptSubmitted&&<span className="tn-save" style={{color:"var(--ok)"}}>✓ تم رفع المهام</span>}
      {(isAdmin||isCEO)&&onReview&&<button className="tn-btn green" onClick={onReview}>{reviewLabel||"مراجعة واعتماد"}</button>}
      {onForceApprove&&<button className="tn-btn green" onClick={onForceApprove} title="اعتماد المحضر رغم أن بعض القطاعات لم ترفع">⚡ اعتماد الأدمن</button>}
      <div className="tn-sep"/>
      <span className="tn-user">{user?.email}</span>
      {isAdmin&&pendingCount>0&&<span className="tn-badge">{pendingCount}</span>}
      <button className="tn-btn" onClick={()=>auth.signOut()}>خروج</button>
    </div>
  );
}

/* ── Executive donut (pure SVG) ── */
function Donut({pct,color}){
  const R=54,C=2*Math.PI*R,off=C*(1-(pct||0)/100);
  return <svg className="exec-donut" viewBox="0 0 132 132">
    <circle cx="66" cy="66" r={R} fill="none" stroke="var(--line)" strokeWidth="14"/>
    <circle cx="66" cy="66" r={R} fill="none" stroke={color||"var(--ok)"} strokeWidth="14" strokeLinecap="round"
      strokeDasharray={C} strokeDashoffset={off} transform="rotate(-90 66 66)"/>
    <text x="66" y="64" textAnchor="middle" className="don-v">{pct||0}%</text>
    <text x="66" y="84" textAnchor="middle" className="don-l">إنجاز</text>
  </svg>;
}

/* ── Dashboard ── */
function Dashboard({user,meetings,onNew,onOpen}){
  const isAdmin=user?.email===ADMIN_EMAIL;
  const isCEO=isCeoEmail(user?.email);
  const userDept=DEPT_MAP[user?.email]||null;
  const isViewer=!isAdmin&&!userDept;
  const canSeeDocs=isAdmin||userDept?.id==="hr";
  const [showDocs,setShowDocs]=useState(false);
  const [showTasks,setShowTasks]=useState(false);
  const [showExec,setShowExec]=useState(false);
  const [aiText,setAiText]=useState("");
  const [aiBusy,setAiBusy]=useState(false);
  const [aiErr,setAiErr]=useState("");
  const [aiQ,setAiQ]=useState("");
  const [askText,setAskText]=useState("");
  const [askBusy,setAskBusy]=useState(false);
  const [askErr,setAskErr]=useState("");
  const [present,setPresent]=useState(false);
  const [slideIdx,setSlideIdx]=useState(0);
  const SLIDES=5;
  const [showKanban,setShowKanban]=useState(false);
  const dragRef=useRef(null);
  const [dragOver,setDragOver]=useState(null);
  const [showDecisions,setShowDecisions]=useState(false);
  const [decQ,setDecQ]=useState("");
  const canSeeExec=isAdmin||isViewer;
  const [selStatus,setSelStatus]=useState("done");
  const [q,setQ]=useState("");
  const [filter,setFilter]=useState("all");

  // My-tasks summary across ALL meetings (dept user → own dept only; admin/viewer → all depts)
  const collectTasks=()=>{
    const out=[];
    meetings.forEach(m=>{
      const depts=mergeDeptTasks(m.data,m.deptTasks);
      const scope=userDept?depts.filter(d=>d.id===userDept.id):depts;
      const mt=(m.data?.meta?.title||"").trim()||(m.data?.meta?.date||"").trim()||"محضر";
      scope.forEach(d=>(d.tasks||[]).forEach(t=>{ if((t.task||"").trim()) out.push({task:t.task,status:t.status||"progress",dept:d.name,date:m.data?.meta?.date||"",mt,mstatus:m.status}); }));
    });
    return out;
  };
  const myTasks=collectTasks();
  const STAT=[{id:"done",label:"المنجز",sec:"المنجز خلال الفترة الماضية"},{id:"progress",label:"قيد الإنجاز",sec:"قيد الإنجاز"},{id:"review",label:"بانتظار الاعتماد",sec:"بانتظار الاعتماد"},{id:"deferred",label:"مؤجلة",sec:"مؤجلة"}];
  const taskCount=s=>myTasks.filter(t=>t.status===s).length;
  const selList=myTasks.filter(t=>t.status===selStatus);
  const exportMyTasks=()=>{
    const headers=["المحضر","التاريخ","القطاع","المهمة","الحالة"];
    const rows=myTasks.map(t=>[t.mt,t.date,t.dept,t.task,STATUS_AR[t.status]||t.status]);
    downloadFile((userDept?("مهام-"+userDept.name):"كل-المهام")+".csv",buildCSV(headers,rows));
  };

  // ── Executive analytics (all departments, all meetings) ──
  const allT=(()=>{const out=[];meetings.forEach(m=>mergeDeptTasks(m.data,m.deptTasks).forEach(d=>(d.tasks||[]).forEach(t=>{if((t.task||"").trim())out.push({status:t.status||"progress",deptId:d.id});})));return out;})();
  const exTot=allT.length, exDone=allT.filter(t=>t.status==="done").length;
  const exPct=exTot?Math.round(exDone/exTot*100):0;
  const exCount=s=>allT.filter(t=>t.status===s).length;
  const deptStats=DEPT_IDS.map(id=>{const ts=allT.filter(t=>t.deptId===id);const dn=ts.filter(t=>t.status==="done").length;return{id,name:DEPT_LABELS[id],total:ts.length,done:dn,pct:ts.length?Math.round(dn/ts.length*100):0};});
  const trend=[...meetings]
    .map(m=>{const d=mergeDeptTasks(m.data,m.deptTasks);const tt=d.reduce((s,x)=>s+x.tasks.length,0);const dd=d.reduce((s,x)=>s+x.tasks.filter(t=>t.status==="done").length,0);return{label:(m.data?.meta?.date||"").trim()||(m.data?.meta?.title||"").trim()||"—",pct:tt?Math.round(dd/tt*100):0,tt};})
    .filter(x=>x.tt>0)
    .sort((a,b)=>String(a.label).localeCompare(String(b.label)))
    .slice(-8);
  const today=new Date(); const todayStr=today.getFullYear()+"-"+String(today.getMonth()+1).padStart(2,"0")+"-"+String(today.getDate()).padStart(2,"0");

  // ── النشرة التنفيذية الذكية (تُولَّد محلياً بدون أي مفتاح) ──
  const genBrief=()=>{
    if(exTot===0) return ["لا توجد بيانات كافية لإصدار نشرة تنفيذية بعد. أضف محاضر ومهام أولاً."];
    const ranked=deptStats.filter(d=>d.total>0).slice().sort((a,b)=>b.pct-a.pct);
    const best=ranked[0], worst=ranked[ranked.length-1];
    const deferred=exCount("deferred"), review=exCount("review"), progress=exCount("progress");
    const lines=[];
    const tone=exPct>=75?"أداء قوي":exPct>=50?"أداء متوسط":"أداء يحتاج إلى دعم";
    lines.push(`أنجزت الشركة ${exDone} مهمة من أصل ${exTot} مهمة بنسبة إنجاز إجمالية ${exPct}% (${tone}) عبر ${meetings.length} محضر اجتماع.`);
    if(best&&worst&&best.id!==worst.id)
      lines.push(`يتصدّر «${best.name}» القطاعات بنسبة ${best.pct}%، فيما يحتاج «${worst.name}» إلى دعم ومتابعة عند ${worst.pct}%.`);
    else if(best)
      lines.push(`أعلى القطاعات إنجازاً «${best.name}» بنسبة ${best.pct}%.`);
    if(trend.length>=2){
      const delta=trend[trend.length-1].pct-trend[trend.length-2].pct;
      if(delta>0) lines.push(`تحسّن الأداء بمقدار ${delta} نقطة مقارنةً بالمحضر السابق — اتجاه إيجابي.`);
      else if(delta<0) lines.push(`انخفض الأداء بمقدار ${Math.abs(delta)} نقطة مقارنةً بالمحضر السابق — يُوصى بمراجعة الأسباب.`);
      else lines.push(`استقرّ مستوى الأداء عند ${trend[trend.length-1].pct}% مقارنةً بالمحضر السابق.`);
    }
    const pend=[]; if(progress>0)pend.push(`${progress} قيد الإنجاز`); if(review>0)pend.push(`${review} بانتظار الاعتماد`); if(deferred>0)pend.push(`${deferred} مؤجلة`);
    if(pend.length) lines.push(`المهام المفتوحة: ${pend.join("، ")}.`+(deferred>0?" يُنصح بمعالجة المهام المؤجلة لتفادي تراكمها.":""));
    return lines;
  };
  const briefLines=genBrief();

  const runAI=async()=>{
    if(!AI_ENDPOINT){ setAiErr("لم يتم ربط الذكاء الاصطناعي بعد. اتبع تعليمات الملف ai-worker.js لتفعيل هذه الميزة."); return; }
    setAiBusy(true); setAiErr(""); setAiText("");
    try{
      const payload={
        pct:exPct, total:exTot, done:exDone,
        meetings:meetings.length,
        counts:{progress:exCount("progress"),review:exCount("review"),deferred:exCount("deferred"),done:exDone},
        departments:deptStats.filter(d=>d.total>0).map(d=>({name:d.name,done:d.done,total:d.total,pct:d.pct})),
        trend:trend.map(t=>({label:t.label,pct:t.pct})),
        tasks:myTasks.map(t=>({task:t.task,dept:t.dept,status:STATUS_AR[t.status]||t.status,meeting:t.mt})),
        date:todayStr
      };
      const r=await fetch(AI_ENDPOINT,{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify(payload)});
      if(!r.ok) throw new Error("HTTP "+r.status);
      const j=await r.json();
      const txt=(j&&(j.text||j.summary||j.content))||"";
      if(!txt) throw new Error("empty");
      setAiText(txt);
    }catch(e){
      setAiErr("تعذّر الاتصال بخدمة الذكاء الاصطناعي. تأكد من ربط الـ Worker بشكل صحيح. ("+e.message+")");
    }finally{ setAiBusy(false); }
  };

  // ── المساعد الذكي التفاعلي (سؤال/جواب من البيانات الحيّة) ──
  const runAsk=async(qOverride)=>{
    const question=(qOverride||aiQ).trim();
    if(!question) return;
    if(qOverride) setAiQ(qOverride);
    if(!AI_ENDPOINT){ setAskErr("لم يتم ربط الذكاء الاصطناعي بعد. فعّل الـ Worker أولاً."); return; }
    setAskBusy(true); setAskErr(""); setAskText("");
    try{
      const payload={
        mode:"ask", question,
        pct:exPct, total:exTot, done:exDone, meetings:meetings.length,
        counts:{progress:exCount("progress"),review:exCount("review"),deferred:exCount("deferred"),done:exDone},
        departments:deptStats.filter(d=>d.total>0).map(d=>({name:d.name,done:d.done,total:d.total,pct:d.pct})),
        tasks:myTasks.map(t=>({task:t.task,dept:t.dept,status:STATUS_AR[t.status]||t.status,meeting:t.mt})),
        date:todayStr
      };
      const r=await fetch(AI_ENDPOINT,{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify(payload)});
      if(!r.ok) throw new Error("HTTP "+r.status);
      const j=await r.json();
      const txt=(j&&(j.text||j.answer||j.content))||"";
      if(!txt) throw new Error("empty");
      setAskText(txt);
    }catch(e){
      setAskErr("تعذّر الاتصال بالمساعد الذكي. ("+e.message+")");
    }finally{ setAskBusy(false); }
  };

  // ── رادار المخاطر + ترتيب الالتزام (حساب محلي من البيانات) ──
  const deptRisk=DEPT_IDS.map(id=>{
    const ts=allT.filter(t=>t.deptId===id);
    const total=ts.length, done=ts.filter(t=>t.status==="done").length;
    const deferred=ts.filter(t=>t.status==="deferred").length;
    const review=ts.filter(t=>t.status==="review").length;
    const pct=total?Math.round(done/total*100):0;
    let level="ok", reason="الأداء ضمن المستهدف ("+pct+"%)";
    if(pct<40||deferred>=2){ level="high"; reason=deferred>=2?(deferred+" مهام مؤجلة وإنجاز "+pct+"%"):("إنجاز منخفض "+pct+"%"); }
    else if(pct<70||deferred===1||review>=2){ level="mid"; reason=deferred===1?("مهمة مؤجلة وإنجاز "+pct+"%"):("إنجاز "+pct+"% يحتاج متابعة"); }
    return {id,name:DEPT_LABELS[id],total,done,deferred,review,pct,level,reason};
  }).filter(d=>d.total>0).sort((a,b)=>({high:0,mid:1,ok:2}[a.level]-{high:0,mid:1,ok:2}[b.level]));
  const ranking=deptStats.filter(d=>d.total>0).slice().sort((a,b)=>b.pct-a.pct||b.total-a.total);

  // ── سجل القرارات (مجمّع عبر كل المحاضر) ──
  const allDecisions=(()=>{
    const out=[];
    meetings.forEach(m=>{
      const decs=Array.isArray(m.data?.decisions)?m.data.decisions:[];
      const mt=(m.data?.meta?.title||"").trim()||(m.data?.meta?.date||"").trim()||"محضر";
      decs.forEach((d,i)=>{ if((d||"").trim()) out.push({text:d.trim(),mt,date:m.data?.meta?.date||"",status:m.status,approver:m.status==="approved"?CEO_NAME:"",num:i+1}); });
    });
    return out;
  })();
  const decFiltered=allDecisions.filter(d=>{ const q=decQ.trim().toLowerCase(); return !q||(d.text+" "+d.mt+" "+d.approver).toLowerCase().includes(q); });
  const exportDecisions=()=>{
    const rows=allDecisions.map((d,i)=>[i+1,d.text,d.mt,d.date,STATUS_LABELS[d.status]||d.status,d.approver]);
    downloadFile("سجل-القرارات.csv",buildCSV(["#","القرار","المحضر","التاريخ","الحالة","المعتمِد"],rows));
  };

  // ── لوحة كانبان (بطاقات مهام قابلة للسحب بين الحالات) ──
  const KANBAN=[{id:"deferred",label:"مؤجلة",icon:"⏸"},{id:"progress",label:"قيد الإنجاز",icon:"⏳"},{id:"review",label:"بانتظار الاعتماد",icon:"📋"},{id:"done",label:"تم الإنجاز",icon:"✅"}];
  const deptArr=(m,deptId)=>(m.deptTasks&&Array.isArray(m.deptTasks[deptId]))?m.deptTasks[deptId]:(mergeDeptTasks(m.data,m.deptTasks).find(d=>d.id===deptId)?.tasks||[]);
  const kanbanTasks=(()=>{
    const out=[]; const scopeIds=userDept?[userDept.id]:DEPT_IDS;
    meetings.forEach(m=>scopeIds.forEach(deptId=>deptArr(m,deptId).forEach((t,idx)=>{
      if(!(t.task||"").trim()) return;
      out.push({id:m.id+":"+deptId+":"+idx, mid:m.id, deptId, idx, task:t.task, status:t.status||"progress", deptName:DEPT_LABELS[deptId], mt:(m.data?.meta?.title||"").trim()||(m.data?.meta?.date||"").trim()||"محضر", mstatus:m.status});
    })));
    return out;
  })();
  const canMove=t=>!isViewer&&t.mstatus!=="approved"&&(isAdmin||(userDept&&t.deptId===userDept.id));
  const moveTask=async(t,newStatus)=>{
    if(!t||t.status===newStatus||!canMove(t)) return;
    const m=meetings.find(x=>x.id===t.mid); if(!m) return;
    const arr=deptArr(m,t.deptId).map(x=>({...x}));
    if(!arr[t.idx]) return;
    arr[t.idx].status=newStatus;
    try{ await db.collection("meetings").doc(t.mid).update({["deptTasks."+t.deptId]:arr,updatedAt:Date.now()}); }catch(e){}
  };

  // ── وضع العرض للاجتماع (شاشة كاملة تتنقّل تلقائياً) ──
  const startPresent=()=>{ setSlideIdx(0); setPresent(true); try{document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen();}catch(e){} };
  const exitPresent=()=>{ setPresent(false); try{document.fullscreenElement&&document.exitFullscreen();}catch(e){} };
  useEffect(()=>{
    if(!present) return;
    const t=setInterval(()=>setSlideIdx(i=>(i+1)%SLIDES),9000);
    const onKey=e=>{
      if(e.key==="Escape") exitPresent();
      else if(e.key==="ArrowLeft") setSlideIdx(i=>(i+1)%SLIDES);
      else if(e.key==="ArrowRight") setSlideIdx(i=>(i-1+SLIDES)%SLIDES);
    };
    window.addEventListener("keydown",onKey);
    return ()=>{ clearInterval(t); window.removeEventListener("keydown",onKey); };
  },[present]);

  const cnt=s=>meetings.filter(m=>effStatus(m)===s).length;
  const submittedOf=m=>DEPT_IDS.filter(id=>m.deptStatus&&m.deptStatus[id]==="submitted").length;
  const tasksOf=m=>{const d=mergeDeptTasks(m.data,m.deptTasks);return{total:d.reduce((s,x)=>s+x.tasks.length,0),done:d.reduce((s,x)=>s+x.tasks.filter(t=>t.status==="done").length,0)};};
  const needsMe=m=>userDept&&m.status!=="approved"&&(!m.deptStatus||m.deptStatus[userDept.id]!=="submitted");
  const needsMeCount=meetings.filter(needsMe).length;

  // KPIs adapt to role
  const kpis=isCEO
    ?[{v:cnt("pending"),l:"بانتظار اعتمادك",alert:cnt("pending")>0},{v:cnt("approved"),l:"معتمدة"},{v:meetings.length,l:"إجمالي المحاضر"},{v:cnt("rejected"),l:"مرفوضة"}]
    :isAdmin
    ?[{v:meetings.length,l:"إجمالي المحاضر"},{v:cnt("pending"),l:"بانتظار الاعتماد",alert:cnt("pending")>0},{v:cnt("approved"),l:"معتمدة"},{v:meetings.filter(m=>m.status==="draft"||m.status==="rejected").length,l:"قيد الإعداد"}]
    :userDept
    ?[{v:needsMeCount,l:"بانتظار رفع مهامك",alert:needsMeCount>0},{v:cnt("pending"),l:"بانتظار الاعتماد"},{v:cnt("approved"),l:"معتمدة"},{v:meetings.length,l:"الإجمالي"}]
    :[{v:meetings.length,l:"إجمالي المحاضر"},{v:cnt("approved"),l:"معتمدة"},{v:cnt("pending"),l:"بانتظار الاعتماد"},{v:cnt("rejected"),l:"مرفوضة"}];

  const norm=s=>(s||"").toString().toLowerCase();
  const match=m=>{
    const hay=norm(m.data?.meta?.title)+" "+norm(m.data?.meta?.date)+" "+norm(m.data?.meta?.meetingNo)+" "+norm(m.createdByEmail);
    return (!q.trim()||hay.includes(norm(q)))&&(filter==="all"||effStatus(m)===filter);
  };
  const chips=[["all","الكل",meetings.length],["draft","مسودة",cnt("draft")],["pending","بانتظار",cnt("pending")],["approved","معتمد",cnt("approved")],["rejected","مرفوض",cnt("rejected")]];

  // priority section (only when not searching/filtering)
  const showPriority=filter==="all"&&!q.trim();
  const priority=(isAdmin||isCEO)?meetings.filter(m=>effStatus(m)==="pending"):(userDept?meetings.filter(needsMe):[]);
  const prioIds=new Set(priority.map(m=>m.id));
  const rest=showPriority?meetings.filter(m=>!prioIds.has(m.id)):meetings.filter(match);

  const Card=({m})=>{
    const sub=submittedOf(m), t=tasksOf(m), mine=needsMe(m);
    const es=effStatus(m);
    const ceoTurn=(isCEO||isAdmin)&&es==="pending";
    return(
      <div className="m-card" onClick={()=>onOpen(m)}>
        <div className={`mc-dot ${es}`}/>
        <div>
          <div className="mc-title">{(m.data?.meta?.title||"").trim()||(m.data?.meta?.date||"").trim()||"محضر بدون عنوان"}{mine&&<span className="mc-turn">● دورك</span>}{ceoTurn&&<span className="mc-turn">● للاعتماد</span>}</div>
          <div className="mc-meta">{m.data?.meta?.date||"—"} · {m.data?.meta?.meetingNo||"—"}{isAdmin&&m.createdByEmail?` · ${m.createdByEmail}`:""} · <span className="mc-tasks">{t.total} مهمة</span></div>
        </div>
        <div className="mc-right">
          <span className={`mc-badge ${es}`}>{STATUS_LABELS[es]}</span>
          {es==="approved"
            ?<div className="mc-prog"><span className="pnum">الإنجاز {t.total?Math.round(t.done/t.total*100):0}%</span></div>
            :<div className="mc-prog"><div className="pbar"><i style={{width:(sub/TOTAL*100)+"%",background:sub===TOTAL?"var(--ok)":"var(--orange)"}}/></div><span className="pnum">القطاعات {sub}/{TOTAL}</span></div>}
        </div>
      </div>
    );
  };

  return(
    <div className="dash">
      {present&&(
        <div className="present-overlay">
          <div className="pres-head">
            <span className="pres-brand">شركة مسقا للاستثمار — التقرير التنفيذي</span>
            <span className="pres-date">{todayStr}</span>
          </div>
          <div className="pres-stage">
            {slideIdx===0&&(
              <div className="pres-slide">
                <div className="pres-title">الأداء العام</div>
                <div className="pres-big">{exPct}<span className="pres-big-u">%</span></div>
                <div className="pres-sub">نسبة الإنجاز الإجمالية عبر {meetings.length} محضر</div>
                <div className="pres-kpis">
                  <div className="pres-k"><b>{exTot}</b><span>إجمالي المهام</span></div>
                  <div className="pres-k"><b>{exDone}</b><span>منجزة</span></div>
                  <div className="pres-k"><b>{exCount("review")}</b><span>بانتظار الاعتماد</span></div>
                  <div className="pres-k"><b>{exCount("deferred")}</b><span>مؤجلة</span></div>
                </div>
              </div>)}
            {slideIdx===1&&(
              <div className="pres-slide">
                <div className="pres-title">مقارنة أداء القطاعات</div>
                <div className="pres-bars">
                  {deptStats.map(d=>(
                    <div className="pres-bar" key={d.id}>
                      <span className="pres-bar-l">{d.name}</span>
                      <div className="pres-bar-track"><i style={{width:Math.max(d.pct,2)+"%",background:d.pct>=70?"var(--ok)":d.pct>=40?"var(--orange)":"var(--red)"}}/></div>
                      <span className="pres-bar-v">{d.pct}%</span>
                    </div>))}
                </div>
              </div>)}
            {slideIdx===2&&(
              <div className="pres-slide">
                <div className="pres-title">🚨 رادار المخاطر</div>
                <div className="pres-risk">
                  {deptRisk.length>0?deptRisk.map(d=>(
                    <div className={`pres-risk-item r-${d.level}`} key={d.id}>

                      <span className="pres-medal">{i===0?"🥇":i===1?"🥈":i===2?"🥉":(i+1)}</span>

          :<>
            <div className="dash-kpis">

    </div>

/* ── Review Panel ── */
function ReviewPanel({meeting,onApprove,onReject,onClose,pendingDepts=[]}){
  const [note,setNote]=useState("");
  const [mode,setMode]=useState(null);
  const [busy,setBusy]=useState(false);
  const blocked=pendingDepts.length>0;
  const submit=async()=>{setBusy(true);if(mode==="approve")await onApprove(note);else await onReject(note);setBusy(false);};
  return(
    <div className="rv-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="rv-panel">
        <h2>مراجعة المحضر</h2>
        <p className="rv-sub">{meeting.data?.meta?.title||"محضر"} · {meeting.data?.meta?.date||""}</p>
        <div className="rv-info">
          <b>المُعِد:</b> {meeting.createdByEmail}<br/>
          <b>رقم الاجتماع:</b> {meeting.data?.meta?.meetingNo||"—"}<br/>
          <b>المهام:</b> {meeting.data?.departments?.reduce((s,d)=>s+d.tasks.length,0)||0} مهمة
        </div>
        {blocked&&<div style={{background:"var(--red-bg)",color:"var(--red)",border:"1px solid var(--red-bd)",borderRadius:8,padding:"12px 14px",fontSize:12,lineHeight:1.8,marginBottom:16}}>
          <b>⚠ لا يمكن الاعتماد بعد</b><br/>القطاعات التالية لم ترفع مهامها:<br/>{pendingDepts.map(n=><span key={n}>• {n}<br/></span>)}
        </div>}
        {!mode&&<><p style={{fontSize:13,color:"var(--ink-2)"}}>هل تريد اعتماد هذا المحضر أو رفضه؟</p>
          <div className="rv-btns">
            <button className="rv-btn approve" onClick={()=>setMode("approve")} disabled={blocked} style={blocked?{opacity:.4,cursor:"not-allowed"}:{}}>اعتماد ✓</button>
            <button className="rv-btn reject" onClick={()=>setMode("reject")}>رفض ✗</button>
            <button className="rv-btn cancel" onClick={onClose}>إلغاء</button>
          </div></>}
        {mode==="approve"&&<><div className="rv-section"><label>ملاحظة (اختياري)</label>
          <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="أي تعليق للموظف..."/></div>
          <div className="rv-btns">
            <button className="rv-btn approve" onClick={submit} disabled={busy||blocked}>{busy?"...":"تأكيد الاعتماد ✓"}</button>
            <button className="rv-btn cancel" onClick={()=>setMode(null)}>رجوع</button>
          </div></>}
        {mode==="reject"&&<><div className="rv-section"><label>سبب الرفض (اختياري)</label>
          <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="اذكر السبب للموظفين..."/></div>
          <div className="rv-btns">
            <button className="rv-btn reject" onClick={submit} disabled={busy}>{busy?"...":"تأكيد الرفض ✗"}</button>
            <button className="rv-btn cancel" onClick={()=>setMode(null)}>رجوع</button>
          </div></>}
      </div>
    </div>
  );
}

/* ── Form primitives ── */
function Fill({value,onChange,placeholder,className="",latin=false,num=false,multi=false,readOnly=false,...rest}){
  const ref=useRef(null);
  useEffect(()=>{if(multi&&ref.current){ref.current.style.height="auto";ref.current.style.height=ref.current.scrollHeight+"px";}},[value,multi]);
  if(multi)return <textarea ref={ref} className={`fill fill-multi ${className}${readOnly?" readonly":""}`}
    value={value||""} onChange={readOnly?undefined:e=>onChange(e.target.value)} placeholder={placeholder} rows={1} readOnly={readOnly} {...rest}/>;
  return <input className={`fill${latin?" fill-latin":""}${num?" fill-num":""} ${className}${readOnly?" readonly":""}`}
    value={value||""} onChange={readOnly?undefined:e=>onChange(e.target.value)} placeholder={placeholder} readOnly={readOnly} {...rest}/>;
}

function MPill({value,map,order,onChange,readOnly=false,compact=false}){
  const cur=map[value]||map[order[0]];
  return <span className={`mpill ${cur.css}${compact?" compact":""}${readOnly?" ro":""}`}
    onClick={readOnly?undefined:()=>onChange(order[(order.indexOf(value)+1)%order.length])}>{cur.label}</span>;
}

const ATT_MAP={present:{label:"حاضر",css:"present"},remote:{label:"عن بُعد",css:"remote"},absent:{label:"غائب",css:"absent"}};

/* ── Editor ── */
function Editor({user,meetingDoc,onBack,userDept}){
  const isAdmin=user?.email===ADMIN_EMAIL;
  const isCEO=isCeoEmail(user?.email); // الرئيس التنفيذي — يعتمد المحاضر (قراءة فقط لبقية المحتوى)
  const isViewer=!isAdmin&&!userDept; // CEO / observer / any account not mapped to a dept → read-only (CEO يبقى للقراءة لكن يعتمد)
  const [data,setData]=useState(()=>{
    const base=BLANK();
    const saved=meetingDoc.data||{};
    return {...base,...saved,
      meta:{...base.meta,...(saved.meta||{})},
      attendees:Array.isArray(saved.attendees)?saved.attendees:base.attendees,
      departments:mergeDeptTasks(saved,meetingDoc.deptTasks),
      notes:saved.notes||"",nextMeeting:saved.nextMeeting||"",
      decisions:Array.isArray(saved.decisions)?saved.decisions:[],
    };
  });
  const [status,setStatus]=useState(meetingDoc.status||"draft");
  const [deptStatus,setDeptStatus]=useState(meetingDoc.deptStatus||BLANK_DEPT_STATUS());
  const [saveStatus,setSaveStatus]=useState("");
  const [showReview,setShowReview]=useState(false);
  const [rejectNote,setRejectNote]=useState(meetingDoc.rejectNote||"");
  const [review,setReview]=useState({by:meetingDoc.reviewedBy||"",at:meetingDoc.reviewedAt||null});
  const editingRef=useRef(0); // timestamp of last local edit (protects admin's unsaved task edits from live-sync clobber)
  const docRef=db.collection("meetings").doc(meetingDoc.id);

  // Real-time sync: status, deptStatus, all depts' tasks, and (for dept users) admin's meta/attendance
  useEffect(()=>{
    return docRef.onSnapshot(snap=>{
      if(!snap.exists)return;
      const d=snap.data();
      if(d.deptStatus) setDeptStatus(d.deptStatus);
      if(d.status) setStatus(d.status);
      if(d.reviewedBy||d.reviewedAt) setReview({by:d.reviewedBy||"",at:d.reviewedAt||null});
      setData(prev=>{
        const merged=mergeDeptTasks(d.data,d.deptTasks);
        // admin edits any dept's tasks → keep local copy while actively editing (within 5s of last keystroke)
        const adminEditing=!userDept&&(Date.now()-editingRef.current<5000)&&Array.isArray(prev.departments);
        // keep own dept's tasks local while typing (don't clobber unsaved edits)
        const departments=adminEditing?prev.departments:merged.map(md=>{
          if(userDept && md.id===userDept.id){
            const local=Array.isArray(prev.departments)?prev.departments.find(x=>x.id===md.id):null;
            return local?{...md,tasks:local.tasks}:md;
          }
          return md;
        });
        // dept users see admin's meta/attendance updates; admin keeps its own local edits
        const meta=userDept?{...prev.meta,...(d.data?.meta||{})}:prev.meta;
        const attendees=userDept&&Array.isArray(d.data?.attendees)?d.data.attendees:prev.attendees;
        const notes=userDept?(d.data?.notes||prev.notes):prev.notes;
        const decisions=userDept?(Array.isArray(d.data?.decisions)?d.data.decisions:prev.decisions):prev.decisions;
        return {...prev,meta,attendees,notes,decisions,departments};
      });
    });
  },[]);

  const deptSubmitted=userDept?deptStatus[userDept.id]==="submitted":false;
  const readOnly=isViewer?true:(isAdmin?(status==="approved"):(status==="approved"||deptSubmitted));

  const saveToDB=useCallback(async d=>{
    setSaveStatus("جاري الحفظ...");
    try{
      const ts=firebase.firestore.FieldValue.serverTimestamp();
      if(userDept){
        // Each dept writes ONLY its own key in the deptTasks map — no conflicts, no races
        const deptId=userDept.id;
        const localTasks=Array.isArray(d.departments)
          ?(d.departments.find(dep=>dep.id===deptId)||{}).tasks||[]
          :[];
        await docRef.update({['deptTasks.'+deptId]:localTasks,updatedAt:ts});
      } else {
        // Admin: save meta/attendance/notes AND department tasks (admin may fill tasks on behalf of depts)
        const deptTasksMap={};
        (Array.isArray(d.departments)?d.departments:[]).forEach(dep=>{ if(dep&&dep.id) deptTasksMap[dep.id]=dep.tasks||[]; });
        await docRef.update({
          'data.meta':d.meta||{},
          'data.attendees':d.attendees||[],
          'data.notes':d.notes||'',
          'data.nextMeeting':d.nextMeeting||'',
          'data.decisions':Array.isArray(d.decisions)?d.decisions:[],
          deptTasks:deptTasksMap,
          updatedAt:ts,
        });
      }
      setSaveStatus("تم الحفظ ✓");setTimeout(()=>setSaveStatus(""),2000);
    }catch(e){console.error(e);setSaveStatus("خطأ في الحفظ: "+(e.message||""));}
  },[userDept]);
  const debouncedSave=useDebounce(saveToDB,1500);

  const update=(path,val)=>{
    if(readOnly)return;
    editingRef.current=Date.now();
    setData(s=>{
      const copy=JSON.parse(JSON.stringify(s));
      const parts=path.split(".");let cur=copy;
      for(let i=0;i<parts.length-1;i++){const k=parts[i];cur=cur[k.match(/^\d+$/)?Number(k):k];}
      const last=parts[parts.length-1];cur[last.match(/^\d+$/)?Number(last):last]=val;
      debouncedSave(copy);return copy;
    });
  };
  const updateState=fn=>{if(readOnly)return;editingRef.current=Date.now();setData(s=>{const next=fn(s);debouncedSave(next);return next;});};

  const submitForApproval=async()=>{
    const pending=DEPT_IDS.filter(id=>deptStatus[id]!=="submitted");
    if(pending.length){
      alert("لا يمكن إرسال المحضر للاعتماد قبل أن ترفع جميع القطاعات مهامها.\n\nالقطاعات التي لم ترفع بعد:\n• "+pending.map(id=>DEPT_LABELS[id]).join("\n• "));
      return;
    }
    if(!confirm("إرسال المحضر للاعتماد؟ لن تتمكن من التعديل بعد الإرسال."))return;
    await docRef.update({status:"pending",submittedAt:firebase.firestore.FieldValue.serverTimestamp()});
    setStatus("pending");
  };
  const submitDept=async()=>{
    if(!confirm(`رفع مهام ${userDept.name} للاعتماد؟ لن تتمكن من التعديل بعد الرفع.`))return;
    const next={...deptStatus,[userDept.id]:"submitted"};
    // الإدارة تكتب مهامها وحالتها فقط (قواعد Firestore تمنعها من تغيير حالة المحضر).
    // عند اكتمال رفع جميع الإدارات يظهر زر الاعتماد للرئيس تلقائياً (يُحسب من اكتمال الرفع، لا من حقل الحالة).
    await docRef.update({deptStatus:next,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
    setDeptStatus(next);
  };
  const handleApprove=async note=>{
    const missing=DEPT_IDS.filter(id=>deptStatus[id]!=="submitted");
    if(missing.length){
      alert("لا يمكن اعتماد المحضر قبل أن ترفع جميع القطاعات مهامها.\n\nالقطاعات التي لم ترفع بعد:\n• "+missing.map(id=>DEPT_LABELS[id]).join("\n• "));
      return;
    }
    await docRef.update({status:"approved",reviewNote:note||"",reviewedAt:firebase.firestore.FieldValue.serverTimestamp(),reviewedBy:user.email});
    setStatus("approved");setReview({by:user.email,at:{seconds:Date.now()/1000}});setShowReview(false);
  };
  const handleReject=async note=>{
    // Reopen all departments so dept users can fix and re-submit
    const reset=BLANK_DEPT_STATUS();
    await docRef.update({status:"rejected",rejectNote:note||"",deptStatus:reset,reviewedAt:firebase.firestore.FieldValue.serverTimestamp(),reviewedBy:user.email});
    setStatus("rejected");setRejectNote(note||"");setDeptStatus(reset);setShowReview(false);
  };
  // Admin override: approve directly even if some departments haven't submitted
  const adminForceApprove=async()=>{
    const missing=DEPT_IDS.filter(id=>deptStatus[id]!=="submitted");
    const msg=missing.length
      ?"اعتماد المحضر مباشرةً رغم أن القطاعات التالية لم ترفع مهامها:\n• "+missing.map(id=>DEPT_LABELS[id]).join("\n• ")+"\n\nتأكيد الاعتماد الإداري؟"
      :"اعتماد المحضر مباشرةً؟";
    if(!confirm(msg))return;
    await docRef.update({status:"approved",reviewNote:"اعتماد إداري (تجاوز)",reviewedAt:firebase.firestore.FieldValue.serverTimestamp(),reviewedBy:user.email});
    setStatus("approved");setReview({by:user.email,at:{seconds:Date.now()/1000}});
  };

  const exportMeeting=()=>{
    const headers=["القطاع","المهمة","الحالة"];
    const rows=[];
    (data.departments||[]).forEach(d=>(d.tasks||[]).forEach(t=>{ if((t.task||"").trim()) rows.push([d.name,t.task,STATUS_AR[t.status]||t.status]); }));
    const nm=((data.meta.title||"").trim()||(data.meta.date||"").trim()||data.meta.docId||"محضر");
    downloadFile("محضر-"+nm+".csv",buildCSV(headers,rows));
  };

  const canSubmit=isAdmin&&(status==="draft"||status==="rejected");
  const missingCount=DEPT_IDS.filter(id=>deptStatus[id]!=="submitted").length;
  const allSubmitted=missingCount===0;
  const canForceApprove=isAdmin&&(status==="draft"||status==="rejected"||status==="pending")&&missingCount>0;
  const shownStatus=(status==="draft"&&allSubmitted)?"pending":status; // عرض «بانتظار الاعتماد» عند اكتمال الرفع
  return <>
    <TopNav user={user} docStatus={shownStatus} saveStatus={saveStatus} onBack={onBack}
      onSubmit={canSubmit?submitForApproval:null}
      onReview={(isAdmin||isCEO)&&(status==="pending"||allSubmitted)&&status!=="approved"&&status!=="rejected"?()=>setShowReview(true):null}
      reviewLabel={isCEO?"✔ اعتماد الرئيس التنفيذي":"مراجعة واعتماد (احتياطي)"}
      onDeptSubmit={userDept&&!isAdmin?submitDept:null}
      deptSubmitted={deptSubmitted} userDept={userDept}
      deptProgress={isAdmin&&status!=="approved"?{done:DEPT_IDS.filter(id=>deptStatus[id]==="submitted").length,total:TOTAL}:null}
      onForceApprove={canForceApprove?adminForceApprove:null}
      onExport={exportMeeting}
      pendingCount={0}/>
    {status==="rejected"&&rejectNote&&(
      <div className="reject-banner" style={{position:"fixed",top:48,insetInline:0,zIndex:150,
        background:"var(--red-bg)",color:"var(--red)",padding:"10px 20px",
        fontFamily:"var(--latin)",fontSize:12,direction:"rtl",display:"flex",alignItems:"center",gap:10}}>
        <b>سبب الرفض:</b> {rejectNote}
        {!readOnly&&<span style={{marginInlineStart:"auto",opacity:.6}}>يمكنك التعديل والإعادة</span>}
      </div>
    )}
    {status==="approved"&&(
      <div className="approved-banner" style={{position:"fixed",top:48,insetInline:0,zIndex:150,
        background:"var(--ok-bg)",color:"var(--ok)",padding:"8px 20px",
        fontFamily:"var(--ar)",fontSize:12,direction:"rtl",display:"flex",alignItems:"center",gap:10,borderBottom:"1px solid var(--ok-bd)"}}>
        <span className="lock-note">🔒 محضر معتمد ومقفل — لا يمكن التعديل</span>
        {review.by&&<span style={{marginInlineStart:"auto",opacity:.8,fontFamily:"var(--ar)",fontWeight:600}}>اعتمده: {CEO_NAME} · {CEO_TITLE} · {fmtTs(review.at)}</span>}
      </div>
    )}
    <div className="stage" style={{marginTop:(status==="rejected"&&rejectNote)||status==="approved"?38:0}}>
      <Cover st={data} u={update} readOnly={readOnly||!!userDept} approved={status==="approved"} reviewBy={review.by} reviewAt={review.at}/>
      <PageInfo st={data} u={update} readOnly={readOnly||!!userDept}/>
      <PageTasks st={data} u={update} setState={updateState} page={3} deptIndices={[0,1]} secNo="03" part="جزء 1/2" showLegend readOnly={readOnly} userDept={userDept} deptStatus={deptStatus}/>
      <PageTasks st={data} u={update} setState={updateState} page={4} deptIndices={[2,3,4]} secNo="04" part="جزء 2/2" readOnly={readOnly} userDept={userDept} deptStatus={deptStatus}/>
      <PageClosing st={data} u={update} readOnly={readOnly||!!userDept} approved={status==="approved"} reviewBy={review.by} reviewAt={review.at}/>
    </div>
    {showReview&&<ReviewPanel meeting={{...meetingDoc,data,status}} onApprove={handleApprove} onReject={handleReject} onClose={()=>setShowReview(false)} pendingDepts={DEPT_IDS.filter(id=>deptStatus[id]!=="submitted").map(id=>DEPT_LABELS[id])}/>}
  </>;
}

/* ── App ── */
function App(){
  const [user,setUser]=useState(undefined);
  const [meetings,setMeetings]=useState([]);
  const [currentDoc,setCurrentDoc]=useState(null);

  useEffect(()=>auth.onAuthStateChanged(u=>setUser(u||null)),[]);

  useEffect(()=>{
    if(!user)return;
    // All authenticated users see all meetings
    return db.collection("meetings").onSnapshot(snap=>{
      const docs=snap.docs.map(d=>({id:d.id,...d.data()}));
      docs.sort((a,b)=>(b.updatedAt?.seconds||0)-(a.updatedAt?.seconds||0));
      setMeetings(docs);
    },err=>{console.error(err);if(err.code==="permission-denied")alert("خطأ في الصلاحيات — تأكد من إعدادات Firestore.");});
  },[user]);

  const createNew=async()=>{
    const blank=BLANK();
    // Carry over unfinished tasks (status !== "done") from the most recent approved meeting
    const prev=meetings.find(m=>m.status==="approved");
    const carried=BLANK_DEPT_TASKS();
    let carriedCount=0;
    if(prev){
      mergeDeptTasks(prev.data,prev.deptTasks).forEach(d=>{
        const open=(d.tasks||[]).filter(t=>t.status!=="done"&&(t.task||"").trim());
        carried[d.id]=open.map(t=>({task:t.task,status:t.status||"progress"}));
        carriedCount+=open.length;
      });
    }
    if(carriedCount&&!confirm(`سيتم ترحيل ${carriedCount} مهمة غير منجزة من المحضر السابق المعتمد إلى المحضر الجديد.\n\nمتابعة؟`)){
      // user can opt out of carry-over → start clean
      Object.keys(carried).forEach(k=>carried[k]=[]);
    }
    try{
      const ref=await db.collection("meetings").add({
        data:blank,status:"draft",
        deptStatus:BLANK_DEPT_STATUS(),
        deptTasks:carried,
        createdBy:user.uid,createdByEmail:user.email,
        updatedAt:firebase.firestore.FieldValue.serverTimestamp(),submittedAt:null,
      });
      setCurrentDoc({id:ref.id,data:blank,status:"draft",deptStatus:BLANK_DEPT_STATUS(),deptTasks:carried,createdBy:user.uid,createdByEmail:user.email});
    }catch(err){alert("خطأ في إنشاء المحضر:\n"+err.message);}
  };

  const userDept=DEPT_MAP[user?.email]||null;

  if(user===undefined)return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--navy)",color:"#fff",fontFamily:"var(--latin)"}}>جاري التحميل...</div>;
  if(!user)return <AuthScreen/>;
  if(currentDoc)return <Editor user={user} meetingDoc={currentDoc} onBack={()=>setCurrentDoc(null)} userDept={userDept}/>;

  const pendingCount=meetings.filter(m=>m.status==="pending").length;
  return <>
    <TopNav user={user} pendingCount={pendingCount}/>
    <Dashboard user={user} meetings={meetings} onNew={createNew} onOpen={m=>setCurrentDoc(m)}/>
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
